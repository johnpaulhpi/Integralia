<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 16</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        @keyframes particle-explode { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .particle { position: absolute; top: 50%; left: 50%; animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; z-index: 50; }
        
        @keyframes consume { 0% { transform: scale(1); filter: blur(0); } 100% { transform: scale(0) rotate(180deg); filter: blur(20px); opacity: 0; } }
        .animate-consume { animation: consume 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }

        @keyframes slash {
            0% { clip-path: inset(0 100% 0 0); opacity: 1; }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        .animate-slash {
            position: absolute; top: 45%; left: -20%; right: -20%; height: 8px;
            background: white; box-shadow: 0 0 20px 8px rgba(255,255,255,0.9);
            transform: rotate(-25deg); animation: slash 0.4s ease-out forwards; z-index: 60; pointer-events: none;
        }

        @keyframes bleed { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.3); opacity: 0; } }
        .blood-drop {
            position: absolute; bottom: 0; width: 6px; height: 12px; border-radius: 50%;
            background-color: #dc2626; box-shadow: 0 0 8px #dc2626;
            animation: bleed 1.2s infinite ease-in; z-index: 45; pointer-events: none;
        }
        .drop-1 { left: 20%; animation-delay: 0.1s; }
        .drop-2 { left: 50%; animation-delay: 0.5s; width: 8px; height: 14px; }
        .drop-3 { left: 80%; animation-delay: 0.3s; }

        .mana-bar-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .mat-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathEquation = ({ equation, size = "text-3xl", inline = false, color = "text-yellow-400" }) => {
            const containerRef = useRef();
            useEffect(() => {
                if (containerRef.current && equation) {
                    try { katex.render(equation, containerRef.current, { displayMode: !inline, throwOnError: false }); } 
                    catch (e) { console.error("KaTeX error:", e); }
                }
            }, [equation, inline]);
            return <div ref={containerRef} className={`${size} ${color} drop-shadow-md pointer-events-none`}></div>;
        };

        const ParticleBurst = ({ card }) => {
            let isBlue = false;
            if (card.name === 'Sina') isBlue = true;
            if ((card.name === 'Residue' || card.name === 'Compound') && card.baseTex && card.baseTex.includes('sin')) isBlue = true;

            const colorClass = isBlue ? 'bg-blue-500' : 'bg-yellow-500';
            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const size = 4 + Math.random() * 6;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div key={i} className={`particle ${colorClass} shadow-[0_0_10px_currentColor]`}
                        style={{ width: size, height: size, '--tx': tx, '--ty': ty, clipPath: 'circle(50%)' }} />
                );
            });
            return <div className="absolute inset-0 overflow-visible pointer-events-none z-50">{particles}</div>;
        };

        const BattleCard = ({ card, isActive, isSacrificeTarget, isStitchTarget, onClick, onCycle, isSlashing, isShattering, isConsumed, scale = "scale-100" }) => {
            const renderVisual = () => {
                if (card.name === 'Sina') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="45" fill="#1e3a8a" stroke="#3b82f6" strokeWidth="2" opacity="0.9" />
                            <circle cx="50" cy="50" r="32" fill="#3b82f6" opacity="0.5" />
                            <polygon points="50,25 70,60 30,60" fill="#eab308" />
                        </svg>
                    );
                } else if (card.name === 'Cosa') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            <polygon points="50,15 85,50 50,85 15,50" fill="#eab308" stroke="#ca8a04" strokeWidth="3" />
                            <polyline points="50,15 46,35 55,55 48,70 50,85" fill="none" stroke="#422006" strokeWidth="2" opacity="0.7" />
                            <circle cx="50" cy="50" r="2.5" fill="#3b82f6" />
                            <circle cx="48" cy="78" r="1.5" fill="#60a5fa" />
                        </svg>
                    );
                } else if (card.name === 'Residue' || card.name === 'Compound') {
                    const isBlue = card.baseTex && card.baseTex.includes('sin');
                    const mainColor = isBlue ? "#1e3a8a" : "#713f12";
                    const strokeColor = isBlue ? "#3b82f6" : "#eab308";
                    const innerColor = isBlue ? "#60a5fa" : "#facc15";
                    
                    const innerPath = card.name === 'Residue' 
                        ? <path d="M 30 50 L 70 50 M 50 30 L 50 70" stroke={innerColor} strokeWidth="2" opacity="0.5" />
                        : <><path d="M 20 50 L 80 50 M 50 20 L 50 80" stroke={innerColor} strokeWidth="2" strokeDasharray="4 4" /><circle cx="50" cy="50" r="15" fill={strokeColor} /></>;

                    return (
                        <svg viewBox="0 0 100 100" className={`w-full h-full drop-shadow-[0_0_15px_rgba(${isBlue?'59,130,246':'234,179,8'},0.5)]`}>
                            <polygon points="50,5 95,50 50,95 5,50" fill={mainColor} stroke={strokeColor} strokeWidth="2" />
                            {innerPath}
                        </svg>
                    );
                } else if (card.type === 'Derived' || card.type === 'Resonant') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(217,70,239,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#d946ef" strokeWidth="2" strokeDasharray="8 4" />
                            <path d="M 50 10 L 90 50 L 50 90 L 10 50 Z" fill="#701a75" opacity="0.6"/>
                            <circle cx="50" cy="50" r="10" fill="#f0abfc" />
                        </svg>
                    );
                } else if (card.name === 'U-State' || card.name === 'Refined Solution') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" strokeWidth="3" strokeDasharray="5 5" />
                            <text x="50" y="65" fontSize="40" fill="#d8b4fe" textAnchor="middle" fontFamily="serif" fontStyle="italic">u</text>
                        </svg>
                    );
                }
                return null;
            };

            let baseBg = 'bg-gray-900/95';
            let baseBorder = 'border-gray-800 hover:border-gray-600 hover:bg-gray-800';
            
            if (card.name === 'Sina') {
                baseBg = 'bg-blue-950/40';
                baseBorder = 'border-blue-900 hover:border-blue-700 hover:bg-blue-900/60';
            } else if (card.name === 'Cosa') {
                baseBg = 'bg-yellow-950/40';
                baseBorder = 'border-yellow-900 hover:border-yellow-700 hover:bg-yellow-900/60';
            } else if (card.name === 'Residue' || card.name === 'Compound') {
                if (card.baseTex && card.baseTex.includes('sin')) {
                    baseBg = 'bg-blue-950/40';
                    baseBorder = 'border-blue-700 shadow-[inset_0_0_20px_rgba(59,130,246,0.1)] hover:border-blue-500';
                } else {
                    baseBg = 'bg-yellow-950/40';
                    baseBorder = 'border-yellow-700 shadow-[inset_0_0_20px_rgba(234,179,8,0.1)] hover:border-yellow-500';
                }
            } else if (card.type === 'Derived' || card.type === 'Resonant') {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-600 shadow-[inset_0_0_30px_rgba(217,70,239,0.2)] hover:border-fuchsia-400';
            } else if (card.name === 'U-State' || card.name === 'Refined Solution') {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-900 shadow-[inset_0_0_20px_rgba(168,85,247,0.1)] hover:border-fuchsia-700';
            }

            let borderClass = baseBorder;
            if (isActive) borderClass = 'border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.5)] scale-105';
            if (isStitchTarget) borderClass = 'border-emerald-400 shadow-[0_0_25px_rgba(16,185,129,0.5)] scale-105';
            if (isSacrificeTarget) borderClass = 'border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.7)] scale-105 animate-pulse';

            return (
                <div className={`relative flex flex-col items-center ${isConsumed ? 'animate-consume' : ''} ${scale} origin-center transition-all duration-300 hover:-translate-y-2`}>
                    <div onClick={onClick} className={`relative flex flex-col w-[190px] h-[270px] rounded-2xl border-2 transition-all overflow-visible cursor-pointer z-40 ${baseBg} ${borderClass}`}>
                        
                        {isSlashing && <div className="animate-slash"></div>}

                        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-gray-900 border border-gray-700 rounded text-[9px] font-black tracking-tighter text-gray-500 uppercase z-50">
                            {card.type}
                        </div>

                        {card.canCycle && onCycle && (
                            <div onClick={(e) => { e.stopPropagation(); onCycle(card.id); }}
                                className="absolute -top-4 -left-4 w-10 h-10 rounded-full bg-emerald-900 border-2 border-emerald-400 flex items-center justify-center text-emerald-200 text-xl font-bold shadow-lg z-50 hover:bg-emerald-700 hover:scale-110 transition-transform">
                                ⟳
                            </div>
                        )}

                        {card.isBleeding && (
                            <div className="absolute -bottom-4 -left-4 w-10 h-10 rounded-full bg-red-950 border-2 border-red-500 flex items-center justify-center text-red-400 text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)] z-50">
                                🩸
                            </div>
                        )}

                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-50">
                                {card.power}
                            </div>
                        )}

                        <div className="h-[90px] w-full border-b border-white/5 flex items-center justify-center relative bg-gradient-to-b from-white/5 to-transparent rounded-t-2xl overflow-visible p-3">
                            {isShattering && <ParticleBurst card={card} />}
                            <div className={`w-full h-full ${isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"} flex items-center justify-center`}>
                                {renderVisual()}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center px-2">
                            <span className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">{card.name}</span>
                            <div className="pointer-events-none scale-90"><MathEquation equation={card.baseTex} size="text-2xl" /></div>
                        </div>

                        <div className="h-[65px] w-full bg-black/60 border-t border-white/5 rounded-b-2xl p-2 flex items-center justify-center relative">
                            <p className="text-[10px] text-gray-400 text-center leading-tight italic px-1">"{card.ability}"</p>
                            
                            {(card.isBleeding || isSacrificeTarget) && (
                                <>
                                    <div className="blood-drop drop-1"></div>
                                    <div className="blood-drop drop-2"></div>
                                    <div className="blood-drop drop-3"></div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const IntegraliaGame = () => {
            const [mana, setMana] = useState(0);
            const [gamePhase, setGamePhase] = useState('setup');
            const [integrationStep, setIntegrationStep] = useState(0);

            const [bossCards, setBossCards] = useState([]);
            
            // Random Spell Generator
            const generateSpell = () => {
                const sinPower = Math.floor(Math.random() * 3) + 1; // 1 to 3
                const cosPower = Math.floor(Math.random() * 3) + 1; // 1 to 3
                
                const newCards = [];
                if (sinPower > 0) {
                    newCards.push({ id: `sina-${Date.now()}`, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: sinPower, canCycle: (sinPower % 2 === 0), ability: "Primal Spirit.", isBleeding: false });
                }
                if (cosPower > 0) {
                    newCards.push({ id: `cosa-${Date.now()}`, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: cosPower, canCycle: (cosPower % 2 === 0), ability: "Armored Core.", isBleeding: false });
                }
                
                setBossCards(newCards);
                setGamePhase('setup');
                setIntegrationStep(0);
                setActiveMode(null);
                setActiveMat(null);
                setAltarCore(null);
                setAltarSacrifice(null);
                setAltarExpanded([]);
                setIbpU(null);
                setIbpDv(null);
                setIbpDerived(null);
                setTrigSubCard(null);
                
                addLog(`A wild spell appears! Refine sin^${sinPower}(x) cos^${cosPower}(x) to extract its mana.`);
            };

            // Run generator on boot
            useEffect(() => {
                generateSpell();
            }, []);

            // Altar Mat State
            const [altarCore, setAltarCore] = useState(null);
            const [altarSacrifice, setAltarSacrifice] = useState(null);
            const [altarExpanded, setAltarExpanded] = useState([]);
            const [uData, setUData] = useState({ coreFamily: null });

            // Dual-Weave (IBP) Mat State
            const [ibpU, setIbpU] = useState(null);
            const [ibpDv, setIbpDv] = useState(null);
            const [ibpDerived, setIbpDerived] = useState(null);

            // Rune Circle (Trig Sub) Mat State
            const [trigSubCard, setTrigSubCard] = useState(null);

            const [handCards, setHandCards] = useState({ slice: { available: true }, needle: { available: true }, altar: { available: true }, ibp: { available: true } });
            const [activeMode, setActiveMode] = useState(null); 
            const [activeMat, setActiveMat] = useState(null); 
            
            const [slashingId, setSlashingId] = useState(null);
            const [shatteringId, setShatteringId] = useState(null);
            const [stitchTargetId, setStitchTargetId] = useState(null);
            const [consumeAll, setConsumeAll] = useState(false);
            
            const [logs, setLogs] = useState([]);
            const logEndRef = useRef(null);
            const addLog = (msg) => setLogs(prev => [...prev, msg]);
            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const selectMat = (matName) => {
                setActiveMode(null); 
                setActiveMat(matName);
                
                if (matName === 'altar') {
                    addLog("Sacrificial Altar Deployed. Slot your Core and Sacrifice into the Mat!");
                } else if (matName === 'ibp') {
                    addLog("Dual-Weave Mat Deployed. Slot 'u' (Bind) and 'dv' (Poison) to calculate the expansion.");
                } else if (matName === 'trigsub') {
                    addLog("Rune Circle (Trig Sub) Deployed. Slot an even-powered Core to Transmute.");
                } else {
                    addLog("Mat returned to inventory.");
                }
            };

            const handleCycle = (cardId) => {
                const card = bossCards.find(c => c.id === cardId);
                if (!card) return;

                if (card.name === 'Sina' || card.name === 'Cosa') {
                    setMana(m => m + 10);
                    addLog(`Identity Cycled: Extracting mana from the ${card.name === 'Sina' ? 'Sine' : 'Cosine'} shell. (+10 Mana)`);
                } else if (card.name === 'Residue') {
                    if (mana < 10) {
                        addLog("Not enough Mana! Hardening a Residue costs 10 Mana.");
                        return; // Abort
                    }
                    setMana(m => m - 10);
                    addLog(`Identity Cycled: Hardening Residue back into a Core. (-10 Mana)`);
                }

                setBossCards(prev => prev.map(c => {
                    if (c.id === cardId) {
                        if (c.name === 'Sina') {
                            return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\cos^2(x))', baseMath: '(1-cos(x)^2)', canCycle: true, ability: "Transmuted into the Cosine family.", isBleeding: false };
                        } else if (c.name === 'Cosa') {
                            return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\sin^2(x))', baseMath: '(1-sin(x)^2)', canCycle: true, ability: "Transmuted into the Sine family.", isBleeding: false };
                        } else {
                            if (c.baseTex && c.baseTex.includes('cos')) return { ...c, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                            else return { ...c, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                        }
                    }
                    return c;
                }));
            };

            const handleBossCardClick = (card) => {
                if (gamePhase !== 'setup') return;

                // TOOLS TAKE PRIORITY
                if (activeMode) {
                    if (activeMode === 'slice' && card.power > 1) {
                        setSlashingId(card.id);
                        addLog(`Slicing ${card.name}... extracting initial mana.`);
                        setMana(m => m + 10);
                        setTimeout(() => {
                            setSlashingId(null);
                            setShatteringId(card.id);
                            setTimeout(() => {
                                const newCards = [...bossCards];
                                const idx = newCards.findIndex(c => c.id === card.id);
                                
                                newCards[idx] = { 
                                    ...card, 
                                    power: card.power - 1, 
                                    canCycle: ((card.name === 'Sina' || card.name === 'Cosa') && (card.power - 1) % 2 === 0),
                                    isBleeding: false 
                                };
                                
                                newCards.splice(idx + 1, 0, { 
                                    id: `cleaved-${Date.now()}`, 
                                    name: card.name, 
                                    type: 'Fragment', 
                                    baseTex: card.baseTex, 
                                    baseMath: card.baseMath, 
                                    power: 1, 
                                    canCycle: false, 
                                    ability: "Cleaved Fragment. Bleeding mana.", 
                                    isBleeding: true 
                                });
                                
                                setBossCards(newCards);
                                setShatteringId(null);
                                setActiveMode(null);
                            }, 500);
                        }, 300);
                        return;
                    }

                    if (activeMode === 'stitch_1') {
                        setStitchTargetId(card.id);
                        setActiveMode('stitch_2');
                        addLog(`Selected ${card.name} as the first thread. Select a matching card to stitch.`);
                        return;
                    } else if (activeMode === 'stitch_2') {
                        if (card.id === stitchTargetId) { addLog("Cannot stitch a card to itself."); return; }
                        const target1 = bossCards.find(c => c.id === stitchTargetId);
                        const target2 = card;
                        
                        if (target1.name === target2.name) {
                            if (mana < 10) {
                                addLog("Not enough Mana! Sewing fragments costs 10 Mana.");
                                setActiveMode(null);
                                setStitchTargetId(null);
                                return;
                            }
                            addLog(`Stitching identical spirits... Exponents combined! (-10 Mana)`);
                            setMana(m => m - 10);
                            const newPower = target1.power + target2.power;
                            let resolvedType = target1.type;
                            if (target1.name === 'Sina' || target1.name === 'Cosa') resolvedType = 'Core';
                            
                            const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                            newCards.push({
                                ...target1,
                                id: `stitched-${Date.now()}`,
                                power: newPower,
                                type: resolvedType,
                                canCycle: ((target1.name === 'Sina' || target1.name === 'Cosa') && newPower % 2 === 0),
                                isBleeding: false,
                                ability: `Combined Exponent: The weave grows thicker.`
                            });
                            setBossCards(newCards);
                            setStitchTargetId(null);
                            setActiveMode(null);
                        } else {
                            addLog("Incompatible spirits. Stitching requires matching identities.");
                            setActiveMode('stitch_1');
                            setStitchTargetId(null);
                        }
                        return;
                    }
                }

                // MAT SLOTTING LOGIC: ALTAR
                if (!activeMode && activeMat === 'altar') {
                    if (!altarCore) {
                        if (card.type === 'Core' || card.name === 'Compound') {
                            const coreFamily = card.name === 'Sina' ? 'sin' : 'cos';
                            setAltarCore({ ...card, family: coreFamily });
                            setBossCards(prev => prev.filter(c => c.id !== card.id));
                            addLog(`Slotted ${card.name} into the Core. Now provide an opposite sacrifice.`);
                        } else {
                            addLog("The Altar requires a stable Core to begin refinement.");
                        }
                        return;
                    }
                    
                    if (altarCore && !altarSacrifice) {
                        if (card.isBleeding && card.power === 1) {
                            const sacrificeFamily = card.name === 'Sina' ? 'sin' : 'cos';
                            if (sacrificeFamily !== altarCore.family) {
                                setAltarSacrifice(card);
                                setBossCards(prev => prev.filter(c => c.id !== card.id));
                                addLog("Blood Sacrifice accepted! Now move all remaining equation cards into the Expanded Weave.");
                            } else {
                                addLog("Invalid sacrifice! The blood must be of the opposite type.");
                            }
                        } else {
                            addLog("The Altar demands a bleeding, power-1 Fragment as sacrifice.");
                        }
                        return;
                    }

                    if (altarCore && altarSacrifice) {
                        setAltarExpanded(prev => [...prev, card]);
                        setBossCards(prev => prev.filter(c => c.id !== card.id));
                        addLog(`${card.name} slotted into the Expanded Weave.`);
                        return;
                    }
                }

                // MAT SLOTTING LOGIC: IBP
                if (!activeMode && activeMat === 'ibp') {
                    if (!ibpU) {
                        setIbpU(card);
                        setBossCards(prev => prev.filter(c => c.id !== card.id));
                        addLog(`Bound ${card.name} as 'u'. Math engine calculating derivative...`);
                        return;
                    }
                    
                    if (ibpU && !ibpDv) {
                        setIbpDv(card);
                        setBossCards(prev => prev.filter(c => c.id !== card.id));
                        addLog(`Poisoned with ${card.name} as 'dv'. Synthesizing Expansion Weave...`);
                        
                        let calculatedDuTex = 'du';
                        try { 
                            const node = math.derivative(ibpU.baseMath, 'x');
                            calculatedDuTex = node.toTex().replace(/~/g, ''); 
                        } catch(e) { }

                        let calculatedVTex = `\\int ${card.baseTex} dx`;
                        if (card.baseMath === 'cos(x)' || (card.baseTex && card.baseTex.includes('cos'))) calculatedVTex = '\\sin(x)';
                        else if (card.baseMath === 'sin(x)' || (card.baseTex && card.baseTex.includes('sin'))) calculatedVTex = '-\\cos(x)';

                        setIbpDerived({ duTex: calculatedDuTex, vTex: calculatedVTex });
                        return;
                    }
                }

                // MAT SLOTTING LOGIC: TRIGSUB
                if (!activeMode && activeMat === 'trigsub') {
                    if (!trigSubCard) {
                        if ((card.name === 'Sina' || card.name === 'Cosa') && card.power % 2 === 0) {
                            setTrigSubCard(card);
                            setBossCards(prev => prev.filter(c => c.id !== card.id));
                            addLog(`Slotted ${card.name} into the Rune Circle. Ready for Transmutation.`);
                        } else {
                            addLog("The Rune Circle requires a stable Core with an EVEN power.");
                        }
                        return;
                    }
                }
            };

            // Un-Slotting Logic for the Altar Mat
            const handleAltarClick = (role, id) => {
                if (role === 'core') {
                    setBossCards(prev => [...prev, altarCore]);
                    setAltarCore(null);
                    addLog("Core returned to the board.");
                } else if (role === 'sacrifice') {
                    setBossCards(prev => [...prev, altarSacrifice]);
                    setAltarSacrifice(null);
                    addLog("Sacrifice returned to the board.");
                } else if (role === 'expanded') {
                    const cardToReturn = altarExpanded.find(c => c.id === id);
                    setBossCards(prev => [...prev, cardToReturn]);
                    setAltarExpanded(prev => prev.filter(c => c.id !== id));
                    addLog(`${cardToReturn.name} returned to the board.`);
                }
            };

            // Un-Slotting Logic for the IBP Mat
            const handleIbpClick = (role) => {
                if (role === 'u') {
                    setBossCards(prev => [...prev, ibpU]);
                    setIbpU(null);
                    setIbpDerived(null);
                    addLog("'u' binding released.");
                } else if (role === 'dv') {
                    setBossCards(prev => [...prev, ibpDv]);
                    setIbpDv(null);
                    setIbpDerived(null);
                    addLog("'dv' poison released.");
                }
            };

            // Un-Slotting Logic for the Rune Circle Mat
            const handleTrigSubClick = () => {
                if (trigSubCard) {
                    setBossCards(prev => [...prev, trigSubCard]);
                    setTrigSubCard(null);
                    addLog("Core returned to the board.");
                }
            };

            const transmuteRune = () => {
                if (!trigSubCard) return;
                
                setMana(m => m + 30);
                
                const newKaTeX = trigSubCard.name === 'Sina' 
                    ? '\\frac{1 - \\cos(2x)}{2}' 
                    : '\\frac{1 + \\cos(2x)}{2}';

                setBossCards(prev => [
                    ...prev,
                    {
                        id: `resonant-${Date.now()}`,
                        name: 'Resonant Core',
                        type: 'Resonant',
                        baseTex: newKaTeX,
                        baseMath: '', // Base math can remain empty for derived states unless needed by math.js later
                        power: trigSubCard.power / 2,
                        canCycle: false,
                        ability: "Transmuted via Half-Angle Identity.",
                        isBleeding: false
                    }
                ]);

                setTrigSubCard(null);
                setActiveMat(null);
                addLog("Transmutation complete! The Rune Circle fades.");
            };

            const collapseWeave = () => {
                addLog("Altar rituals complete! The Weave collapses into a U-State.");
                setConsumeAll(true);
                setMana(m => m + 50);
                setTimeout(() => {
                    const hasCompound = altarExpanded.some(c => c.name === 'Compound');
                    const finalEq = hasCompound ? '-\\int(u^2 - u^4) \\, du' : '-\\int(1-u^2)u^2 \\, du';

                    setBossCards([{
                        id: 'u-state', name: 'U-State', type: 'Unresolved',
                        baseTex: finalEq,
                        power: 1, canCycle: false, ability: "Needs Distribution.", isBleeding: false
                    }]);
                    setConsumeAll(false);
                    setActiveMat(null);
                    setAltarCore(null);
                    setAltarSacrifice(null);
                    setAltarExpanded([]);
                    setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a U-State. Use Rule Tokens to refine it.");
                }, 1000);
            };

            const confirmIbpWeave = () => {
                addLog("Dual-Weave executed! The equation expands.");
                setConsumeAll(true);
                setMana(m => m + 50);
                
                setTimeout(() => {
                    setBossCards([
                        { ...ibpU, id: `u-${Date.now()}` },
                        { id: `v-${Date.now()}`, name: 'Derived v', type: 'Derived', baseTex: ibpDerived.vTex, baseMath: '', power: 1, ability: "Synthesized Integral.", canCycle: false, isBleeding: false },
                        { id: `v2-${Date.now()}`, name: 'Derived v', type: 'Derived', baseTex: ibpDerived.vTex, baseMath: '', power: 1, ability: "Ready for inner integration.", canCycle: false, isBleeding: false },
                        { id: `du-${Date.now()}`, name: 'Derived du', type: 'Derived', baseTex: ibpDerived.duTex, baseMath: '', power: 1, ability: "Synthesized Derivative.", canCycle: false, isBleeding: false }
                    ]);
                    
                    setConsumeAll(false);
                    setActiveMat(null);
                    setIbpU(null);
                    setIbpDv(null);
                    setIbpDerived(null);
                    addLog("The board has been replaced with the expanded Integration by Parts components.");
                }, 1000);
            };

            const applyIntegrationRule = (ruleType) => {
                if (mana < 10) { addLog("Not enough Mana! You need 10 Mana to cast a Rule Token."); return; }

                if (ruleType === 'distribute' && integrationStep === 0) {
                    setMana(m => m - 10); setIntegrationStep(1);
                    setBossCards([{ ...bossCards[0], baseTex: '-\\int(u^2 - u^4) \\, du', ability: "Needs Linearity Split." }]);
                    addLog("Token Applied: Distributed the powers.");
                } else if (ruleType === 'linearity' && integrationStep === 1) {
                    setMana(m => m - 10); setIntegrationStep(2);
                    setBossCards([{ ...bossCards[0], baseTex: '\\int -u^2 \\, du + \\int u^4 \\, du', ability: "Needs Power Rule." }]);
                    addLog("Token Applied: Split the integral using Linearity.");
                } else if (ruleType === 'power_rule' && integrationStep === 2) {
                    setMana(m => m - 10); setIntegrationStep(3);
                    setBossCards([{ ...bossCards[0], baseTex: '-\\frac{u^3}{3} + \\frac{u^5}{5}', ability: "Needs Constant of Integration." }]);
                    addLog("Token Applied: Executed the Power Rule.");
                } else if (ruleType === 'plus_c' && integrationStep === 3) {
                    setMana(m => m - 10 + 200); setIntegrationStep(4);
                    setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: '-\\frac{u^3}{3} + \\frac{u^5}{5} + C', ability: "Mana Refined. Spell completely dissolved." }]);
                    addLog("Token Applied: Added +C. REFINEMENT COMPLETE! Massive Mana Payout!");
                } else {
                    addLog("You cannot apply that rule right now.");
                }
            };

            let boardBorder = "border-white/5";
            if (activeMat === 'altar') { boardBorder = "border-red-900/50 shadow-[0_0_30px_rgba(220,38,38,0.15)]"; }
            else if (activeMat === 'ibp') { boardBorder = "border-fuchsia-900/50 shadow-[0_0_30px_rgba(217,70,239,0.15)]"; }
            else if (activeMat === 'trigsub') { boardBorder = "border-amber-900/50 shadow-[0_0_30px_rgba(245,158,11,0.15)]"; }

            return (
                <div className="min-h-screen p-8 flex flex-col items-center max-w-7xl mx-auto">
                    
                    <header className="mb-6 w-full flex justify-between items-end border-b border-white/10 pb-4">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter text-white">INTEGRALIA</h1>
                            <p className="text-xs text-blue-500 uppercase font-bold tracking-[0.3em]">The Art of Mana Refinement</p>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Mana Recovered</span>
                            <div className="flex items-center gap-3">
                                <div className="w-48 h-3 bg-gray-900 rounded-full border border-white/5 overflow-hidden mana-bar-glow">
                                    <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${Math.min(mana / 500 * 100, 100)}%` }}></div>
                                </div>
                                <span className="text-3xl font-mono text-blue-400 font-bold">{mana}</span>
                            </div>
                        </div>
                    </header>

                    {/* DYNAMIC TOP SECTION: Board + Optional Mats */}
                    <div className="w-full flex gap-6 mb-6 min-h-[450px] transition-all duration-500">
                        
                        {/* MAIN BOARD (Shrinks when a Mat is active) */}
                        <div className={`bg-gray-950 border rounded-[2rem] pt-10 pb-8 px-6 flex flex-col items-center relative overflow-hidden transition-all duration-500 ${activeMat ? 'w-4/12' : 'w-full'} ${boardBorder}`}>
                            <h2 className="absolute top-4 text-white/20 text-xs font-black tracking-[0.5em] uppercase text-center w-full">
                                Used Spell Container
                            </h2>
                            
                            <div className={`absolute inset-0 bg-blue-950/10 z-10 transition-opacity duration-1000 ${consumeAll ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}></div>

                            <div className="flex flex-row items-center justify-center gap-4 flex-wrap z-20 w-full h-full mt-4">
                                {bossCards.length > 0 && <div className={`text-6xl text-white/10 font-serif select-none ${consumeAll ? 'animate-consume' : ''}`}>∫</div>}
                                
                                {bossCards.length === 0 && !consumeAll && (
                                    <div className="text-gray-600 font-bold tracking-widest uppercase opacity-50 text-sm text-center">Board Empty</div>
                                )}

                                {bossCards.map((card) => (
                                    <BattleCard 
                                        key={card.id} card={card} 
                                        scale={activeMat ? 'scale-75' : 'scale-95'}
                                        isActive={activeMode === 'slice' || activeMode === 'stitch_1' || (activeMat === 'altar' && !altarCore) || (activeMat === 'ibp' && (!ibpU || !ibpDv)) || (activeMat === 'trigsub' && !trigSubCard)}
                                        isStitchTarget={stitchTargetId === card.id || activeMode === 'stitch_2'}
                                        onClick={() => handleBossCardClick(card)}
                                        onCycle={handleCycle}
                                        isSlashing={slashingId === card.id}
                                        isShattering={shatteringId === card.id}
                                        isConsumed={consumeAll}
                                    />
                                ))}
                                {bossCards.length > 0 && <div className={`text-3xl text-white/20 font-serif italic ${consumeAll ? 'animate-consume' : ''}`}>dx</div>}
                            </div>
                        </div>

                        {/* SACRIFICIAL ALTAR MAT */}
                        {activeMat === 'altar' && (
                            <div className="w-8/12 bg-red-950/10 border-2 border-red-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(220,38,38,0.05)] animate-slide-left overflow-hidden">
                                <h2 className="text-red-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-4">Sacrificial Altar Mat</h2>
                                
                                {/* Top Row: Core & Sacrifice Slots */}
                                <div className="w-full flex justify-center gap-6 relative z-20">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-red-500/20 text-4xl font-black mt-2">×</div>

                                    {/* Core Slot */}
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">1. Core (u)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {altarCore ? (
                                                <BattleCard card={altarCore} scale="scale-75 hover:scale-95" onClick={() => handleAltarClick('core', null)} />
                                            ) : (
                                                <span className="text-red-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Board Core<br/>to Assign</span>
                                            )}
                                        </div>
                                    </div>

                                    {/* Sacrifice Slot */}
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">2. Sacrifice (du)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {altarSacrifice ? (
                                                <BattleCard card={altarSacrifice} scale="scale-75 hover:scale-95" onClick={() => handleAltarClick('sacrifice', null)} />
                                            ) : (
                                                <span className="text-red-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Bleeding Fragment<br/>to Assign</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Bottom Row: Expanded Weave */}
                                <div className="w-full border-t border-red-900/30 pt-4 mt-4 flex flex-col items-center flex-1 z-20">
                                    <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Weave</span>
                                    <div className="w-full flex-1 flex flex-wrap justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-red-900/20 relative min-h-[120px]">
                                        {altarExpanded.length === 0 && (
                                            <span className="text-red-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Move all remaining cards here</span>
                                        )}
                                        {altarExpanded.map((card) => (
                                            <div key={card.id} className="w-[120px] h-[160px] flex items-center justify-center">
                                                <BattleCard card={card} scale="scale-[0.55] hover:scale-75" onClick={() => handleAltarClick('expanded', card.id)} />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Collapse Button */}
                                {bossCards.length === 0 && altarCore && altarSacrifice && (
                                    <div className="absolute inset-0 bg-red-950/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                        <button onClick={collapseWeave} className="px-10 py-4 bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(220,38,38,0.6)] hover:shadow-[0_0_50px_rgba(220,38,38,0.8)] transition-all transform hover:scale-105">
                                            Collapse Weave
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* DUAL-WEAVE (IBP) MAT */}
                        {activeMat === 'ibp' && (
                            <div className="w-8/12 bg-fuchsia-950/10 border-2 border-fuchsia-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(217,70,239,0.05)] animate-slide-left overflow-hidden">
                                <h2 className="text-fuchsia-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-4">Dual-Weave Mat (IBP)</h2>
                                
                                <div className="w-full flex justify-center gap-6 relative z-20">
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">1. Bind (u)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {ibpU ? (
                                                <BattleCard card={ibpU} scale="scale-75 hover:scale-95" onClick={() => handleIbpClick('u')} />
                                            ) : (
                                                <span className="text-fuchsia-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Card<br/>to Bind</span>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">2. Poison (dv)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {ibpDv ? (
                                                <BattleCard card={ibpDv} scale="scale-75 hover:scale-95" onClick={() => handleIbpClick('dv')} />
                                            ) : (
                                                <span className="text-fuchsia-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Card<br/>to Poison</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full border-t border-fuchsia-900/30 pt-4 mt-4 flex flex-col items-center flex-1 z-20">
                                    <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Form [ u v - ∫ v du ]</span>
                                    <div className="w-full flex-1 flex flex-nowrap justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-fuchsia-900/20 relative min-h-[140px] overflow-hidden">
                                        {!ibpU || !ibpDv || !ibpDerived ? (
                                            <span className="text-fuchsia-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Bind u and dv to expand the sequence</span>
                                        ) : (
                                            <div className="flex items-center justify-center gap-1 w-full h-full">
                                                <div className="w-[85px]"><BattleCard card={ibpU} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500 font-bold text-2xl mx-1">-</div>
                                                <div className="text-fuchsia-500/50 font-serif text-4xl mr-1">∫</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived du', type:'Derived', baseTex: ibpDerived.duTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold ml-1">dx</div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {ibpU && ibpDv && ibpDerived && (
                                    <div className="absolute inset-0 bg-fuchsia-950/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                        <button onClick={confirmIbpWeave} className="px-10 py-4 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(217,70,239,0.6)] hover:shadow-[0_0_50px_rgba(217,70,239,0.8)] transition-all transform hover:scale-105">
                                            Confirm Weave
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* RUNE CIRCLE (TRIG SUB) MAT */}
                        {activeMat === 'trigsub' && (
                            <div className="w-8/12 bg-amber-950/10 border-2 border-amber-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(245,158,11,0.05)] animate-slide-left overflow-hidden items-center">
                                <h2 className="text-amber-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-8">Rune Circle (Trig Sub)</h2>
                                
                                <div className="flex-1 w-full flex justify-center items-center relative z-20">
                                    <div className="flex flex-col items-center">
                                        <span className="text-amber-400 font-bold uppercase tracking-widest text-[9px] mb-4 text-center">Stable Core Component</span>
                                        <div className="w-[220px] h-[220px] rounded-full border-4 border-dashed border-amber-900/60 flex items-center justify-center bg-black/40 relative shadow-[0_0_40px_rgba(245,158,11,0.1)] transition-all">
                                            {trigSubCard ? (
                                                <BattleCard card={trigSubCard} scale="scale-75 hover:scale-95" onClick={handleTrigSubClick} />
                                            ) : (
                                                <span className="text-amber-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Slot Even Power<br/>Sine / Cosine</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {trigSubCard && (
                                    <div className="absolute inset-0 bg-amber-950/80 backdrop-blur-sm z-50 flex items-center justify-center">
                                        <button onClick={transmuteRune} className="px-10 py-4 bg-amber-600 hover:bg-amber-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(245,158,11,0.6)] hover:shadow-[0_0_50px_rgba(245,158,11,0.8)] transition-all transform hover:scale-105">
                                            Transmute Runes
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="w-full flex flex-col gap-6 mb-8">
                        <div className="w-full h-40 bg-gray-950 border border-white/5 rounded-2xl p-6 relative overflow-hidden flex flex-col">
                            <h3 className="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3 border-b border-white/5 pb-2">Refinement Log</h3>
                            <div className="overflow-y-auto flex-1 log-scroll pr-4">
                                <ul className="space-y-2">
                                    {logs.map((log, idx) => (
                                        <li key={idx} className={`text-sm leading-relaxed ${idx === logs.length - 1 ? 'text-blue-400 font-bold' : 'text-gray-400'}`}>
                                            <span className="opacity-30 mr-2">></span>{log}
                                        </li>
                                    ))}
                                    <div ref={logEndRef} />
                                </ul>
                            </div>
                        </div>

                        {gamePhase === 'setup' && (
                            <>
                                <div>
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Tools (Overrides Mat)</h3>
                                    <div className="w-full grid grid-cols-3 gap-6">
                                        <button onClick={() => { setActiveMode('slice'); setActiveMat(null); addLog("Slice Primed: Target an Exponent."); }} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'slice' ? 'border-blue-400 bg-blue-950/40 shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'border-blue-900 bg-gray-950 hover:border-blue-500 hover:bg-blue-950/20'}`}>
                                            <span className="text-blue-500 text-[10px] font-black uppercase mb-1">Machine</span>
                                            <span className="text-white font-bold text-lg group-hover:text-blue-400">Slice</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Cleave exponents to fragment components.</p>
                                        </button>

                                        <button onClick={() => { setActiveMode('stitch_1'); setStitchTargetId(null); setActiveMat(null); addLog("Weaver's Needle equipped. Select the first component to stitch."); }} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'stitch_1' || activeMode === 'stitch_2' ? 'border-emerald-400 bg-emerald-950/40 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-emerald-900 bg-gray-950 hover:border-emerald-500 hover:bg-emerald-950/20'}`}>
                                            <span className="text-emerald-500 text-[10px] font-black uppercase mb-1">Artifact</span>
                                            <span className="text-white font-bold text-lg group-hover:text-emerald-400">Weaver's Needle</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Stitches identical spirits together (-10 Mana).</p>
                                        </button>
                                        
                                        {activeMode && (
                                            <button onClick={() => { setActiveMode(null); setStitchTargetId(null); addLog("Tool unequipped."); }} 
                                                className="p-4 rounded-2xl border-2 border-gray-800 bg-gray-900 hover:bg-gray-800 transition-all flex items-center justify-center">
                                                <span className="text-gray-400 font-bold uppercase tracking-widest text-xs">Cancel Tool</span>
                                            </button>
                                        )}
                                    </div>
                                </div>

                                <div className="mt-2">
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Integration Mats (Play Field)</h3>
                                    <div className="w-full grid grid-cols-3 gap-6">
                                        <button onClick={() => activeMat === 'altar' ? selectMat(null) : selectMat('altar')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'altar' ? 'border-red-400 bg-red-950/40 shadow-[0_0_20px_rgba(220,38,38,0.3)]' : 'border-red-900 bg-gray-950 hover:border-red-500 hover:bg-red-950/20'}`}>
                                            <span className="text-red-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-red-400">Sacrificial Altar</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">U-Substitution. Requires blood sacrifice.</p>
                                        </button>

                                        <button onClick={() => activeMat === 'ibp' ? selectMat(null) : selectMat('ibp')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'ibp' ? 'border-fuchsia-400 bg-fuchsia-950/40 shadow-[0_0_20px_rgba(217,70,239,0.3)]' : 'border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 hover:bg-fuchsia-950/20'}`}>
                                            <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-fuchsia-400">Dual-Weave</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Integration By Parts (uv - ∫vdu).</p>
                                        </button>

                                        <button onClick={() => selectMat('trigsub')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'trigsub' ? 'border-amber-400 bg-amber-950/40 shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'border-amber-900 bg-gray-950 hover:border-amber-500 hover:bg-amber-950/20'}`}>
                                            <span className="text-amber-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-amber-400">Rune Circle</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Trigonometric Substitution.</p>
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}

                        {gamePhase === 'integration' && (
                            <div className="w-full flex flex-col items-center">
                                <div className="w-full grid grid-cols-4 gap-4">
                                    <button onClick={() => applyIntegrationRule('distribute')} disabled={integrationStep !== 0}
                                        className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                        <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                        <span className="text-white font-bold text-lg">Distribute</span>
                                    </button>
                                    <button onClick={() => applyIntegrationRule('linearity')} disabled={integrationStep !== 1}
                                        className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                        <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                        <span className="text-white font-bold text-lg">Linearity</span>
                                    </button>
                                    <button onClick={() => applyIntegrationRule('power_rule')} disabled={integrationStep !== 2}
                                        className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                        <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                        <span className="text-white font-bold text-lg">Power Rule</span>
                                    </button>
                                    <button onClick={() => applyIntegrationRule('plus_c')} disabled={integrationStep !== 3}
                                        className="p-4 rounded-xl border-2 border-amber-500 bg-gray-950 hover:border-amber-300 transition-all text-center flex flex-col disabled:opacity-20 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                                        <span className="text-amber-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                        <span className="text-white font-bold text-lg">Constant (+C)</span>
                                    </button>
                                </div>
                                
                                {integrationStep === 4 && (
                                    <button onClick={generateSpell} className="mt-8 px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:shadow-[0_0_50px_rgba(59,130,246,0.8)] transition-all transform hover:scale-105 animate-pulse">
                                        Summon Next Spell
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
