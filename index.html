<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 22</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        @keyframes particle-explode { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .particle { position: absolute; top: 50%; left: 50%; animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; z-index: 50; }
        
        @keyframes consume { 0% { transform: scale(1); filter: blur(0); } 100% { transform: scale(0) rotate(180deg); filter: blur(20px); opacity: 0; } }
        .animate-consume { animation: consume 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }

        @keyframes slash {
            0% { clip-path: inset(0 100% 0 0); opacity: 1; }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        .animate-slash {
            position: absolute; top: 45%; left: -20%; right: -20%; height: 8px;
            background: white; box-shadow: 0 0 20px 8px rgba(255,255,255,0.9);
            transform: rotate(-25deg); animation: slash 0.4s ease-out forwards; z-index: 60; pointer-events: none;
        }

        @keyframes bleed { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.3); opacity: 0; } }
        .blood-drop {
            position: absolute; bottom: 0; width: 6px; height: 12px; border-radius: 50%;
            background-color: #dc2626; box-shadow: 0 0 8px #dc2626;
            animation: bleed 1.2s infinite ease-in; z-index: 45; pointer-events: none;
        }
        .drop-1 { left: 20%; animation-delay: 0.1s; }
        .drop-2 { left: 50%; animation-delay: 0.5s; width: 8px; height: 14px; }
        .drop-3 { left: 80%; animation-delay: 0.3s; }

        @keyframes twitch {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(2px) rotate(5deg); }
            50% { transform: translateY(-1px) rotate(-5deg); }
            75% { transform: translateY(3px) rotate(2deg); }
        }
        .fang { animation: twitch 0.3s infinite; transform-origin: top center; }

        .mana-bar-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .mat-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathEquation = ({ equation, size = "text-3xl", inline = false, color = "text-yellow-400" }) => {
            const containerRef = useRef();
            useEffect(() => {
                if (containerRef.current && equation) {
                    try { katex.render(equation, containerRef.current, { displayMode: !inline, throwOnError: false }); } 
                    catch (e) { console.error("KaTeX error:", e); }
                }
            }, [equation, inline]);
            return <div ref={containerRef} className={`${size} ${color} drop-shadow-md pointer-events-none`}></div>;
        };

        const ParticleBurst = ({ card }) => {
            const tex = card.baseTex || '';
            let colorClass = 'bg-gray-500';
            if (tex.includes('cos') || card.name === 'Cosa') colorClass = 'bg-yellow-500';
            else if (tex.includes('sin') || card.name === 'Sina') colorClass = 'bg-blue-500';
            else if (tex.includes('sec') || card.name === 'Seca') colorClass = 'bg-green-500';
            else if (tex.includes('tan') || card.name === 'Tana') colorClass = 'bg-orange-500';
            else if (card.type === 'Algebraic' || card.name === 'Algebraica') colorClass = 'bg-emerald-500';

            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const size = 4 + Math.random() * 6;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div key={i} className={`particle ${colorClass} shadow-[0_0_10px_currentColor]`}
                        style={{ width: size, height: size, '--tx': tx, '--ty': ty, clipPath: 'circle(50%)' }} />
                );
            });
            return <div className="absolute inset-0 overflow-visible pointer-events-none z-50">{particles}</div>;
        };

        const BattleCard = ({ card, isActive, isSacrificeTarget, isStitchTarget, onClick, onCycle, isSlashing, isShattering, isConsumed, scale = "scale-100" }) => {
            
            const tex = card.baseTex || '';
            const name = card.name || '';
            
            let isLeech = card.isLeech || name === 'dx' || name === 'dθ';
            let isYellow = tex.includes('cos') || name === 'Cosa';
            let isBlue = tex.includes('sin') || name === 'Sina';
            let isGreen = tex.includes('sec') || name === 'Seca';
            let isOrange = tex.includes('tan') || name === 'Tana';
            let isEmerald = tex.includes('x') && (card.type === 'Algebraic' || name === 'Algebraica') && !isYellow && !isBlue && !isGreen && !isOrange;

            const renderVisual = () => {
                if (isBlue && !card.name.includes('State') && !card.type.includes('Derived')) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="45" fill="#1e3a8a" stroke="#3b82f6" strokeWidth="2" opacity="0.9" />
                            <circle cx="50" cy="50" r="32" fill="#3b82f6" opacity="0.5" />
                            <polygon points="50,25 70,60 30,60" fill="#eab308" />
                        </svg>
                    );
                } else if (isYellow && !card.name.includes('State') && !card.type.includes('Derived')) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            <polygon points="50,15 85,50 50,85 15,50" fill="#eab308" stroke="#ca8a04" strokeWidth="3" />
                            <polyline points="50,15 46,35 55,55 48,70 50,85" fill="none" stroke="#422006" strokeWidth="2" opacity="0.7" />
                            <circle cx="50" cy="50" r="2.5" fill="#3b82f6" />
                        </svg>
                    );
                } else if (isOrange && !card.name.includes('State') && !card.type.includes('Derived')) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(249,115,22,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="35" fill="none" stroke="#ea580c" strokeWidth="4" />
                            <line x1="10" y1="85" x2="90" y2="15" stroke="#fdba74" strokeWidth="4" strokeLinecap="round" />
                        </svg>
                    );
                } else if (isGreen && !card.name.includes('State') && !card.type.includes('Derived')) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(34,197,94,0.6)]">
                            <path d="M 20 80 Q 50 10 80 80" fill="none" stroke="#22c55e" strokeWidth="4" strokeLinecap="round" />
                            <line x1="10" y1="50" x2="90" y2="50" stroke="#86efac" strokeWidth="2" strokeDasharray="4 4" />
                        </svg>
                    );
                } else if (isLeech) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_10px_rgba(156,163,175,0.5)]">
                            <circle cx="50" cy="50" r="25" fill="#111827" stroke="#4b5563" strokeWidth="4" strokeDasharray="4 4" />
                            <path d="M 40 40 Q 50 20 60 40 T 40 40" fill="none" stroke="#9ca3af" strokeWidth="3" />
                        </svg>
                    );
                } else if (isEmerald) {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                            <path d="M 20 50 L 35 50 L 45 80 L 80 20" fill="none" stroke="#10b981" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                    );
                } else if (card.name === 'Residue' || card.name === 'Compound') {
                    let mainColor = "#713f12"; // default yellow/cos
                    let strokeColor = "#eab308";
                    
                    if (isBlue) { mainColor = "#1e3a8a"; strokeColor = "#3b82f6"; }
                    if (isGreen) { mainColor = "#134e4a"; strokeColor = "#14b8a6"; }
                    if (isOrange) { mainColor = "#7c2d12"; strokeColor = "#ea580c"; }

                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full">
                            <polygon points="50,5 95,50 50,95 5,50" fill={mainColor} stroke={strokeColor} strokeWidth="2" />
                            <circle cx="50" cy="50" r="10" fill={strokeColor} opacity="0.5" />
                        </svg>
                    );
                } else if (name === 'Expona') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(239,68,68,0.5)] svg-pulse">
                            <path d="M 20 80 Q 60 80, 80 20" fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                        </svg>
                    );
                } else if (card.type === 'Derived' || card.type === 'Resonant' || card.type === 'Void') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(217,70,239,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#d946ef" strokeWidth="2" strokeDasharray="8 4" />
                            <circle cx="50" cy="50" r="10" fill="#f0abfc" />
                        </svg>
                    );
                } else if (card.name === 'U-State' || card.name === 'IBP-State' || card.name === 'Tabular-State' || card.name === 'Refined Solution') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" strokeWidth="3" strokeDasharray="5 5" />
                            <text x="50" y="65" fontSize="40" fill="#d8b4fe" textAnchor="middle" fontFamily="serif" fontStyle="italic">u</text>
                        </svg>
                    );
                }
                
                // Fallback geometry
                return (
                    <svg viewBox="0 0 100 100" className="w-full h-full">
                        <circle cx="50" cy="50" r="20" fill="none" stroke="gray" strokeWidth="2" />
                    </svg>
                );
            };

            let baseBg = 'bg-gray-900/95';
            let baseBorder = 'border-gray-800 hover:border-gray-600';
            
            // Apply background colors dynamically based on text rules
            if (isLeech) { 
                baseBg = 'bg-black/95'; 
                baseBorder = 'border-gray-700 hover:border-gray-500'; 
            } else if (isYellow) { 
                baseBg = 'bg-yellow-950/40'; 
                baseBorder = 'border-yellow-900 hover:border-yellow-600'; 
            } else if (isBlue) { 
                baseBg = 'bg-blue-950/40'; 
                baseBorder = 'border-blue-900 hover:border-blue-600'; 
            } else if (isGreen) { 
                baseBg = 'bg-green-950/40'; 
                baseBorder = 'border-green-800 hover:border-green-500'; 
            } else if (isOrange) { 
                baseBg = 'bg-orange-950/40'; 
                baseBorder = 'border-orange-900 hover:border-orange-600'; 
            } else if (isEmerald) { 
                baseBg = 'bg-emerald-950/40'; 
                baseBorder = 'border-emerald-900 hover:border-emerald-600'; 
            } else if (name === 'Expona') { 
                baseBg = 'bg-red-950/40'; 
                baseBorder = 'border-red-900 hover:border-red-600'; 
            } else if (card.type === 'Derived' || card.type === 'Resonant' || card.name === 'Bleeding Coil' || card.name.includes('State')) {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-800 hover:border-fuchsia-500';
            }

            let borderClass = baseBorder;
            if (isActive) borderClass = 'border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.5)] scale-105';
            if (isStitchTarget) borderClass = 'border-emerald-400 shadow-[0_0_25px_rgba(16,185,129,0.5)] scale-105';
            if (isSacrificeTarget) borderClass = 'border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.7)] animate-pulse scale-105';

            return (
                <div className={`relative flex flex-col items-center ${isConsumed ? 'animate-consume' : ''} ${scale} origin-center transition-all duration-300 hover:-translate-y-2`}>
                    <div onClick={onClick} className={`relative flex flex-col w-[190px] h-[270px] rounded-2xl border-2 transition-all overflow-visible cursor-pointer z-40 ${baseBg} ${borderClass}`}>
                        
                        {isSlashing && <div className="animate-slash"></div>}

                        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-gray-900 border border-gray-700 rounded text-[9px] font-black tracking-tighter text-gray-500 uppercase z-50">
                            {card.type}
                        </div>

                        {(card.canCycle || card.type === 'Algebraic') && onCycle && (
                            <div onClick={(e) => { e.stopPropagation(); onCycle(card.id); }}
                                className="absolute -top-4 -left-4 w-10 h-10 rounded-full bg-emerald-900 border-2 border-emerald-400 flex items-center justify-center text-emerald-200 text-xl font-bold shadow-lg z-50 hover:bg-emerald-700 hover:scale-110 transition-transform">
                                ⟳
                            </div>
                        )}

                        {card.isBleeding && !isLeech && (
                            <div className="absolute -bottom-4 -left-4 w-10 h-10 rounded-full bg-red-950 border-2 border-red-500 flex items-center justify-center text-red-400 text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)] z-50">
                                🩸
                            </div>
                        )}

                        {isLeech && (
                            <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 flex justify-center gap-2 z-50 pointer-events-none">
                                <svg viewBox="0 0 20 40" className="w-3 h-5 fang fill-gray-200 drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]"><path d="M0,0 L10,40 L20,0 Z"/></svg>
                                <svg viewBox="0 0 20 40" className="w-3 h-5 fang fill-gray-200 drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]" style={{animationDelay: '0.15s'}}><path d="M0,0 L10,40 L20,0 Z"/></svg>
                            </div>
                        )}

                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-50">
                                {card.power}
                            </div>
                        )}

                        <div className="h-[90px] w-full border-b border-white/5 flex items-center justify-center relative bg-gradient-to-b from-white/5 to-transparent rounded-t-2xl overflow-visible p-3">
                            {isShattering && <ParticleBurst card={card} />}
                            {/* Graphic 50% smaller */}
                            <div className={`w-full h-full scale-50 ${isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"} flex items-center justify-center`}>
                                {renderVisual()}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center px-2">
                            <span className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">{card.name}</span>
                            <div className="pointer-events-none scale-90"><MathEquation equation={card.baseTex} size="text-2xl" /></div>
                        </div>

                        <div className="h-[65px] w-full bg-black/60 border-t border-white/5 rounded-b-2xl p-2 flex items-center justify-center relative">
                            {/* Flavor Text restored! */}
                            <p className="text-[10px] text-gray-400 text-center leading-tight italic px-1 z-10">"{card.ability}"</p>
                            
                            {(card.isBleeding && !isLeech) && (
                                <>
                                    <div className="blood-drop drop-1"></div>
                                    <div className="blood-drop drop-2"></div>
                                    <div className="blood-drop drop-3"></div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const IntegraliaGame = () => {
            const [mana, setMana] = useState(0);
            const [gamePhase, setGamePhase] = useState('setup');
            const [integrationStep, setIntegrationStep] = useState(0);
            const [integrationPath, setIntegrationPath] = useState(null); 

            const [bossCards, setBossCards] = useState([]);
            
            const [altarCore, setAltarCore] = useState(null);
            const [altarSacrifice, setAltarSacrifice] = useState(null);
            const [altarExpanded, setAltarExpanded] = useState([]);
            
            const [ibpU, setIbpU] = useState(null);
            const [ibpDv, setIbpDv] = useState(null);
            const [ibpDerived, setIbpDerived] = useState(null);

            const [trigSubCard, setTrigSubCard] = useState(null);

            const [tabularU, setTabularU] = useState([]); 
            const [tabularDv, setTabularDv] = useState([]); 
            const [tabularComplete, setTabularComplete] = useState(false);

            const [activeMode, setActiveMode] = useState(null); 
            const [activeMat, setActiveMat] = useState(null); 
            
            const [slashingId, setSlashingId] = useState(null);
            const [shatteringId, setShatteringId] = useState(null);
            const [stitchTargetId, setStitchTargetId] = useState(null);
            const [consumeAll, setConsumeAll] = useState(false);
            
            const [logs, setLogs] = useState([]);
            const logEndRef = useRef(null);
            const addLog = (msg) => setLogs(prev => [...prev, msg]);
            
            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const generateSpell = () => {
                const spellType = Math.floor(Math.random() * 3); 
                const newCards = [];
                let logMsg = "";

                if (spellType === 0) {
                    const sinPower = Math.floor(Math.random() * 3) + 1; 
                    const cosPower = Math.floor(Math.random() * 3) + 1; 
                    if (sinPower > 0) newCards.push({ id: `sina-${Date.now()}`, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: sinPower, canCycle: (sinPower % 2 === 0), ability: "Primal Spirit.", isBleeding: false });
                    if (cosPower > 0) newCards.push({ id: `cosa-${Date.now()}`, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: cosPower, canCycle: (cosPower % 2 === 0), ability: "Armored Core.", isBleeding: false });
                    logMsg = `A wild spell appears! Refine sin^${sinPower}(x) cos^${cosPower}(x).`;
                } else if (spellType === 1) {
                    const secPower = Math.floor(Math.random() * 3) + 1; 
                    const tanPower = Math.floor(Math.random() * 3) + 1; 
                    if (secPower > 0) newCards.push({ id: `seca-${Date.now()}`, name: 'Seca', type: 'Core', baseTex: '\\sec(x)', baseMath: 'sec(x)', power: secPower, canCycle: (secPower % 2 === 0), ability: "Piercing Spirit.", isBleeding: false });
                    if (tanPower > 0) newCards.push({ id: `tana-${Date.now()}`, name: 'Tana', type: 'Core', baseTex: '\\tan(x)', baseMath: 'tan(x)', power: tanPower, canCycle: (tanPower % 2 === 0), ability: "Shifting Core.", isBleeding: false });
                    logMsg = `A wild spell appears! Refine sec^${secPower}(x) tan^${tanPower}(x).`;
                } else {
                    const xPower = Math.floor(Math.random() * 3) + 1; 
                    newCards.push({ id: `algebraica-${Date.now()}`, name: 'Algebraica', type: 'Core', baseTex: xPower === 1 ? 'x' : `x^${xPower}`, baseMath: xPower === 1 ? 'x' : `x^${xPower}`, power: xPower, canCycle: false, ability: "Algebraic Thread.", isBleeding: false });

                    const ibpType = Math.floor(Math.random() * 3);
                    const trig = ibpType === 0 ? {n:'Expona', t:'e^x', m:'exp(x)'} : (ibpType === 1 ? {n:'Cosa', t:'\\cos(x)', m:'cos(x)'} : {n:'Sina', t:'\\sin(x)', m:'sin(x)'});
                    newCards.push({ id: `trig-${Date.now()}`, name: trig.n, type: 'Core', baseTex: trig.t, baseMath: trig.m, power: 1, canCycle: false, ability: "Eternal Spirit.", isBleeding: false });
                    logMsg = `A wild spell appears! Descent or Dual-Weave required.`;
                }

                newCards.push({ id: `dx-${Date.now()}`, name: 'dx', type: 'Fragment', baseTex: 'dx', baseMath: 'dx', power: 1, canCycle: false, ability: "The Differential Leech.", isBleeding: false, isLeech: true });
                
                setBossCards(newCards);
                setGamePhase('setup'); setIntegrationStep(0); setIntegrationPath(null); setActiveMode(null); setActiveMat(null);
                setAltarCore(null); setAltarSacrifice(null); setAltarExpanded([]);
                setIbpU(null); setIbpDv(null); setIbpDerived(null);
                setTrigSubCard(null); setTabularU([]); setTabularDv([]); setTabularComplete(false);
                addLog(logMsg);
            };

            useEffect(() => { generateSpell(); }, []);

            const selectMat = (matName) => {
                setActiveMode(null); setActiveMat(matName);
                if (matName === 'altar') addLog("Sacrificial Altar Deployed. Slot your Core and Sacrifice into the Mat!");
                else if (matName === 'ibp') addLog("Dual-Weave Mat Deployed. Slot 'u' (Bind) and 'dv' (Poison) to calculate the expansion.");
                else if (matName === 'trigsub') addLog("Rune Circle Deployed. Slot a Trig Spirit to reveal its sacred geometry.");
                else if (matName === 'tabular') addLog("The Abyssal Stair Deployed. Slot a Mortal Coil (x) and an Eternal Echo to begin the descent.");
                else addLog("Mat returned to inventory.");
            };

            const handleCycle = (cardId) => {
                const card = bossCards.find(c => c.id === cardId);
                if (!card) return;

                if (card.name === 'Sina' || card.name === 'Cosa' || card.name === 'Tana' || card.name === 'Seca' || card.type === 'Algebraic') {
                    setMana(m => m + 10); addLog(`Identity Cycled: Extracting mana from the shell. (+10 Mana)`);
                } else if (card.name === 'Residue') {
                    if (mana < 10) { addLog("Not enough Mana! Hardening a Residue costs 10 Mana."); return; }
                    setMana(m => m - 10); addLog(`Identity Cycled: Hardening Residue back into a Core. (-10 Mana)`);
                }

                setBossCards(prev => prev.map(c => {
                    if (c.id === cardId) {
                        if (c.name === 'Sina') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\cos^2(x))', baseMath: '(1-cos(x)^2)', canCycle: true, ability: "Transmuted into Cosine.", isBleeding: false };
                        else if (c.name === 'Cosa') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\sin^2(x))', baseMath: '(1-sin(x)^2)', canCycle: true, ability: "Transmuted into Sine.", isBleeding: false };
                        else if (c.name === 'Tana') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(\\sec^2(x)-1)', baseMath: '(sec(x)^2-1)', canCycle: true, ability: "Transmuted into Secant.", isBleeding: false };
                        else if (c.name === 'Seca') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1+\\tan^2(x))', baseMath: '(1+tan(x)^2)', canCycle: true, ability: "Transmuted into Tangent.", isBleeding: false };
                        else if (c.type === 'Algebraic') {
                            if (c.baseTex.includes('\\sqrt{1-x^2}')) return { ...c, name: 'Sina', type: 'Core', baseTex: '\\sin(\\theta)', baseMath: 'sin(x)', power: 1, canCycle: true, ability: "Transmuted from Geometry." };
                            if (c.baseTex.includes('\\sqrt{x^2+1}')) return { ...c, name: 'Seca', type: 'Core', baseTex: '\\sec(\\theta)', baseMath: 'sec(x)', power: 1, canCycle: true, ability: "Transmuted from Geometry." };
                            if (c.baseTex.includes('\\sqrt{x^2-1}')) return { ...c, name: 'Tana', type: 'Core', baseTex: '\\tan(\\theta)', baseMath: 'tan(x)', power: 1, canCycle: true, ability: "Transmuted from Geometry." };
                        } else {
                            if (c.baseTex && c.baseTex.includes('cos')) return { ...c, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('sin') && !c.baseTex.includes('\\theta')) return { ...c, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('sec')) return { ...c, name: 'Tana', type: 'Core', baseTex: '\\tan(x)', baseMath: 'tan(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('tan')) return { ...c, name: 'Seca', type: 'Core', baseTex: '\\sec(x)', baseMath: 'sec(x)', power: 2, canCycle: true, ability: "Restored Armor.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('\\sin(\\theta)')) return { ...c, name: 'Algebraica', type: 'Algebraic', baseTex: '\\sqrt{1-x^2}', baseMath: 'x', power: 1, canCycle: true, ability: "The Radiant Root.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('\\sec(\\theta)')) return { ...c, name: 'Algebraica', type: 'Algebraic', baseTex: '\\sqrt{x^2+1}', baseMath: 'x', power: 1, canCycle: true, ability: "The Radiant Root.", isBleeding: false };
                            else if (c.baseTex && c.baseTex.includes('\\tan(\\theta)')) return { ...c, name: 'Algebraica', type: 'Algebraic', baseTex: '\\sqrt{x^2-1}', baseMath: 'x', power: 1, canCycle: true, ability: "The Radiant Root.", isBleeding: false };
                        }
                    }
                    return c;
                }));
            };

            const handleBossCardClick = (card) => {
                if (gamePhase !== 'setup') return;

                // Tool: SLICE
                if (activeMode === 'slice') {
                    if (card.power > 1) {
                        setSlashingId(card.id); setMana(m => m + 10);
                        setTimeout(() => {
                            setSlashingId(null); setShatteringId(card.id);
                            setTimeout(() => {
                                const newCards = [...bossCards];
                                const idx = newCards.findIndex(c => c.id === card.id);
                                newCards[idx] = { 
                                    ...card, 
                                    power: card.power - 1, 
                                    canCycle: (['Sina','Cosa','Tana','Seca'].includes(card.name) && (card.power-1)%2===0) 
                                };
                                newCards.splice(idx+1, 0, { id: `f-${Date.now()}`, name: card.name, type: 'Fragment', baseTex: card.baseTex, baseMath: card.baseMath, power: 1, isBleeding: true, ability: "Cleaved Fragment." });
                                setBossCards(newCards); setShatteringId(null); setActiveMode(null);
                            }, 500);
                        }, 300);
                    } else {
                        addLog("Cannot slice a power 1 spirit.");
                    }
                    return;
                }

                // Tool: BLOOD NEEDLE (Make a card bleed manually)
                if (activeMode === 'bleed') {
                    if (card.isBleeding) {
                        addLog("That spirit is already bleeding.");
                        return;
                    }
                    
                    setMana(m => m - 0);
                    setBossCards(prev => prev.map(c => c.id === card.id ? { ...c, isBleeding: true, ability: "Pierced and Bleeding." } : c));
                    setActiveMode(null);
                    addLog(`Pierced the ${card.name}. It is now bleeding!`);
                    return;
                }

                // Tool: WEAVER'S NEEDLE
                if (activeMode === 'stitch_1') {
                    setStitchTargetId(card.id); setActiveMode('stitch_2');
                    addLog(`Selected ${card.name} as the first thread. Select a matching card, or a Leech, to stitch.`);
                    return;
                } else if (activeMode === 'stitch_2') {
                    if (card.id === stitchTargetId) { addLog("Cannot stitch a card to itself."); return; }
                    const target1 = bossCards.find(c => c.id === stitchTargetId);
                    const target2 = card;
                    
                    const isLeech1 = target1.isLeech || target1.name === 'dx' || target1.name === 'dθ';
                    const isLeech2 = target2.isLeech || target2.name === 'dx' || target2.name === 'dθ';
                    
                    // Stitching a Bleeding Spirit to a Leech
                    if ((isLeech1 && target2.isBleeding) || (isLeech2 && target1.isBleeding)) {
                        if (mana < 10) { addLog("Not enough Mana! Stitching to a Leech costs 10 Mana."); setActiveMode(null); setStitchTargetId(null); return; }
                        const leech = isLeech1 ? target1 : target2;
                        const ghost = isLeech1 ? target2 : target1;
                        
                        let ghostTex = ghost.baseTex;
                        if (ghost.power > 1) {
                            if (ghost.name === 'Seca') ghostTex = `\\sec^${ghost.power}(x)`;
                            else if (ghost.name === 'Tana') ghostTex = `\\tan^${ghost.power}(x)`;
                            else if (ghost.name === 'Sina') ghostTex = `\\sin^${ghost.power}(x)`;
                            else if (ghost.name === 'Cosa') ghostTex = `\\cos^${ghost.power}(x)`;
                            else ghostTex = `${ghost.baseTex}^${ghost.power}`;
                        }

                        setMana(m => m - 10);
                        const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                        newCards.push({ id: `compound-${Date.now()}`, name: 'Compound', type: 'Sacrifice', baseTex: `${ghostTex} \\, ${leech.baseTex}`, baseMath: `${ghost.baseMath}*${leech.baseMath}`, power: 1, canCycle: false, isBleeding: true, ability: "True Differential. Ready for Altar." });
                        setBossCards(newCards); setStitchTargetId(null); setActiveMode(null);
                        addLog(`Stitched the Differential! The Leech is full. (-10 Mana)`);
                        return;
                    }

                    // Special Logic for Sec(x)Tan(x) fusion
                    if ((target1.baseTex?.includes('sec') && target2.baseTex?.includes('tan')) || (target1.baseTex?.includes('tan') && target2.baseTex?.includes('sec'))) {
                        if (target1.power === 1 && target2.power === 1 && mana >= 10) {
                            setMana(m => m - 10);
                            const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                            newCards.push({ id: `sectan-${Date.now()}`, name: 'Fragment', type: 'Fragment', baseTex: '\\sec(x)\\tan(x)', baseMath: 'sec(x)*tan(x)', power: 1, canCycle: false, isBleeding: true, ability: "Fused Derivative Ghost." });
                            setBossCards(newCards); setStitchTargetId(null); setActiveMode(null);
                            addLog("Stitched distinct spirits... A Secant/Tangent Ghost created! Sew it to a Leech next. (-10 Mana)");
                            return;
                        }
                    }

                    // Standard Power Combine
                    if (target1.baseTex === target2.baseTex) {
                        if (mana < 10) { addLog("Not enough Mana! Sewing fragments costs 10 Mana."); setActiveMode(null); setStitchTargetId(null); return; }
                        addLog(`Stitching identical spirits... Exponents combined! (-10 Mana)`);
                        setMana(m => m - 10);
                        const newPower = target1.power + target2.power;
                        let resolvedType = target1.type;
                        if (['Sina', 'Cosa', 'Tana', 'Seca'].includes(target1.name)) resolvedType = 'Core';
                        const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                        newCards.push({ ...target1, id: `stitched-${Date.now()}`, power: newPower, type: resolvedType, baseTex: target1.name === 'Algebraica' ? `x^${newPower}` : target1.baseTex, baseMath: target1.name === 'Algebraica' ? `x^${newPower}` : target1.baseMath, canCycle: (['Sina', 'Cosa', 'Tana', 'Seca'].includes(target1.name) && newPower % 2 === 0), isBleeding: false, ability: `Combined Exponent: The weave grows thicker.` });
                        setBossCards(newCards); setStitchTargetId(null); setActiveMode(null);
                    } else {
                        addLog("Incompatible spirits. Stitching generally requires matching identities, or sewing to a Leech.");
                        setActiveMode('stitch_1'); setStitchTargetId(null);
                    }
                    return;
                }

                if (activeMat === 'altar') {
                    if (!altarCore) {
                        if (card.baseTex?.includes('sin') || card.baseTex?.includes('cos') || card.baseTex?.includes('tan') || card.baseTex?.includes('sec')) {
                            let coreFamily = '';
                            if (card.baseTex.includes('sin')) coreFamily = 'sin';
                            else if (card.baseTex.includes('cos')) coreFamily = 'cos';
                            else if (card.baseTex.includes('tan')) coreFamily = 'tan';
                            else if (card.baseTex.includes('sec')) coreFamily = 'sec';
                            
                            setAltarCore({ ...card, family: coreFamily });
                            setBossCards(prev => prev.filter(c => c.id !== card.id));
                            addLog(`Slotted ${card.name} into the Core. Now provide an appropriate sacrifice.`);
                        } else { addLog("The Altar only accepts Trigonometric Cores."); }
                        return;
                    }
                    if (altarCore && !altarSacrifice) {
                        let isValid = false;
                        if (altarCore.family === 'sin' && card.name === 'Compound' && card.baseTex.includes('\\cos')) isValid = true;
                        if (altarCore.family === 'cos' && card.name === 'Compound' && card.baseTex.includes('\\sin')) isValid = true;
                        if (altarCore.family === 'tan' && card.name === 'Compound' && card.baseTex.includes('\\sec^2')) isValid = true;
                        if (altarCore.family === 'sec' && card.name === 'Compound' && card.baseTex.includes('\\sec') && card.baseTex.includes('\\tan')) isValid = true;

                        if (isValid) {
                            setAltarSacrifice(card); setBossCards(prev => prev.filter(c => c.id !== card.id));
                            addLog("True Sacrifice accepted! Now move all remaining equation cards into the Expanded Weave.");
                        } else { addLog(`Invalid sacrifice! This Core demands a specific Compound True Differential as tribute.`); }
                        return;
                    }
                    if (altarCore && altarSacrifice) {
                        setAltarExpanded([...altarExpanded, card]); setBossCards(prev => prev.filter(c => c.id !== card.id));
                        addLog(`${card.name} slotted into the Expanded Weave.`); return;
                    }
                }
                
                if (activeMat === 'tabular') {
                    if (!tabularU.length) { setTabularU([card]); setBossCards(prev => prev.filter(c => c.id !== card.id)); return; }
                    if (!tabularDv.length) { setTabularDv([card]); setBossCards(prev => prev.filter(c => c.id !== card.id)); return; }
                    return;
                }
                
                if (activeMat === 'ibp') {
                    if (!ibpU) { setIbpU(card); setBossCards(prev => prev.filter(c => c.id !== card.id)); return; }
                    setIbpDv(card); setBossCards(prev => prev.filter(c => c.id !== card.id));
                    let du = 'du';
                    try { du = math.derivative(card.baseMath, 'x').toTex(); } catch(e){}
                    setIbpDerived({ duTex: du, vTex: '\\int dv' });
                    return;
                }
                
                if (activeMat === 'trigsub') { setTrigSubCard(card); setBossCards(prev => prev.filter(c => c.id !== card.id)); return; }
            };

            const handleAltarClick = (role, id) => {
                if (role === 'core') { setBossCards(prev => [...prev, altarCore]); setAltarCore(null); addLog("Core returned to the board."); } 
                else if (role === 'sacrifice') { setBossCards(prev => [...prev, altarSacrifice]); setAltarSacrifice(null); addLog("Sacrifice returned to the board."); } 
                else if (role === 'expanded') {
                    const cardToReturn = altarExpanded.find(c => c.id === id);
                    setBossCards(prev => [...prev, cardToReturn]);
                    setAltarExpanded(prev => prev.filter(c => c.id !== id));
                    addLog(`${cardToReturn.name} returned to the board.`);
                }
            };

            const handleIbpClick = (role) => {
                if (role === 'u') { setBossCards(prev => [...prev, ibpU]); setIbpU(null); setIbpDerived(null); addLog("'u' binding released."); } 
                else if (role === 'dv') { setBossCards(prev => [...prev, ibpDv]); setIbpDv(null); setIbpDerived(null); addLog("'dv' poison released."); }
            };

            const handleTrigSubClick = () => {
                if (trigSubCard) { setBossCards(prev => [...prev, trigSubCard]); setTrigSubCard(null); addLog("Spirit returned to the board."); }
            };

            const extractGeometry = () => {
                if (!trigSubCard) return;
                setMana(m => m + 20);
                
                let xTex, dxTex, radTex;
                if (trigSubCard.name === 'Sina') { xTex = '\\sin(\\theta)'; dxTex = '\\cos(\\theta)'; radTex = '\\sqrt{1-x^2}'; }
                else if (trigSubCard.name === 'Tana') { xTex = '\\tan(\\theta)'; dxTex = '\\sec^2(\\theta)'; radTex = '\\sqrt{x^2+1}'; }
                else if (trigSubCard.name === 'Seca') { xTex = '\\sec(\\theta)'; dxTex = '\\sec(\\theta)\\tan(\\theta)'; radTex = '\\sqrt{x^2-1}'; }
                else { xTex = '\\cos(\\theta)'; dxTex = '-\\sin(\\theta)'; radTex = '\\sqrt{1-x^2}'; }

                const newCards = [
                    { id: `geo-x-${Date.now()}`, name: 'Algebraica', type: 'Algebraic', baseTex: xTex, baseMath: 'x', power: 1, canCycle: false, ability: "Extracted Identity.", isBleeding: false },
                    { id: `geo-dtheta-${Date.now()}`, name: 'dθ', type: 'Fragment', baseTex: 'd\\theta', baseMath: 'dtheta', power: 1, canCycle: false, ability: "The New Leech.", isBleeding: false, isLeech: true },
                    { id: `geo-trig-${Date.now()}`, name: 'Fragment', type: 'Fragment', baseTex: dxTex, baseMath: 'dx', power: 1, canCycle: false, ability: "The Geometric Ghost.", isBleeding: true },
                    { id: `geo-rad-${Date.now()}`, name: 'Algebraica', type: 'Algebraic', baseTex: radTex, baseMath: 'x', power: 1, canCycle: true, ability: "The Radiant Root.", isBleeding: false }
                ];

                setBossCards(prev => [...prev, ...newCards]);
                setTrigSubCard(null); setActiveMat(null);
                addLog("Sacred Geometry Extracted! Geometry and Differential Fragments materialized.");
            };

            const transmuteRune = () => {
                if (!trigSubCard) return;
                setMana(m => m + 30);
                const newKaTeX = trigSubCard.name === 'Sina' ? '\\frac{1 - \\cos(2x)}{2}' : '\\frac{1 + \\cos(2x)}{2}';
                setBossCards(prev => [ ...prev, { id: `resonant-${Date.now()}`, name: 'Resonant Core', type: 'Resonant', baseTex: newKaTeX, baseMath: '', power: trigSubCard.power / 2, canCycle: false, ability: "Transmuted via Half-Angle Identity.", isBleeding: false } ]);
                setTrigSubCard(null); setActiveMat(null);
                addLog("Transmutation complete! The Rune Circle fades.");
            };

            const collapseWeave = () => {
                let expectedExpandedName = '';
                let expectedResidueTex = '';
                let coreFamily = altarCore.family;

                if (coreFamily === 'sin') { expectedExpandedName = 'Sina'; expectedResidueTex = '(1-\\sin^2(x))'; }
                else if (coreFamily === 'cos') { expectedExpandedName = 'Cosa'; expectedResidueTex = '(1-\\cos^2(x))'; }
                else if (coreFamily === 'tan') { expectedExpandedName = 'Tana'; expectedResidueTex = '(\\sec^2(x)-1)'; }
                else if (coreFamily === 'sec') { expectedExpandedName = 'Seca'; expectedResidueTex = '(1+\\tan^2(x))'; }

                const isInvalid = altarExpanded.some(c => {
                    const isBaseMatch = c.baseTex && (c.baseTex.includes(coreFamily) || c.baseTex === expectedResidueTex);
                    return !isBaseMatch; 
                });

                if (isInvalid) { addLog("The Weave is unstable! You left unconverted opposite spirits in the Expanded Weave. Cycle them into Residue first."); return; }

                let uPower = altarCore.power;
                let residueCount = 0;
                altarExpanded.forEach(c => {
                    if (c.baseTex && c.baseTex.includes(coreFamily) && !c.name.includes('Residue')) uPower += c.power;
                    if (c.name === 'Residue' || c.baseTex === expectedResidueTex) residueCount++;
                });

                if (residueCount > 1) { addLog("The Altar can only process one Residue at a time right now. The spell is too complex!"); return; }

                addLog("Altar rituals complete! The Weave collapses into a U-State.");
                setConsumeAll(true); setMana(m => m + 50);

                setTimeout(() => {
                    let sign = (coreFamily === 'cos') ? -1 : 1; 
                    let terms = [];
                    if (residueCount === 0) { terms.push({ c: sign, p: uPower }); } 
                    else {
                        if (coreFamily === 'tan') { terms.push({ c: sign, p: uPower + 2 }); terms.push({ c: -sign, p: uPower }); } 
                        else if (coreFamily === 'sec') { terms.push({ c: sign, p: uPower }); terms.push({ c: sign, p: uPower + 2 }); } 
                        else { terms.push({ c: sign, p: uPower }); terms.push({ c: -sign, p: uPower + 2 }); }
                    }
                    terms.sort((a,b) => a.p - b.p);

                    let initialEq = '';
                    if (residueCount === 1) { 
                        let rText = '(1-u^2)';
                        if (coreFamily === 'tan') rText = '(u^2-1)';
                        if (coreFamily === 'sec') rText = '(1+u^2)';
                        initialEq = `${sign === -1 ? '-' : ''}\\int ${uPower===1 ? 'u' : `u^${uPower}`}${rText} \\, du`; 
                    } 
                    else { initialEq = `${sign === -1 ? '-' : ''}\\int ${uPower===1 ? 'u' : `u^${uPower}`} \\, du`; }

                    setBossCards([{ id: 'u-state', name: 'U-State', type: 'Unresolved', baseTex: initialEq, power: 1, canCycle: false, ability: residueCount === 1 ? "Needs Distribution." : "Needs Power Rule.", isBleeding: false, meta: { terms, hasResidue: residueCount === 1 } }]);
                    setConsumeAll(false); setActiveMat(null); setAltarCore(null); setAltarSacrifice(null); setAltarExpanded([]);
                    setIntegrationPath('altar'); setIntegrationStep(residueCount === 1 ? 0 : 2); setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a U-State. Use Rule Tokens to refine it.");
                }, 1000);
            };

            const confirmIbpWeave = () => {
                addLog("Dual-Weave executed! The equation collapses into the Final Form.");
                setConsumeAll(true); setMana(m => m + 50);
                setTimeout(() => {
                    const uTex = ibpU.baseTex; let vTex = ibpDerived.vTex; const duTex = ibpDerived.duTex;
                    let uvTex = `${uTex}${vTex}`;
                    if (vTex === '-\\cos(x)') uvTex = `-${uTex}\\cos(x)`;
                    setBossCards([{ id: 'ibp-state', name: 'IBP-State', type: 'Unresolved', baseTex: `${uvTex} - \\int ${vTex} \\cdot ${duTex} \\, dx`, power: 1, canCycle: false, ability: "Needs Inner Integral Simplification.", isBleeding: false, meta: { uTex, vTex, duTex, uvTex } }]);
                    setConsumeAll(false); setActiveMat(null); setIbpU(null); setIbpDv(null); setIbpDerived(null);
                    setIntegrationPath('ibp'); setIntegrationStep(0); setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a Dual-Weave State. Refine the remaining integral.");
                }, 1000);
            };

            const stepIntoAbyss = () => {
                const lastU = tabularU[tabularU.length - 1];
                const lastDv = tabularDv[tabularDv.length - 1];
                let nU = { ...lastU, id: `u-${Date.now()}` };
                try {
                    const node = math.derivative(lastU.baseMath, 'x');
                    nU.baseMath = node.toString(); nU.baseTex = node.toTex().replace(/~/g, '');
                    if (nU.baseMath === '0') { nU.name = 'Dust'; nU.type = 'Void'; nU.isBleeding = false; setTabularComplete(true); }
                    else { nU.name = 'Bleeding Coil'; nU.type = 'Derived'; nU.isBleeding = true; }
                } catch(e) {}
                
                let nDv = { ...lastDv, id: `dv-${Date.now()}`, name: 'Echo', type: 'Resonant' };
                if (lastDv.baseMath.includes('exp')) { nDv.baseTex = 'e^x'; nDv.baseMath = 'exp(x)'; }
                else if (lastDv.baseMath === 'sin(x)') { nDv.baseTex = '-\\cos(x)'; nDv.baseMath = '-cos(x)'; }
                else if (lastDv.baseMath === '-cos(x)') { nDv.baseTex = '-\\sin(x)'; nDv.baseMath = '-sin(x)'; }
                else if (lastDv.baseMath === '-sin(x)') { nDv.baseTex = '\\cos(x)'; nDv.baseMath = 'cos(x)'; }
                else { nDv.baseTex = '\\sin(x)'; nDv.baseMath = 'sin(x)'; }

                setTabularU([...tabularU, nU]); setTabularDv([...tabularDv, nDv]);
                addLog(nU.name === 'Dust' ? "The Coil turns to dust." : "The Stairway descends.");
            };

            const reapEchoes = () => {
                setMana(m => m + 100); setConsumeAll(true);
                setTimeout(() => {
                    let finalTex = '';
                    for (let i = 0; i < tabularU.length - 1; i++) {
                        const sign = i % 2 === 0 ? '+' : '-';
                        let uTerm = tabularU[i].baseTex; let dvTerm = tabularDv[i+1].baseTex;
                        if (uTerm === '1') uTerm = '';
                        let termTex = '';
                        if (dvTerm === '-\\cos(x)' || dvTerm === '-\\sin(x)') {
                            dvTerm = dvTerm.replace('-', '');
                            termTex = ` ${sign === '+' ? '-' : '+'} ${uTerm}${dvTerm}`;
                        } else { termTex = ` ${sign} ${uTerm}${dvTerm}`; }
                        if (i === 0 && termTex.trim().startsWith('+')) finalTex += termTex.replace('+', '').trim();
                        else finalTex += termTex;
                    }
                    setBossCards([{ id: 'tabular-state', name: 'Tabular-State', type: 'Unresolved', baseTex: finalTex, power: 1, canCycle: false, ability: "Needs Constant of Integration.", isBleeding: false }]);
                    setConsumeAll(false); setActiveMat(null); setTabularU([]); setTabularDv([]); setTabularComplete(false);
                    setIntegrationPath('tabular'); setIntegrationStep(3); setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a Tabular State. Finalize the refinement.");
                }, 1000);
            };

            const applyIntegrationRule = (t) => {
                if (mana < 10) return;
                if (integrationPath === 'tabular' && t === 'plus_c') {
                    setMana(m => m - 10 + 300); setIntegrationStep(4);
                    setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C' }]);
                    addLog("Token Applied: Added +C. REFINEMENT COMPLETE!");
                } else if (integrationPath === 'altar') {
                    setMana(m => m - 10);
                    if (t === 'action1') { setIntegrationStep(1); setBossCards([{...bossCards[0], baseTex: `\\int (${bossCards[0].meta.terms.map((x,i)=>(x.c<0?'-':(i>0?'+':''))+(x.p===1?'u':`u^${x.p}`)).join(' ')}) du`}]); }
                    else if (t === 'action2') { setIntegrationStep(2); setBossCards([{...bossCards[0], baseTex: bossCards[0].meta.terms.map((x,i)=>(x.c<0?'-':(i>0?'+':''))+`\\int ${x.p===1?'u':`u^${x.p}`} du`).join(' ')}]); }
                    else if (t === 'action3') { setIntegrationStep(3); setBossCards([{...bossCards[0], baseTex: bossCards[0].meta.terms.map((x,i)=>(x.c<0?'-':(i>0?'+':''))+`\\frac{u^{${x.p+1}}}{${x.p+1}}`).join(' ')}]); }
                    else if (t === 'plus_c') { setMana(m=>m+200); setIntegrationStep(4); setBossCards([{...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C'}]); }
                } else if (integrationPath === 'ibp') {
                    setMana(m => m - 10);
                    const meta = bossCards[0].meta;
                    if (t === 'action1') { setIntegrationStep(1); setBossCards([{...bossCards[0], baseTex: `${meta.uvTex} - \\int ${meta.vTex==='-\\cos(x)'?'-\\cos(x)':meta.vTex} dx`}]); }
                    else if (t === 'action2') { setIntegrationStep(2); setBossCards([{...bossCards[0], baseTex: `${meta.uvTex} - (${meta.vTex==='\\sin(x)'?'-\\cos(x)':(meta.vTex==='-\\cos(x)'?'-\\sin(x)':'\\ln|\\sec(x)|')})`}]); }
                    else if (t === 'action3') { setIntegrationStep(3); setBossCards([{...bossCards[0], baseTex: `${meta.uvTex} ${meta.vTex==='\\sin(x)'?'+ \\cos(x)':(meta.vTex==='-\\cos(x)'?'+ \\sin(x)':'- \\ln|\\sec(x)|')}`}]); }
                    else if (t === 'plus_c') { setMana(m=>m+200); setIntegrationStep(4); setBossCards([{...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C'}]); }
                }
            };

            const boardBorder = activeMat === 'altar' ? "border-red-900/50" : activeMat === 'ibp' ? "border-fuchsia-900/50" : activeMat === 'trigsub' ? "border-amber-900/50" : activeMat === 'tabular' ? "border-teal-900/50" : "border-white/5";
            const currentLabels = integrationPath === 'tabular' ? ['-','-','-'] : ['Distribute', 'Linearity', 'Power Rule'];

            return (
                <div className="min-h-screen p-8 flex flex-col items-center max-w-7xl mx-auto">
                    <header className="mb-6 w-full flex justify-between items-end border-b border-white/10 pb-4">
                        <div><h1 className="text-4xl font-black tracking-tighter text-white">INTEGRALIA</h1><p className="text-xs text-blue-500 uppercase font-bold tracking-[0.3em]">The Art of Mana Refinement</p></div>
                        <div className="text-right"><div className="flex items-center gap-3"><div className="w-48 h-3 bg-gray-900 rounded-full border border-white/5 overflow-hidden mana-bar-glow"><div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${Math.min(mana/500*100, 100)}%` }}></div></div><span className="text-3xl font-mono text-blue-400 font-bold">{mana}</span></div></div>
                    </header>

                    <div className="w-full flex gap-6 mb-6 min-h-[450px] transition-all">
                        <div className={`bg-gray-950 border rounded-[2rem] p-6 flex flex-col items-center relative overflow-hidden transition-all ${activeMat ? 'w-4/12' : 'w-full'} ${boardBorder}`}>
                            <div className="flex flex-row items-center justify-center gap-4 flex-wrap z-20 w-full h-full">
                                {bossCards.length > 0 && <div className="text-6xl text-white/10 font-serif">∫</div>}
                                {bossCards.map(c => <BattleCard key={c.id} card={c} scale={activeMat ? 'scale-75' : 'scale-95'} onClick={() => handleBossCardClick(c)} onCycle={handleCycle} isSlashing={slashingId === c.id} isShattering={shatteringId === c.id} isConsumed={consumeAll} isActive={activeMode==='slice' || activeMode==='bleed' || activeMode==='stitch_1' || (activeMat==='altar' && !altarCore) || (activeMat==='tabular' && !tabularU.length) || (activeMat==='ibp' && !ibpU) || (activeMat==='trigsub' && !trigSubCard)} isStitchTarget={stitchTargetId === c.id || activeMode === 'stitch_2'} />)}
                            </div>
                        </div>

                        {activeMat === 'altar' && (
                            <div className="w-8/12 bg-red-950/10 border-2 border-red-900/40 rounded-[2rem] p-6 flex flex-col animate-slide-left">
                                <h2 className="text-red-500/50 text-xs font-black uppercase text-center mb-4">Sacrificial Altar</h2>
                                <div className="flex justify-center gap-6">
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center">{altarCore ? <BattleCard card={altarCore} scale="scale-75" onClick={() => handleAltarClick('core')} /> : <span className="text-red-900/40 text-[10px] uppercase font-bold">Core (u)</span>}</div>
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center">{altarSacrifice ? <BattleCard card={altarSacrifice} scale="scale-75" onClick={() => handleAltarClick('sacrifice')} /> : <span className="text-red-900/40 text-[10px] uppercase font-bold text-center">True Differential<br/>(Compound du)</span>}</div>
                                </div>
                                <div className="mt-4 flex-1 border-t border-red-900/20 pt-4 flex flex-wrap justify-center gap-2">
                                    {altarExpanded.map(c => <BattleCard key={c.id} card={c} scale="scale-[0.5]" onClick={() => handleAltarClick('expanded', c.id)} />)}
                                </div>
                                {altarCore && altarSacrifice && <button onClick={collapseWeave} className="mt-4 bg-red-600 py-3 rounded-full font-black uppercase text-xs tracking-widest hover:bg-red-500 shadow-[0_0_20px_rgba(220,38,38,0.5)]">Collapse Weave</button>}
                            </div>
                        )}

                        {activeMat === 'trigsub' && (
                            <div className="w-8/12 bg-amber-950/10 border-2 border-amber-900/40 rounded-[2rem] p-6 flex flex-col items-center animate-slide-left">
                                <h2 className="text-amber-500/50 text-xs font-black uppercase mb-8">Rune Circle</h2>
                                <div className="flex items-center gap-12">
                                    <div className="w-[200px] h-[200px] rounded-full border-4 border-dashed border-amber-900/40 flex items-center justify-center">{trigSubCard ? <BattleCard card={trigSubCard} scale="scale-75" onClick={handleTrigSubClick} /> : <span className="text-amber-900/40 text-[10px] uppercase font-bold">Trig Spirit</span>}</div>
                                    {trigSubCard && (
                                        <div className="w-[200px] h-[200px] relative cursor-pointer group" onClick={extractGeometry}>
                                            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(245,158,11,0.5)] group-hover:drop-shadow-[0_0_30px_rgba(245,158,11,0.8)] transition-all group-hover:scale-105"><polygon points="10,90 90,90 90,10" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" strokeWidth="3" strokeLinejoin="round" /> <rect x="80" y="80" width="10" height="10" fill="none" stroke="#f59e0b" strokeWidth="2" /><path d="M 25 90 A 15 15 0 0 0 22 80" fill="none" stroke="#f59e0b" strokeWidth="2" /><text x="25" y="86" fontSize="10" fill="#fcd34d" fontStyle="italic">θ</text></svg>
                                            <div className="absolute top-1/2 right-[-20px] -translate-y-1/2 text-amber-200 font-serif text-xl pointer-events-none"><MathEquation equation={trigSubCard.name === 'Sina' ? 'x' : (trigSubCard.name === 'Tana' ? 'x' : (trigSubCard.name === 'Seca' ? '\\sqrt{x^2-1}' : '\\sqrt{1-x^2}'))} size="text-xl" /></div>
                                            <div className="absolute bottom-[-20px] left-1/2 -translate-x-1/2 text-amber-200 font-serif text-xl pointer-events-none"><MathEquation equation={trigSubCard.name === 'Sina' ? '\\sqrt{1-x^2}' : (trigSubCard.name === 'Tana' ? '1' : (trigSubCard.name === 'Seca' ? '1' : 'x'))} size="text-xl" /></div>
                                            <div className="absolute top-[40%] left-[30%] -translate-x-1/2 -translate-y-1/2 text-amber-200 font-serif text-xl rotate-[-45deg] pointer-events-none"><MathEquation equation={trigSubCard.name === 'Sina' ? '1' : (trigSubCard.name === 'Tana' ? '\\sqrt{x^2+1}' : (trigSubCard.name === 'Seca' ? 'x' : '1'))} size="text-xl" /></div>
                                            <button onClick={extractGeometry} className="absolute -bottom-8 left-1/2 -translate-x-1/2 px-6 py-2 bg-amber-600/80 hover:bg-amber-500 text-white font-black text-[10px] uppercase tracking-[0.2em] rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all">Extract Geometry</button>
                                        </div>
                                    )}
                                </div>
                                {trigSubCard && (trigSubCard.power%2===0) && <button onClick={transmuteRune} className="mt-8 text-amber-500 text-[10px] font-bold underline uppercase tracking-widest hover:text-amber-400">Transmute Half-Angle</button>}
                            </div>
                        )}

                        {activeMat === 'tabular' && (
                            <div className="w-8/12 bg-teal-950/10 border-2 border-teal-900/40 rounded-[2rem] p-6 flex flex-col animate-slide-left overflow-y-auto log-scroll">
                                <h2 className="text-teal-500/50 text-xs font-black uppercase text-center mb-4">Abyssal Stair</h2>
                                {tabularU.length === 0 && <div className="text-teal-900/50 font-bold text-xs uppercase tracking-widest text-center m-auto">The Abyss awaits a Mortal Coil<br/>and an Eternal Echo.</div>}
                                {tabularU.map((u, i) => (
                                    <div key={i} className="flex justify-center gap-12 mb-4 items-center">
                                        <div className="w-[140px]">{i===0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block">Mortal Coil (u)</span>}<BattleCard card={u} scale="scale-75" /></div>
                                        <div className="w-[80px] flex flex-col items-center justify-center relative h-[200px]">
                                            {i < tabularDv.length - 1 && (
                                                <div className="absolute top-[60%] left-1/2 w-full h-full border-l-4 border-b-4 border-dashed border-teal-500/30 rounded-bl-3xl -translate-x-1/2 pointer-events-none">
                                                    <div className={`absolute bottom-[-15px] left-1/2 -translate-x-1/2 text-xl pb-1 font-black ${i%2===0 ? 'text-amber-400 border-amber-500/50' : 'text-red-500 border-red-500/50'} bg-gray-950 rounded-full w-8 h-8 flex items-center justify-center border-2 shadow-[0_0_10px_currentColor]`}>{i%2===0?'+':'-'}</div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="w-[140px]">
                                            {i===0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block">Eternal Echo (dv)</span>}
                                            {tabularDv[i] ? <BattleCard card={tabularDv[i]} scale="scale-75" /> : <div className="w-[190px] h-[270px] scale-75 border-2 border-dashed border-teal-900/50 rounded-2xl flex items-center justify-center bg-black/40"><span className="text-teal-800 text-[10px] uppercase font-bold text-center">Waiting for<br/>Echo</span></div>}
                                        </div>
                                    </div>
                                ))}
                                <div className="flex justify-center gap-4 mt-4">
                                    {tabularU.length > 0 && tabularDv.length > 0 && (!tabularComplete ? <button onClick={stepIntoAbyss} className="bg-teal-900/50 border border-teal-500 hover:bg-teal-800 text-teal-300 px-6 py-2 rounded-full text-[10px] font-bold uppercase">Step into Abyss</button> : <button onClick={reapEchoes} className="bg-teal-600 px-8 py-3 rounded-full font-black uppercase text-xs hover:bg-teal-500 shadow-[0_0_20px_rgba(20,184,166,0.5)]">Reap Echoes</button>)}
                                </div>
                            </div>
                        )}
                        
                        {activeMat === 'ibp' && (
                            <div className="w-8/12 bg-fuchsia-950/10 border-2 border-fuchsia-900/40 rounded-[2rem] p-6 flex flex-col items-center animate-slide-left">
                                <h2 className="text-fuchsia-500/50 text-xs font-black uppercase mb-4">Dual-Weave Mat</h2>
                                <div className="flex justify-center gap-6 w-full">
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center">{ibpU ? <BattleCard card={ibpU} scale="scale-75" onClick={() => handleIbpClick('u')} /> : <span className="text-fuchsia-900/40 text-[10px] uppercase font-bold">Bind (u)</span>}</div>
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center">{ibpDv ? <BattleCard card={ibpDv} scale="scale-75" onClick={() => handleIbpClick('dv')} /> : <span className="text-fuchsia-900/40 text-[10px] uppercase font-bold">Poison (dv)</span>}</div>
                                </div>
                                <div className="w-full border-t border-fuchsia-900/30 pt-4 mt-4 flex flex-col items-center flex-1">
                                    <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Form [ u v - ∫ v du ]</span>
                                    <div className="w-full flex-1 flex justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-fuchsia-900/20">
                                        {!ibpU || !ibpDv || !ibpDerived ? <span className="text-fuchsia-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Bind u and dv to expand the sequence</span> : (
                                            <div className="flex items-center justify-center gap-1 w-full h-full">
                                                <div className="w-[85px]"><BattleCard card={ibpU} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500 font-bold text-2xl mx-1">-</div><div className="text-fuchsia-500/50 font-serif text-4xl mr-1">∫</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived du', type:'Derived', baseTex: ibpDerived.duTex, power: 1}} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold ml-1">dx</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {ibpU && ibpDv && <button onClick={confirmIbpWeave} className="mt-4 bg-fuchsia-600 px-10 py-3 rounded-full font-black uppercase text-xs shadow-[0_0_20px_rgba(217,70,239,0.5)] hover:bg-fuchsia-500 hover:scale-105 transition-all">Confirm Weave</button>}
                            </div>
                        )}
                    </div>

                    <div className="w-full flex flex-col gap-6">
                        <div className="w-full h-32 bg-gray-950 border border-white/5 rounded-2xl p-4 log-scroll overflow-y-auto">
                            {logs.map((l, i) => <p key={i} className="text-xs text-gray-500 mb-1 font-mono">> {l}</p>)}
                            <div ref={logEndRef} />
                        </div>

                        {gamePhase === 'setup' && (
                            <div className="grid grid-cols-4 gap-4 w-full">
                                <button onClick={() => setActiveMode('slice')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='slice'?'border-blue-400 bg-blue-900/30':'border-blue-900 bg-gray-900 hover:border-blue-500 hover:bg-gray-800'}`}><span className="text-blue-500 text-[10px] font-black uppercase">Machine</span><br/><span className="font-bold">Slice</span></button>
                                <button onClick={() => { setActiveMode('bleed'); setActiveMat(null); addLog("Blood Needle equipped. Select a spirit to pierce."); }} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='bleed'?'border-red-400 bg-red-900/30':'border-red-900 bg-gray-900 hover:border-red-500 hover:bg-gray-800'}`}><span className="text-red-500 text-[10px] font-black uppercase">Artifact</span><br/><span className="font-bold">Blood Needle</span></button>
                                <button onClick={() => setActiveMode('stitch_1')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='stitch_1'||activeMode==='stitch_2'?'border-emerald-400 bg-emerald-900/30':'border-emerald-900 bg-gray-900 hover:border-emerald-500 hover:bg-gray-800'}`}><span className="text-emerald-500 text-[10px] font-black uppercase">Artifact</span><br/><span className="font-bold">Weaver's Needle</span></button>
                                {activeMode ? (
                                    <button onClick={() => { setActiveMode(null); setStitchTargetId(null); addLog("Tool unequipped."); }} className="p-4 rounded-xl border-2 border-gray-700 bg-gray-800 text-center font-bold text-gray-400 uppercase text-xs hover:bg-gray-700 hover:text-white transition-all">Cancel Tool</button>
                                ) : (
                                    <div className="p-4 rounded-xl border-2 border-transparent bg-transparent"></div>
                                )}

                                <button onClick={() => selectMat('altar')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='altar'?'border-red-400 bg-red-900/30':'border-red-900 bg-gray-900 hover:border-red-500 hover:bg-gray-800'}`}><span className="text-red-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Altar</span></button>
                                <button onClick={() => selectMat('tabular')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='tabular'?'border-teal-400 bg-teal-900/30':'border-teal-900 bg-gray-900 hover:border-teal-500 hover:bg-gray-800'}`}><span className="text-teal-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Abyssal Stair</span></button>
                                <button onClick={() => selectMat('trigsub')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='trigsub'?'border-amber-400 bg-amber-900/30':'border-amber-900 bg-gray-900 hover:border-amber-500 hover:bg-gray-800'}`}><span className="text-amber-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Rune Circle</span></button>
                                <button onClick={() => selectMat('ibp')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='ibp'?'border-fuchsia-400 bg-fuchsia-900/30':'border-fuchsia-900 bg-gray-900 hover:border-fuchsia-500 hover:bg-gray-800'}`}><span className="text-fuchsia-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Dual-Weave</span></button>
                            </div>
                        )}

                        {gamePhase === 'integration' && (
                            <div className="flex flex-col items-center gap-4">
                                <div className="grid grid-cols-4 gap-4 w-full">
                                    <button onClick={()=>applyIntegrationRule('action1')} disabled={integrationStep!==0 || integrationPath==='tabular'} className="p-4 bg-gray-900 border-2 border-fuchsia-900 rounded-xl disabled:opacity-20 font-bold hover:border-fuchsia-500 transition-all">{currentLabels[0]}</button>
                                    <button onClick={()=>applyIntegrationRule('action2')} disabled={integrationStep!==1 || integrationPath==='tabular'} className="p-4 bg-gray-900 border-2 border-fuchsia-900 rounded-xl disabled:opacity-20 font-bold hover:border-fuchsia-500 transition-all">{currentLabels[1]}</button>
                                    <button onClick={()=>applyIntegrationRule('action3')} disabled={integrationStep!==2 && integrationPath!=='tabular'} className="p-4 bg-gray-900 border-2 border-fuchsia-900 rounded-xl disabled:opacity-20 font-bold hover:border-fuchsia-500 transition-all">{currentLabels[2]}</button>
                                    <button onClick={()=>applyIntegrationRule('plus_c')} disabled={integrationStep!==3 && (integrationPath==='tabular' && integrationStep!==4)} className="p-4 bg-gray-900 border-2 border-amber-600 rounded-xl disabled:opacity-20 font-bold hover:border-amber-400 transition-all shadow-[0_0_15px_rgba(245,158,11,0.2)]">Constant (+C)</button>
                                </div>
                                {integrationStep === 4 && <button onClick={generateSpell} className="bg-blue-600 px-12 py-4 rounded-full font-black uppercase tracking-widest animate-pulse mt-8 shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:bg-blue-500 hover:scale-105 transition-all">Summon Next Spell</button>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
