<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 14</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        @keyframes particle-explode { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .particle { position: absolute; top: 50%; left: 50%; animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; z-index: 50; }
        
        @keyframes consume { 0% { transform: scale(1); filter: blur(0); } 100% { transform: scale(0) rotate(180deg); filter: blur(20px); opacity: 0; } }
        .animate-consume { animation: consume 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }

        @keyframes slash {
            0% { clip-path: inset(0 100% 0 0); opacity: 1; }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        .animate-slash {
            position: absolute; top: 45%; left: -20%; right: -20%; height: 8px;
            background: white; box-shadow: 0 0 20px 8px rgba(255,255,255,0.9);
            transform: rotate(-25deg); animation: slash 0.4s ease-out forwards; z-index: 60; pointer-events: none;
        }

        @keyframes bleed { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.3); opacity: 0; } }
        .blood-drop {
            position: absolute; bottom: 0; width: 6px; height: 12px; border-radius: 50%;
            background-color: #dc2626; box-shadow: 0 0 8px #dc2626;
            animation: bleed 1.2s infinite ease-in; z-index: 45; pointer-events: none;
        }
        .drop-1 { left: 20%; animation-delay: 0.1s; }
        .drop-2 { left: 50%; animation-delay: 0.5s; width: 8px; height: 14px; }
        .drop-3 { left: 80%; animation-delay: 0.3s; }

        .mana-bar-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .mat-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathEquation = ({ equation, size = "text-3xl", inline = false, color = "text-yellow-400" }) => {
            const containerRef = useRef();
            useEffect(() => {
                if (containerRef.current && equation) {
                    try { katex.render(equation, containerRef.current, { displayMode: !inline, throwOnError: false }); } 
                    catch (e) { console.error("KaTeX error:", e); }
                }
            }, [equation, inline]);
            return <div ref={containerRef} className={`${size} ${color} drop-shadow-md pointer-events-none`}></div>;
        };

        const ParticleBurst = ({ type }) => {
            const colorClass = (type === 'Sina') ? 'bg-blue-500' : 'bg-yellow-500';
            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const size = 4 + Math.random() * 6;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div key={i} className={`particle ${colorClass} shadow-[0_0_10px_currentColor]`}
                        style={{ width: size, height: size, '--tx': tx, '--ty': ty, clipPath: 'circle(50%)' }} />
                );
            });
            return <div className="absolute inset-0 overflow-visible pointer-events-none z-50">{particles}</div>;
        };

        const BattleCard = ({ card, isActive, isSacrificeTarget, isStitchTarget, onClick, onCycle, isSlashing, isShattering, isConsumed, scale = "scale-100" }) => {
            const renderVisual = () => {
                if (card.name === 'Sina') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="45" fill="#1e3a8a" stroke="#3b82f6" strokeWidth="2" opacity="0.9" />
                            <circle cx="50" cy="50" r="32" fill="#3b82f6" opacity="0.5" />
                            <polygon points="50,25 70,60 30,60" fill="#eab308" />
                        </svg>
                    );
                } else if (card.name === 'Cosa') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            <polygon points="50,15 85,50 50,85 15,50" fill="#eab308" stroke="#ca8a04" strokeWidth="3" />
                            <polyline points="50,15 46,35 55,55 48,70 50,85" fill="none" stroke="#422006" strokeWidth="2" opacity="0.7" />
                            <circle cx="50" cy="50" r="2.5" fill="#3b82f6" />
                            <circle cx="48" cy="78" r="1.5" fill="#60a5fa" />
                        </svg>
                    );
                } else if (card.name === 'Residue' || card.name === 'Compound') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            <polygon points="50,5 95,50 50,95 5,50" fill="#713f12" stroke="#eab308" strokeWidth="2" />
                            <path d="M 20 50 L 80 50 M 50 20 L 50 80" stroke="#facc15" strokeWidth="2" strokeDasharray="4 4" />
                            <circle cx="50" cy="50" r="15" fill="#ca8a04" />
                        </svg>
                    );
                } else if (card.name === 'U-State' || card.name === 'Refined Solution') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" strokeWidth="3" strokeDasharray="5 5" />
                            <text x="50" y="65" fontSize="40" fill="#d8b4fe" textAnchor="middle" fontFamily="serif" fontStyle="italic">u</text>
                        </svg>
                    );
                }
                return null;
            };

            let baseBg = 'bg-gray-900/95';
            let baseBorder = 'border-gray-800 hover:border-gray-600 hover:bg-gray-800';
            
            if (card.name === 'Sina') {
                baseBg = 'bg-blue-950/40';
                baseBorder = 'border-blue-900 hover:border-blue-700 hover:bg-blue-900/60';
            } else if (card.name === 'Cosa' || card.name === 'Residue' || card.name === 'Compound') {
                baseBg = 'bg-yellow-950/40';
                baseBorder = card.name === 'Cosa' ? 'border-yellow-900 hover:border-yellow-700' : 'border-yellow-700 shadow-[inset_0_0_20px_rgba(234,179,8,0.1)] hover:border-yellow-500';
            } else if (card.name === 'U-State' || card.name === 'Refined Solution') {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-900 shadow-[inset_0_0_20px_rgba(168,85,247,0.1)] hover:border-fuchsia-700';
            }

            let borderClass = baseBorder;
            if (isActive) borderClass = 'border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.5)] scale-105';
            if (isStitchTarget) borderClass = 'border-emerald-400 shadow-[0_0_25px_rgba(16,185,129,0.5)] scale-105';
            if (isSacrificeTarget) borderClass = 'border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.7)] scale-105 animate-pulse';

            return (
                <div className={`relative flex flex-col items-center ${isConsumed ? 'animate-consume' : ''} ${scale} origin-center transition-all`}>
                    <div onClick={onClick} className={`relative flex flex-col w-[200px] h-[280px] rounded-2xl border-2 transition-all overflow-visible cursor-pointer z-40 ${baseBg} ${borderClass}`}>
                        
                        {isSlashing && <div className="animate-slash"></div>}

                        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-gray-900 border border-gray-700 rounded text-[9px] font-black tracking-tighter text-gray-500 uppercase z-50">
                            {card.type}
                        </div>

                        {card.canCycle && onCycle && (
                            <div onClick={(e) => { e.stopPropagation(); onCycle(card.id); }}
                                className="absolute -top-4 -left-4 w-10 h-10 rounded-full bg-emerald-900 border-2 border-emerald-400 flex items-center justify-center text-emerald-200 text-xl font-bold shadow-lg z-50 hover:bg-emerald-700 hover:scale-110 transition-transform">
                                ⟳
                            </div>
                        )}

                        {card.isBleeding && (
                            <div className="absolute -bottom-4 -left-4 w-10 h-10 rounded-full bg-red-950 border-2 border-red-500 flex items-center justify-center text-red-400 text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)] z-50">
                                🩸
                            </div>
                        )}

                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-50">
                                {card.power}
                            </div>
                        )}

                        <div className="h-[100px] w-full border-b border-white/5 flex items-center justify-center relative bg-gradient-to-b from-white/5 to-transparent rounded-t-2xl overflow-visible p-4">
                            {isShattering && <ParticleBurst type={card.name} />}
                            <div className={`w-full h-full ${isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"} flex items-center justify-center`}>
                                {renderVisual()}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center px-2">
                            <span className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">{card.name}</span>
                            <div className="pointer-events-none scale-95"><MathEquation equation={card.baseTex} size="text-2xl" /></div>
                        </div>

                        <div className="h-[75px] w-full bg-black/60 border-t border-white/5 rounded-b-2xl p-2 flex items-center justify-center relative">
                            <p className="text-[10px] text-gray-400 text-center leading-tight italic px-1">"{card.ability}"</p>
                            
                            {(card.isBleeding || isSacrificeTarget) && (
                                <>
                                    <div className="blood-drop drop-1"></div>
                                    <div className="blood-drop drop-2"></div>
                                    <div className="blood-drop drop-3"></div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const IntegraliaGame = () => {
            const [mana, setMana] = useState(0);
            const [gamePhase, setGamePhase] = useState('setup');
            const [integrationStep, setIntegrationStep] = useState(0);

            // Board State
            const [bossCards, setBossCards] = useState([
                { id: 'sina-1', name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: 3, canCycle: false, ability: "Vulnerable to Slicing.", isBleeding: false },
                { id: 'cosa-1', name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: 2, canCycle: false, ability: "Armored Core.", isBleeding: false }
            ]);

            // Altar Mat State
            const [altarCore, setAltarCore] = useState(null);
            const [altarSacrifice, setAltarSacrifice] = useState(null);
            const [altarExpanded, setAltarExpanded] = useState([]);

            const [handCards, setHandCards] = useState({ slice: { available: true }, needle: { available: true }, altar: { available: true } });
            const [activeMode, setActiveMode] = useState(null); 
            const [activeMat, setActiveMat] = useState(null); 
            const [matStep, setMatStep] = useState(0); 
            
            const [slashingId, setSlashingId] = useState(null);
            const [shatteringId, setShatteringId] = useState(null);
            const [stitchTargetId, setStitchTargetId] = useState(null);
            const [consumeAll, setConsumeAll] = useState(false);
            
            const [uData, setUData] = useState({ coreFamily: null });
            
            const [logs, setLogs] = useState(["Spell detected: sin³(x)cos²(x). Prepare the board with your Tools and Mats."]);
            const logEndRef = useRef(null);
            const addLog = (msg) => setLogs(prev => [...prev, msg]);
            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            const selectMat = (matName) => {
                setActiveMode(null); // Equipping a mat clears active tools
                setActiveMat(matName);
                setMatStep(0);
                
                if (matName === 'altar') {
                    addLog("Sacrificial Altar Deployed. Select any stable Core on the board to bind it.");
                } else if (matName === 'ibp') {
                    addLog("Dual-Weave Mat (By Parts) Deployed. (Mechanic Unlocking Soon)");
                } else if (matName === 'trigsub') {
                    addLog("Rune Circle (Trig Sub) Deployed. (Mechanic Unlocking Soon)");
                } else {
                    addLog("Mat returned to inventory.");
                }
            };

            const handleCycle = (cardId) => {
                setBossCards(prev => prev.map(c => {
                    if (c.id === cardId) {
                        setMana(m => m + 10);
                        if (c.name === 'Sina') {
                            addLog("Identity Cycled: Extracting mana from the Sine shell.");
                            return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\cos^2(x))', baseMath: '(1-cos(x)^2)', canCycle: true, ability: "Transmuted into the Cosine family.", isBleeding: false };
                        } else {
                            addLog("Identity Cycled: Hardening Residue back into a Sine Core.");
                            return { ...c, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', canCycle: true, ability: "Restored Armor.", isBleeding: false };
                        }
                    }
                    return c;
                }));
            };

            const handleBossCardClick = (card) => {
                if (gamePhase !== 'setup') return;

                // TOOLS TAKE PRIORITY
                if (activeMode) {
                    if (activeMode === 'slice' && card.power > 1) {
                        setSlashingId(card.id);
                        addLog(`Slicing ${card.name}... extracting initial mana.`);
                        setMana(m => m + 10);
                        setTimeout(() => {
                            setSlashingId(null);
                            setShatteringId(card.id);
                            setTimeout(() => {
                                const newCards = [...bossCards];
                                const idx = newCards.findIndex(c => c.id === card.id);
                                newCards[idx] = { 
                                    ...card, 
                                    power: card.power - 1, 
                                    canCycle: (card.name === 'Sina' && card.power - 1 === 2),
                                    isBleeding: false 
                                };
                                newCards.splice(idx + 1, 0, { 
                                    id: `cleaved-${Date.now()}`, 
                                    name: card.name, 
                                    type: 'Fragment', 
                                    baseTex: card.baseTex, 
                                    baseMath: card.baseMath, 
                                    power: 1, 
                                    canCycle: false, 
                                    ability: "Cleaved Fragment. Bleeding mana.", 
                                    isBleeding: true 
                                });
                                setBossCards(newCards);
                                setShatteringId(null);
                                setActiveMode(null);
                            }, 500);
                        }, 300);
                        return;
                    }

                    if (activeMode === 'stitch_1') {
                        setStitchTargetId(card.id);
                        setActiveMode('stitch_2');
                        addLog(`Selected ${card.name} as the first thread. Select a matching card to stitch.`);
                        return;
                    } else if (activeMode === 'stitch_2') {
                        if (card.id === stitchTargetId) { addLog("Cannot stitch a card to itself."); return; }
                        const target1 = bossCards.find(c => c.id === stitchTargetId);
                        const target2 = card;
                        
                        if (target1.name === target2.name) {
                            if (mana < 10) {
                                addLog("Not enough Mana! Sewing fragments costs 10 Mana.");
                                setActiveMode(null);
                                setStitchTargetId(null);
                                return;
                            }
                            addLog(`Stitching identical spirits... Exponents combined! (-10 Mana)`);
                            setMana(m => m - 10);
                            const newPower = target1.power + target2.power;
                            let resolvedType = target1.type;
                            if (target1.name === 'Sina' || target1.name === 'Cosa') resolvedType = 'Core';
                            
                            const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                            newCards.push({
                                ...target1,
                                id: `stitched-${Date.now()}`,
                                power: newPower,
                                type: resolvedType,
                                canCycle: (target1.name === 'Sina' && newPower % 2 === 0),
                                isBleeding: false,
                                ability: `Combined Exponent: The weave grows thicker.`
                            });
                            setBossCards(newCards);
                            setStitchTargetId(null);
                            setActiveMode(null);
                        } else {
                            addLog("Incompatible spirits. Stitching requires matching identities.");
                            setActiveMode('stitch_1');
                            setStitchTargetId(null);
                        }
                        return;
                    }
                }

                // MAT LOGIC (If no tools are active)
                if (!activeMode && activeMat === 'altar') {
                    // Rule 1: Slotting the Core
                    if (!altarCore) {
                        if (card.type === 'Core' || card.name === 'Compound') {
                            const coreFamily = card.name === 'Sina' ? 'sin' : 'cos';
                            addLog(`Slotted ${card.name} as Core. The Altar demands a bleeding sacrifice of opposite type!`);
                            setAltarCore({ ...card, family: coreFamily });
                            setBossCards(prev => prev.filter(c => c.id !== card.id));
                            setMatStep(1);
                        } else {
                            addLog("The Altar requires a stable Core to begin refinement.");
                        }
                        return;
                    }
                    
                    // Rule 2: Slotting the Sacrifice
                    if (altarCore && !altarSacrifice) {
                        if (card.isBleeding && card.power === 1) {
                            const sacrificeFamily = card.name === 'Sina' ? 'sin' : 'cos';
                            if (sacrificeFamily !== altarCore.family) {
                                addLog("Blood Sacrifice accepted! Now place remaining equation cards in the expanded weave.");
                                setAltarSacrifice(card);
                                setBossCards(prev => prev.filter(c => c.id !== card.id));
                            } else {
                                addLog("Invalid sacrifice! The blood must be of the opposite type.");
                            }
                        } else {
                            addLog("The Altar demands a bleeding, power-1 Fragment as sacrifice.");
                        }
                        return;
                    }

                    // Rule 3: Slotting Expanded Weave
                    if (altarCore && altarSacrifice) {
                        addLog(`${card.name} added to the Expanded Weave.`);
                        setAltarExpanded(prev => [...prev, card]);
                        setBossCards(prev => prev.filter(c => c.id !== card.id));
                        return;
                    }
                }
            };

            const handleAltarClick = (role, id) => {
                if (role === 'core') {
                    setBossCards(prev => [...prev, altarCore]);
                    setAltarCore(null);
                    setMatStep(0);
                    addLog("Core removed from Altar.");
                } else if (role === 'sacrifice') {
                    setBossCards(prev => [...prev, altarSacrifice]);
                    setAltarSacrifice(null);
                    addLog("Sacrifice removed from Altar.");
                } else if (role === 'expanded') {
                    const cardToReturn = altarExpanded.find(c => c.id === id);
                    setBossCards(prev => [...prev, cardToReturn]);
                    setAltarExpanded(prev => prev.filter(c => c.id !== id));
                    addLog(`${cardToReturn.name} removed from Altar.`);
                }
            };

            const collapseWeave = () => {
                addLog("Altar rituals complete! The Weave collapses into a U-State.");
                setConsumeAll(true);
                setMana(m => m + 50);
                setTimeout(() => {
                    const hasCompound = altarExpanded.some(c => c.name === 'Compound');
                    const finalEq = hasCompound ? '-\\int(u^2 - u^4) \\, du' : '-\\int(1-u^2)u^2 \\, du';

                    setBossCards([{
                        id: 'u-state', name: 'U-State', type: 'Unresolved',
                        baseTex: finalEq,
                        power: 1, canCycle: false, ability: "Needs Distribution.", isBleeding: false
                    }]);
                    setConsumeAll(false);
                    setActiveMat(null);
                    setAltarCore(null);
                    setAltarSacrifice(null);
                    setAltarExpanded([]);
                    setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a U-State. Use Rule Tokens to refine it.");
                }, 1000);
            };

            const applyIntegrationRule = (ruleType) => {
                if (mana < 10) { addLog("Not enough Mana! You need 10 Mana to cast a Rule Token."); return; }

                if (ruleType === 'distribute' && integrationStep === 0) {
                    setMana(m => m - 10); setIntegrationStep(1);
                    setBossCards([{ ...bossCards[0], baseTex: '-\\int(u^2 - u^4) \\, du', ability: "Needs Linearity Split." }]);
                    addLog("Token Applied: Distributed the powers.");
                } else if (ruleType === 'linearity' && integrationStep === 1) {
                    setMana(m => m - 10); setIntegrationStep(2);
                    setBossCards([{ ...bossCards[0], baseTex: '\\int -u^2 \\, du + \\int u^4 \\, du', ability: "Needs Power Rule." }]);
                    addLog("Token Applied: Split the integral using Linearity.");
                } else if (ruleType === 'power_rule' && integrationStep === 2) {
                    setMana(m => m - 10); setIntegrationStep(3);
                    setBossCards([{ ...bossCards[0], baseTex: '-\\frac{u^3}{3} + \\frac{u^5}{5}', ability: "Needs Constant of Integration." }]);
                    addLog("Token Applied: Executed the Power Rule.");
                } else if (ruleType === 'plus_c' && integrationStep === 3) {
                    setMana(m => m - 10 + 200); setIntegrationStep(4);
                    setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: '-\\frac{u^3}{3} + \\frac{u^5}{5} + C', ability: "Mana Refined. Spell completely dissolved." }]);
                    addLog("Token Applied: Added +C. REFINEMENT COMPLETE! Massive Mana Payout!");
                } else {
                    addLog("You cannot apply that rule right now.");
                }
            };

            let boardBg = "bg-gradient-to-r from-transparent via-blue-900/30 to-transparent";
            let boardBorder = "border-white/5";
            if (activeMat === 'altar') {
                boardBg = "bg-gradient-to-r from-transparent via-red-900/50 to-transparent";
                boardBorder = "border-red-900/50 shadow-[0_0_50px_rgba(220,38,38,0.2)]";
            } else if (activeMat === 'ibp') {
                boardBg = "bg-gradient-to-r from-transparent via-fuchsia-900/50 to-transparent";
                boardBorder = "border-fuchsia-900/50 shadow-[0_0_50px_rgba(217,70,239,0.2)]";
            } else if (activeMat === 'trigsub') {
                boardBg = "bg-gradient-to-r from-transparent via-amber-900/50 to-transparent";
                boardBorder = "border-amber-900/50 shadow-[0_0_50px_rgba(245,158,11,0.2)]";
            }

            return (
                <div className="min-h-screen p-8 flex flex-col items-center max-w-6xl mx-auto">
                    
                    <header className="mb-6 w-full flex justify-between items-end border-b border-white/10 pb-4">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter text-white">INTEGRALIA</h1>
                            <p className="text-xs text-blue-500 uppercase font-bold tracking-[0.3em]">The Art of Mana Refinement</p>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Mana Recovered</span>
                            <div className="flex items-center gap-3">
                                <div className="w-48 h-3 bg-gray-900 rounded-full border border-white/5 overflow-hidden mana-bar-glow">
                                    <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${Math.min(mana / 250 * 100, 100)}%` }}></div>
                                </div>
                                <span className="text-3xl font-mono text-blue-400 font-bold">{mana}</span>
                            </div>
                        </div>
                    </header>

                    {/* MAIN BOARD */}
                    <div className={`w-full bg-gray-950 border rounded-[2rem] pt-12 pb-10 px-8 mb-6 flex flex-col items-center relative shadow-2xl overflow-hidden transition-colors duration-700 ${boardBorder}`}>
                        <div className={`absolute top-0 left-0 w-full h-1 transition-colors duration-700 ${boardBg}`}></div>
                        <h2 className="absolute top-4 text-white/20 text-xs font-black tracking-[0.5em] uppercase">
                            {activeMat === 'altar' ? 'Sacrificial Altar Active' : activeMat === 'ibp' ? 'Dual-Weave Mat Active' : activeMat === 'trigsub' ? 'Rune Circle Active' : 'Used Spell Container'}
                        </h2>
                        
                        <div className={`absolute inset-0 bg-blue-950/10 z-10 transition-opacity duration-1000 ${consumeAll ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}></div>

                        <div className="flex flex-row items-center justify-center gap-10 flex-wrap z-20 w-full min-h-[280px]">
                            {bossCards.length > 0 && <div className={`text-8xl text-white/10 font-serif mr-2 select-none ${consumeAll ? 'animate-consume' : ''}`}>∫</div>}
                            
                            {bossCards.length === 0 && !consumeAll && (
                                <div className="text-gray-600 font-bold tracking-widest uppercase opacity-50">Board Empty</div>
                            )}

                            {bossCards.map((card) => (
                                <BattleCard 
                                    key={card.id} card={card} scale="scale-90"
                                    isActive={activeMode === 'slice' || activeMode === 'stitch_1'}
                                    isStitchTarget={stitchTargetId === card.id || activeMode === 'stitch_2'}
                                    onClick={() => handleBossCardClick(card)}
                                    onCycle={handleCycle}
                                    isSlashing={slashingId === card.id}
                                    isShattering={shatteringId === card.id}
                                    isConsumed={consumeAll}
                                />
                            ))}
                            {bossCards.length > 0 && <div className={`text-5xl text-white/20 font-serif ml-2 italic ${consumeAll ? 'animate-consume' : ''}`}>dx</div>}
                        </div>
                    </div>

                    {/* THE MAT GUI (Only visible when equipped) */}
                    {activeMat === 'altar' && (
                        <div className="w-full bg-red-950/20 border border-red-900/50 rounded-[2rem] p-8 mb-6 flex flex-col items-center relative shadow-[0_0_50px_rgba(220,38,38,0.15)] mat-slide-up">
                            <h2 className="absolute top-4 text-red-500/50 text-xs font-black tracking-[0.5em] uppercase">Sacrificial Altar Mat</h2>
                            
                            <div className="w-full flex justify-around mt-6 mb-8 relative">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-red-500/30 text-6xl font-black">×</div>

                                {/* Core Slot */}
                                <div className="flex flex-col items-center">
                                    <span className="text-red-400 font-bold uppercase tracking-widest text-[10px] mb-2">Slot 1: Core (u)</span>
                                    <div className="w-[180px] h-[250px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                        {altarCore ? (
                                            <BattleCard card={altarCore} scale="scale-90 hover:scale-95" onClick={() => handleAltarClick('core', null)} />
                                        ) : (
                                            <span className="text-red-900 font-bold text-xs uppercase tracking-widest text-center px-4">Click Board Core<br/>to Assign</span>
                                        )}
                                    </div>
                                </div>

                                {/* Sacrifice Slot */}
                                <div className="flex flex-col items-center">
                                    <span className="text-red-400 font-bold uppercase tracking-widest text-[10px] mb-2">Slot 2: Blood Sacrifice (du)</span>
                                    <div className="w-[180px] h-[250px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                        {altarSacrifice ? (
                                            <BattleCard card={altarSacrifice} scale="scale-90 hover:scale-95" onClick={() => handleAltarClick('sacrifice', null)} />
                                        ) : (
                                            <span className="text-red-900 font-bold text-xs uppercase tracking-widest text-center px-4">Click Bleeding Fragment<br/>to Assign</span>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Expanded Weave Bottom Section */}
                            <div className="w-full border-t border-red-900/30 pt-6 flex flex-col items-center">
                                <span className="text-red-400 font-bold uppercase tracking-widest text-[10px] mb-4">Slot 3: Expanded Weave</span>
                                <div className="w-full min-h-[160px] flex flex-wrap justify-center gap-4 bg-black/40 rounded-2xl p-4 border border-red-900/20">
                                    {altarExpanded.length === 0 && (
                                        <div className="w-full flex items-center justify-center text-red-900/50 font-bold text-xs uppercase tracking-widest">
                                            Move all remaining cards here
                                        </div>
                                    )}
                                    {altarExpanded.map((card) => (
                                        <div key={card.id} className="scale-75 origin-top -mt-8">
                                            <BattleCard card={card} onClick={() => handleAltarClick('expanded', card.id)} />
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Collapse Button */}
                            {bossCards.length === 0 && altarCore && altarSacrifice && (
                                <button onClick={collapseWeave} className="mt-8 px-12 py-4 bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(220,38,38,0.6)] hover:shadow-[0_0_50px_rgba(220,38,38,0.8)] transition-all transform hover:scale-105 z-50 relative">
                                    Collapse Weave
                                </button>
                            )}
                        </div>
                    )}

                    <div className="w-full flex flex-col gap-6 mb-8">
                        <div className="w-full h-48 bg-gray-950 border border-white/5 rounded-2xl p-6 relative overflow-hidden flex flex-col">
                            <h3 className="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3 border-b border-white/5 pb-2">Refinement Log</h3>
                            <div className="overflow-y-auto flex-1 log-scroll pr-4">
                                <ul className="space-y-2">
                                    {logs.map((log, idx) => (
                                        <li key={idx} className={`text-sm leading-relaxed ${idx === logs.length - 1 ? 'text-blue-400 font-bold' : 'text-gray-400'}`}>
                                            <span className="opacity-30 mr-2">></span>{log}
                                        </li>
                                    ))}
                                    <div ref={logEndRef} />
                                </ul>
                            </div>
                        </div>

                        {gamePhase === 'setup' && (
                            <>
                                {/* Row 1: Tools */}
                                <div>
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Tools (Overrides Mat)</h3>
                                    <div className="w-full grid grid-cols-3 gap-6">
                                        <button onClick={() => { setActiveMode('slice'); setActiveMat(null); addLog("Slice Primed: Target an Exponent."); }} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'slice' ? 'border-blue-400 bg-blue-950/40 shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'border-blue-900 bg-gray-950 hover:border-blue-500 hover:bg-blue-950/20'}`}>
                                            <span className="text-blue-500 text-[10px] font-black uppercase mb-1">Machine</span>
                                            <span className="text-white font-bold text-lg group-hover:text-blue-400">Slice</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Cleave exponents to fragment components.</p>
                                        </button>

                                        <button onClick={() => { setActiveMode('stitch_1'); setStitchTargetId(null); setActiveMat(null); addLog("Weaver's Needle equipped. Select the first component to stitch."); }} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'stitch_1' || activeMode === 'stitch_2' ? 'border-emerald-400 bg-emerald-950/40 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-emerald-900 bg-gray-950 hover:border-emerald-500 hover:bg-emerald-950/20'}`}>
                                            <span className="text-emerald-500 text-[10px] font-black uppercase mb-1">Artifact</span>
                                            <span className="text-white font-bold text-lg group-hover:text-emerald-400">Weaver's Needle</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Stitches identical spirits together (-10 Mana).</p>
                                        </button>

                                        {activeMode && (
                                            <button onClick={() => { setActiveMode(null); setStitchTargetId(null); addLog("Tool unequipped."); }} 
                                                className="p-4 rounded-2xl border-2 border-gray-800 bg-gray-900 hover:bg-gray-800 transition-all flex items-center justify-center">
                                                <span className="text-gray-400 font-bold uppercase tracking-widest text-xs">Cancel Tool</span>
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* Row 2: Integration Mats */}
                                <div className="mt-4">
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Integration Mats (Play Field)</h3>
                                    <div className="w-full grid grid-cols-3 gap-6">
                                        <button onClick={() => activeMat === 'altar' ? selectMat(null) : selectMat('altar')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'altar' ? 'border-red-400 bg-red-950/40 shadow-[0_0_20px_rgba(220,38,38,0.3)]' : 'border-red-900 bg-gray-950 hover:border-red-500 hover:bg-red-950/20'}`}>
                                            <span className="text-red-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-red-400">Sacrificial Altar</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">U-Substitution. Requires blood sacrifice.</p>
                                        </button>

                                        <button onClick={() => selectMat('ibp')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'ibp' ? 'border-fuchsia-400 bg-fuchsia-950/40 shadow-[0_0_20px_rgba(217,70,239,0.3)]' : 'border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 hover:bg-fuchsia-950/20'}`}>
                                            <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-fuchsia-400">Dual-Weave</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Integration By Parts.</p>
                                        </button>

                                        <button onClick={() => selectMat('trigsub')} 
                                            className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'trigsub' ? 'border-amber-400 bg-amber-950/40 shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'border-amber-900 bg-gray-950 hover:border-amber-500 hover:bg-amber-950/20'}`}>
                                            <span className="text-amber-500 text-[10px] font-black uppercase mb-1">Mat</span>
                                            <span className="text-white font-bold text-lg group-hover:text-amber-400">Rune Circle</span>
                                            <p className="text-xs text-gray-500 mt-2 leading-tight">Trigonometric Substitution.</p>
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}

                        {gamePhase === 'integration' && (
                            <div className="w-full grid grid-cols-4 gap-4">
                                <button onClick={() => applyIntegrationRule('distribute')} disabled={integrationStep !== 0}
                                    className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                    <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                    <span className="text-white font-bold text-lg">Distribute</span>
                                </button>
                                <button onClick={() => applyIntegrationRule('linearity')} disabled={integrationStep !== 1}
                                    className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                    <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                    <span className="text-white font-bold text-lg">Linearity</span>
                                </button>
                                <button onClick={() => applyIntegrationRule('power_rule')} disabled={integrationStep !== 2}
                                    className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20">
                                    <span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                    <span className="text-white font-bold text-lg">Power Rule</span>
                                </button>
                                <button onClick={() => applyIntegrationRule('plus_c')} disabled={integrationStep !== 3}
                                    className="p-4 rounded-xl border-2 border-amber-500 bg-gray-950 hover:border-amber-300 transition-all text-center flex flex-col disabled:opacity-20 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                                    <span className="text-amber-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span>
                                    <span className="text-white font-bold text-lg">Constant (+C)</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
