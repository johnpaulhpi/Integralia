<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 4</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #111827; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        
        /* Smooth dropdown */
        .slide-down { animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Vector Art Animations */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        /* Custom Particle Engine CSS */
        @keyframes particle-explode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; }
        }
        .particle {
            position: absolute;
            top: 50%; left: 50%;
            animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- MATH RENDERER ---
        const MathEquation = ({ equation, size = "text-3xl" }) => {
            const containerRef = useRef();
            useEffect(() => {
                if (containerRef.current && equation) {
                    try {
                        katex.render(equation, containerRef.current, { displayMode: true, throwOnError: false });
                    } catch (e) { console.error("KaTeX error:", e); }
                }
            }, [equation]);
            return <div ref={containerRef} className={`${size} text-yellow-400 drop-shadow-md`}></div>;
        };

        // --- PARTICLE BURST SYSTEM ---
        const ParticleBurst = ({ type }) => {
            // Blue for Sine's soft shell, Yellow for Cosine's hard shell
            const colorClass = type === 'Sina' ? 'bg-blue-500' : 'bg-yellow-500';
            
            // Generate 15 random particles
            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60; // How far they fly
                const size = 4 + Math.random() * 6; // px size
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div 
                        key={i} 
                        className={`particle ${colorClass} shadow-[0_0_10px_currentColor]`}
                        style={{
                            width: size, height: size,
                            '--tx': tx, '--ty': ty,
                            clipPath: type === 'Sina' ? 'circle(50%)' : 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)'
                        }}
                    />
                );
            });

            return <div className="absolute inset-0 overflow-visible pointer-events-none">{particles}</div>;
        };

        // --- THE NEW BATTLE CARD COMPONENT ---
        const BattleCard = ({ card, isActive, onClick, isShattering, children }) => {
            
            // Generate Vector Art based on card name
            const renderVisual = () => {
                if (card.name === 'Sina') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                            {/* Soft Blue Exterior */}
                            <circle cx="50" cy="50" r="45" fill="#3b82f6" opacity="0.9" />
                            <circle cx="35" cy="35" r="15" fill="#60a5fa" opacity="0.5" />
                            {/* Hard Yellow Core */}
                            <polygon points="50,25 75,70 25,70" fill="#eab308" />
                        </svg>
                    );
                } else if (card.name === 'Cosa') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            {/* Hard Yellow Shell */}
                            <polygon points="50,5 95,50 50,95 5,50" fill="#eab308" />
                            <polygon points="50,20 80,50 50,80 20,50" fill="#ca8a04" />
                        </svg>
                    );
                } else {
                    return (
                        <svg viewBox="0 0 100 100" className="w-16 h-16 drop-shadow-md">
                            {/* Default Solid Box for x^n */}
                            <rect x="20" y="20" width="60" height="60" rx="8" fill="#9ca3af" />
                            <rect x="30" y="30" width="40" height="40" rx="4" fill="#6b7280" />
                        </svg>
                    );
                }
            };

            return (
                <div className="relative flex flex-col items-center">
                    <div 
                        onClick={onClick}
                        className={`relative flex flex-col w-[180px] h-[260px] rounded-xl border-2 transition-all bg-gray-900/90 overflow-visible ${
                            isActive 
                            ? 'border-blue-400 shadow-[0_0_25px_rgba(96,165,250,0.5)] scale-105 cursor-pointer z-20' 
                            : 'border-gray-700 hover:border-gray-500 hover:bg-gray-800 cursor-pointer z-10'
                        }`}
                    >
                        {/* Sigils (Absolute positioned outside the normal flow) */}
                        
                        {/* Left Sigil: Modifier (e.g., inverse, root) */}
                        {card.modifier && (
                            <div className="absolute -top-4 -left-4 w-9 h-9 rounded bg-indigo-900 border-2 border-indigo-500 flex items-center justify-center text-indigo-200 font-bold shadow-lg z-30">
                                <MathEquation equation={card.modifier} size="text-sm" inline={true} />
                            </div>
                        )}

                        {/* Right Sigil: Power (Exponent) */}
                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-30">
                                {card.power}
                            </div>
                        )}

                        {/* Top: Vector Art Area */}
                        <div className="h-[90px] w-full border-b border-gray-800 flex items-center justify-center relative bg-gradient-to-b from-gray-800 to-transparent rounded-t-xl overflow-visible">
                            {/* Render particles if this card is shattering */}
                            {isShattering && <ParticleBurst type={card.name} />}
                            {/* Render the actual SVG */}
                            <div className={isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"}>
                                {renderVisual()}
                            </div>
                        </div>

                        {/* Middle: Mathematical Name & Equation */}
                        <div className="flex-1 flex flex-col items-center justify-center px-2">
                            <span className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">{card.name}</span>
                            <div className="pointer-events-none scale-90">
                                <MathEquation equation={card.baseTex} size="text-2xl" />
                            </div>
                        </div>

                        {/* Bottom: Ability Text Area */}
                        <div className="h-[60px] w-full bg-gray-950/50 border-t border-gray-800 rounded-b-xl p-2 flex items-center justify-center">
                            <p className="text-[10px] text-gray-400 text-center leading-tight">
                                {card.ability || "A foundational expression of the weave."}
                            </p>
                        </div>
                    </div>
                    
                    {/* Action Buttons overlay (like Set u / Set dv) */}
                    {children}
                </div>
            );
        };

        // --- MAIN GAME LOGIC ---
        const IntegraliaGame = () => {
            const [bossCards, setBossCards] = useState([
                { id: 'solid-1', name: 'Solid', baseTex: 'x^2', baseMath: 'x^2', power: 1, modifier: null, ability: "The Ladder: Grows heavier when integrated." },
                { id: 'cosa-1', name: 'Cosa', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: 1, modifier: null, ability: "Armored Core: A hard shell that resists basic disruption." }
            ]);

            const [handCards, setHandCards] = useState({ thresh: { available: true }, evoke: { available: true } });
            const [activeMode, setActiveMode] = useState(null);
            
            const [threshTarget, setThreshTarget] = useState(null);
            const [shatteringId, setShatteringId] = useState(null); // ID of the card currently bursting

            const [logs, setLogs] = useState(["The Dark Wizard summons a mixed-type spell. Integration by Parts or Threshing required."]);
            const logEndRef = useRef(null);

            const addLog = (message) => setLogs(prev => [...prev, message]);

            useEffect(() => {
                if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            const handleBossCardClick = (card) => {
                if (activeMode === 'threshing') {
                    if (card.name === 'Cosa' || card.name === 'Sina') {
                        setThreshTarget(card.id);
                        addLog("Lineage exposed. Select an identity.");
                    } else {
                        addLog("Target cannot be threshed. Try a Primal spirit.");
                    }
                }
            };

            const applyLineage = (lineageTex, lineageMath) => {
                // Trigger the particle burst on the targeted card
                setShatteringId(threshTarget);
                addLog("Target transmuted! The shell shatters.");
                
                // Wait for the animation to finish before swapping the card data
                setTimeout(() => {
                    setBossCards(prev => prev.map(c => 
                        c.id === threshTarget 
                        ? { 
                            ...c, 
                            name: 'Transmuted', 
                            baseTex: lineageTex, 
                            baseMath: lineageMath, 
                            id: `transmuted-${Date.now()}`,
                            ability: "Altered State: Lineage forced into the open."
                          }
                        : c
                    ));
                    setShatteringId(null);
                    setThreshTarget(null);
                    setActiveMode(null);
                    setHandCards(prev => ({ ...prev, thresh: { available: false } }));
                }, 500); // 500ms allows the particles to fly out
            };

            return (
                <div className="min-h-screen p-8 flex flex-col items-center max-w-6xl mx-auto">
                    
                    <header className="mb-6 text-center border-b border-gray-700 pb-4 w-full">
                        <h1 className="text-4xl font-bold tracking-widest text-gray-300">INTEGRALIA</h1>
                        <p className="text-sm text-gray-500 uppercase tracking-widest text-purple-400">Card Anatomy Update</p>
                    </header>

                    {/* BOSS LANE */}
                    <div className="w-full bg-gray-900 border border-purple-900 rounded-xl pt-16 pb-12 px-8 mb-6 flex flex-col items-center relative shadow-2xl shadow-purple-900/20 z-10">
                        <h2 className="absolute top-4 text-purple-400 text-sm font-bold tracking-widest">THE WIZARD'S LANE</h2>
                        
                        <div className="flex flex-row items-center justify-center gap-8 flex-wrap mt-4 min-h-[280px]">
                            <div className="text-7xl text-purple-600 font-serif mr-2 select-none font-light">∫</div>

                            {bossCards.map((card) => (
                                <BattleCard 
                                    key={card.id}
                                    card={card}
                                    isActive={activeMode === 'threshing' && threshTarget === card.id}
                                    onClick={() => handleBossCardClick(card)}
                                    isShattering={shatteringId === card.id}
                                />
                            ))}
                            <div className="text-4xl text-purple-600 font-serif ml-2 select-none italic drop-shadow-md">dx</div>
                        </div>

                        {/* Threshing Slide-Down Tray */}
                        {activeMode === 'threshing' && threshTarget && (
                            <div className="absolute -bottom-24 bg-gray-800 border-2 border-blue-900 rounded-xl p-4 flex gap-4 shadow-2xl slide-down z-30 w-3/4 justify-center">
                                <span className="absolute -top-3 bg-gray-900 px-2 text-xs text-blue-400 font-bold uppercase tracking-widest">Lineage Detected</span>
                                <button onClick={() => applyLineage('\\frac{1}{\\sec(x)}', '1/sec(x)')} className="px-6 py-2 bg-gray-900 border border-gray-600 rounded-lg hover:border-blue-400 hover:bg-gray-700 transition flex items-center justify-center min-w-[120px]">
                                    <MathEquation equation="\frac{1}{\sec(x)}" size="text-xl" />
                                </button>
                                <button onClick={() => applyLineage('\\sin(x + \\frac{\\pi}{2})', 'sin(x + pi/2)')} className="px-6 py-2 bg-gray-900 border border-gray-600 rounded-lg hover:border-blue-400 hover:bg-gray-700 transition flex items-center justify-center min-w-[120px]">
                                    <MathEquation equation="\sin(x + \frac{\pi}{2})" size="text-xl" />
                                </button>
                            </div>
                        )}
                    </div>

                    {/* BATTLE LOG */}
                    <div className="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 flex flex-col relative overflow-hidden h-32 mb-6">
                        <h3 className="absolute top-0 left-0 w-full bg-gray-800 text-center text-gray-400 text-xs font-bold uppercase tracking-wider py-1 border-b border-gray-700 z-10">
                            Battle Log
                        </h3>
                        <div className="overflow-y-auto mt-6 flex-1 pr-2 log-scroll">
                            <ul className="space-y-3">
                                {logs.map((log, idx) => (
                                    <li key={idx} className={`text-sm tracking-wide leading-relaxed ${idx === logs.length - 1 ? 'text-white font-semibold' : 'text-gray-500'}`}>
                                        <span className="text-purple-500 mr-2 font-bold">▶</span>{log}
                                    </li>
                                ))}
                                <div ref={logEndRef} />
                            </ul>
                        </div>
                    </div>

                    {/* PLAYER HAND */}
                    <div className="w-full">
                        <div className="grid grid-cols-4 gap-6">
                            {/* Threshing Machine */}
                            <button 
                                onClick={() => { setActiveMode('threshing'); addLog("Threshing Machine active. Select a Primal spirit."); }}
                                disabled={!handCards.thresh.available}
                                className="p-5 rounded-xl border-2 text-left flex flex-col h-48 border-blue-600 bg-gray-800 card-hover hover:border-blue-400 hover:shadow-lg hover:shadow-blue-900/50"
                            >
                                <span className="text-blue-400 text-xs font-bold uppercase tracking-widest mb-1">Machine</span>
                                <span className="text-white font-bold text-lg mb-2">Threshing Machine</span>
                                <div className="mt-auto pt-4 border-t border-gray-700 text-xs text-gray-400 leading-relaxed">
                                    Forces a target to reveal its lineage. Allows you to transmute its identity and shatter its shell.
                                </div>
                            </button>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
