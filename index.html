<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 20</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }

        @keyframes particle-explode { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .particle { position: absolute; top: 50%; left: 50%; animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; z-index: 50; }
        
        @keyframes consume { 0% { transform: scale(1); filter: blur(0); } 100% { transform: scale(0) rotate(180deg); filter: blur(20px); opacity: 0; } }
        .animate-consume { animation: consume 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }

        @keyframes slash {
            0% { clip-path: inset(0 100% 0 0); opacity: 1; }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        .animate-slash {
            position: absolute; top: 45%; left: -20%; right: -20%; height: 8px;
            background: white; box-shadow: 0 0 20px 8px rgba(255,255,255,0.9);
            transform: rotate(-25deg); animation: slash 0.4s ease-out forwards; z-index: 60; pointer-events: none;
        }

        @keyframes bleed { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.3); opacity: 0; } }
        .blood-drop {
            position: absolute; bottom: 0; width: 6px; height: 12px; border-radius: 50%;
            background-color: #dc2626; box-shadow: 0 0 8px #dc2626;
            animation: bleed 1.2s infinite ease-in; z-index: 45; pointer-events: none;
        }
        .drop-1 { left: 20%; animation-delay: 0.1s; }
        .drop-2 { left: 50%; animation-delay: 0.5s; width: 8px; height: 14px; }
        .drop-3 { left: 80%; animation-delay: 0.3s; }

        .mana-bar-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .mat-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathEquation = ({ equation, size = "text-3xl", inline = false, color = "text-yellow-400" }) => {
            const containerRef = useRef();
            useEffect(() => {
                if (containerRef.current && equation) {
                    try { katex.render(equation, containerRef.current, { displayMode: !inline, throwOnError: false }); } 
                    catch (e) { console.error("KaTeX error:", e); }
                }
            }, [equation, inline]);
            return <div ref={containerRef} className={`${size} ${color} drop-shadow-md pointer-events-none`}></div>;
        };

        const ParticleBurst = ({ card }) => {
            let isBlue = false;
            let isCyan = false;
            let isOrange = false;

            if (card.name === 'Sina') isBlue = true;
            if (card.name === 'Seca') isCyan = true;
            if (card.name === 'Tana') isOrange = true;
            if ((card.name === 'Residue' || card.name === 'Compound') && card.baseTex && card.baseTex.includes('sin')) isBlue = true;

            const colorClass = isBlue ? 'bg-blue-500' : (isCyan ? 'bg-cyan-400' : (isOrange ? 'bg-orange-500' : 'bg-yellow-500'));
            
            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const size = 4 + Math.random() * 6;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div key={i} className={`particle ${colorClass} shadow-[0_0_10px_currentColor]`}
                        style={{ width: size, height: size, '--tx': tx, '--ty': ty, clipPath: 'circle(50%)' }} />
                );
            });
            return <div className="absolute inset-0 overflow-visible pointer-events-none z-50">{particles}</div>;
        };

        const BattleCard = ({ card, isActive, isSacrificeTarget, isStitchTarget, onClick, onCycle, isSlashing, isShattering, isConsumed, scale = "scale-100" }) => {
            const renderVisual = () => {
                if (card.name === 'Sina') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="45" fill="#1e3a8a" stroke="#3b82f6" strokeWidth="2" opacity="0.9" />
                            <circle cx="50" cy="50" r="32" fill="#3b82f6" opacity="0.5" />
                            <polygon points="50,25 70,60 30,60" fill="#eab308" />
                        </svg>
                    );
                } else if (card.name === 'Cosa') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                            <polygon points="50,15 85,50 50,85 15,50" fill="#eab308" stroke="#ca8a04" strokeWidth="3" />
                            <polyline points="50,15 46,35 55,55 48,70 50,85" fill="none" stroke="#422006" strokeWidth="2" opacity="0.7" />
                            <circle cx="50" cy="50" r="2.5" fill="#3b82f6" />
                            <circle cx="48" cy="78" r="1.5" fill="#60a5fa" />
                        </svg>
                    );
                } else if (card.name === 'Tana') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(249,115,22,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="35" fill="none" stroke="#ea580c" strokeWidth="4" />
                            <line x1="10" y1="85" x2="90" y2="15" stroke="#fdba74" strokeWidth="4" strokeLinecap="round" />
                            <circle cx="68" cy="34" r="5" fill="#fffedd" />
                        </svg>
                    );
                } else if (card.name === 'Seca') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(45,212,191,0.6)]">
                            <path d="M 20 80 Q 50 10 80 80" fill="none" stroke="#14b8a6" strokeWidth="4" strokeLinecap="round" />
                            <line x1="10" y1="50" x2="90" y2="50" stroke="#5eead4" strokeWidth="2" strokeDasharray="4 4" />
                            <circle cx="50" cy="32" r="4" fill="#ccfbf1" />
                        </svg>
                    );
                } else if (card.name === 'Residue' || card.name === 'Compound') {
                    const isBlue = card.baseTex && card.baseTex.includes('sin');
                    const isCyan = card.baseTex && card.baseTex.includes('sec');
                    const isOrange = card.baseTex && card.baseTex.includes('tan');
                    
                    let mainColor = "#713f12"; // default yellow/cos
                    let strokeColor = "#eab308";
                    let innerColor = "#facc15";

                    if (isBlue) { mainColor = "#1e3a8a"; strokeColor = "#3b82f6"; innerColor = "#60a5fa"; }
                    if (isCyan) { mainColor = "#134e4a"; strokeColor = "#14b8a6"; innerColor = "#5eead4"; }
                    if (isOrange) { mainColor = "#7c2d12"; strokeColor = "#ea580c"; innerColor = "#fb923c"; }
                    
                    const innerPath = card.name === 'Residue' 
                        ? <path d="M 30 50 L 70 50 M 50 30 L 50 70" stroke={innerColor} strokeWidth="2" opacity="0.5" />
                        : <><path d="M 20 50 L 80 50 M 50 20 L 50 80" stroke={innerColor} strokeWidth="2" strokeDasharray="4 4" /><circle cx="50" cy="50" r="15" fill={strokeColor} /></>;

                    return (
                        <svg viewBox="0 0 100 100" className={`w-full h-full drop-shadow-[0_0_15px_rgba(${isBlue?'59,130,246':isCyan?'45,212,191':isOrange?'249,115,22':'234,179,8'},0.5)]`}>
                            <polygon points="50,5 95,50 50,95 5,50" fill={mainColor} stroke={strokeColor} strokeWidth="2" />
                            {innerPath}
                        </svg>
                    );
                } else if (card.name === 'Algebraica') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(34,197,94,0.5)]">
                            <line x1="30" y1="70" x2="70" y2="30" stroke="#22c55e" strokeWidth="6" strokeLinecap="round" />
                            <line x1="30" y1="30" x2="70" y2="70" stroke="#22c55e" strokeWidth="6" strokeLinecap="round" />
                        </svg>
                    );
                } else if (card.name === 'Expona') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(239,68,68,0.5)] svg-pulse">
                            <path d="M 20 80 Q 60 80, 80 20" fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                            <circle cx="80" cy="20" r="6" fill="#f87171" />
                        </svg>
                    );
                } else if (card.type === 'Derived' || card.type === 'Resonant' || card.name === 'Bleeding Coil') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(217,70,239,0.6)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#d946ef" strokeWidth="2" strokeDasharray="8 4" />
                            <path d="M 50 10 L 90 50 L 50 90 L 10 50 Z" fill="#701a75" opacity="0.6"/>
                            <circle cx="50" cy="50" r="10" fill="#f0abfc" />
                        </svg>
                    );
                } else if (card.name === 'Dust') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_10px_rgba(156,163,175,0.3)]">
                            <circle cx="50" cy="50" r="2" fill="#9ca3af" />
                            <circle cx="40" cy="40" r="1" fill="#6b7280" />
                            <circle cx="60" cy="60" r="1.5" fill="#4b5563" />
                            <circle cx="30" cy="60" r="1" fill="#9ca3af" />
                            <circle cx="70" cy="30" r="2" fill="#4b5563" />
                        </svg>
                    );
                } else if (card.name === 'U-State' || card.name === 'IBP-State' || card.name === 'Tabular-State' || card.name === 'Refined Solution') {
                    return (
                        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] svg-pulse">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" strokeWidth="3" strokeDasharray="5 5" />
                            <text x="50" y="65" fontSize="40" fill="#d8b4fe" textAnchor="middle" fontFamily="serif" fontStyle="italic">u</text>
                        </svg>
                    );
                }
                return null;
            };

            let baseBg = 'bg-gray-900/95';
            let baseBorder = 'border-gray-800 hover:border-gray-600 hover:bg-gray-800';
            
            if (card.name === 'Sina') {
                baseBg = 'bg-blue-950/40';
                baseBorder = 'border-blue-900 hover:border-blue-700 hover:bg-blue-900/60';
            } else if (card.name === 'Cosa') {
                baseBg = 'bg-yellow-950/40';
                baseBorder = 'border-yellow-900 hover:border-yellow-700 hover:bg-yellow-900/60';
            } else if (card.name === 'Tana') {
                baseBg = 'bg-orange-950/40';
                baseBorder = 'border-orange-900 hover:border-orange-700 hover:bg-orange-900/60';
            } else if (card.name === 'Seca') {
                baseBg = 'bg-cyan-950/30';
                baseBorder = 'border-cyan-800 hover:border-cyan-600 hover:bg-cyan-900/50';
            } else if (card.name === 'Algebraica') {
                baseBg = 'bg-emerald-950/40';
                baseBorder = 'border-emerald-900 hover:border-emerald-700 hover:bg-emerald-900/60';
            } else if (card.name === 'Expona') {
                baseBg = 'bg-red-950/40';
                baseBorder = 'border-red-900 hover:border-red-700 hover:bg-red-900/60';
            } else if (card.name === 'Dust') {
                baseBg = 'bg-gray-950/80';
                baseBorder = 'border-gray-800 border-dashed';
            } else if (card.name === 'Residue' || card.name === 'Compound') {
                if (card.baseTex && card.baseTex.includes('sin')) {
                    baseBg = 'bg-blue-950/40';
                    baseBorder = 'border-blue-700 shadow-[inset_0_0_20px_rgba(59,130,246,0.1)] hover:border-blue-500';
                } else if (card.baseTex && card.baseTex.includes('sec')) {
                    baseBg = 'bg-cyan-950/30';
                    baseBorder = 'border-cyan-700 shadow-[inset_0_0_20px_rgba(45,212,191,0.1)] hover:border-cyan-500';
                } else if (card.baseTex && card.baseTex.includes('tan')) {
                    baseBg = 'bg-orange-950/40';
                    baseBorder = 'border-orange-700 shadow-[inset_0_0_20px_rgba(249,115,22,0.1)] hover:border-orange-500';
                } else {
                    baseBg = 'bg-yellow-950/40';
                    baseBorder = 'border-yellow-700 shadow-[inset_0_0_20px_rgba(234,179,8,0.1)] hover:border-yellow-500';
                }
            } else if (card.type === 'Derived' || card.type === 'Resonant' || card.name === 'Bleeding Coil') {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-600 shadow-[inset_0_0_30px_rgba(217,70,239,0.2)] hover:border-fuchsia-400';
            } else if (card.name === 'U-State' || card.name === 'IBP-State' || card.name === 'Tabular-State' || card.name === 'Refined Solution') {
                baseBg = 'bg-fuchsia-950/40';
                baseBorder = 'border-fuchsia-900 shadow-[inset_0_0_20px_rgba(168,85,247,0.1)] hover:border-fuchsia-700';
            }

            let borderClass = baseBorder;
            if (isActive) borderClass = 'border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.5)] scale-105';
            if (isStitchTarget) borderClass = 'border-emerald-400 shadow-[0_0_25px_rgba(16,185,129,0.5)] scale-105';
            if (isSacrificeTarget) borderClass = 'border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.7)] scale-105 animate-pulse';

            return (
                <div className={`relative flex flex-col items-center ${isConsumed ? 'animate-consume' : ''} ${scale} origin-center transition-all duration-300 hover:-translate-y-2`}>
                    <div onClick={onClick} className={`relative flex flex-col w-[190px] h-[270px] rounded-2xl border-2 transition-all overflow-visible cursor-pointer z-40 ${baseBg} ${borderClass}`}>
                        
                        {isSlashing && <div className="animate-slash"></div>}

                        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-gray-900 border border-gray-700 rounded text-[9px] font-black tracking-tighter text-gray-500 uppercase z-50">
                            {card.type}
                        </div>

                        {card.canCycle && onCycle && (
                            <div onClick={(e) => { e.stopPropagation(); onCycle(card.id); }}
                                className="absolute -top-4 -left-4 w-10 h-10 rounded-full bg-emerald-900 border-2 border-emerald-400 flex items-center justify-center text-emerald-200 text-xl font-bold shadow-lg z-50 hover:bg-emerald-700 hover:scale-110 transition-transform">
                                ⟳
                            </div>
                        )}

                        {card.isBleeding && (
                            <div className="absolute -bottom-4 -left-4 w-10 h-10 rounded-full bg-red-950 border-2 border-red-500 flex items-center justify-center text-red-400 text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)] z-50">
                                🩸
                            </div>
                        )}

                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-50">
                                {card.power}
                            </div>
                        )}

                        <div className="h-[90px] w-full border-b border-white/5 flex items-center justify-center relative bg-gradient-to-b from-white/5 to-transparent rounded-t-2xl overflow-visible p-3">
                            {isShattering && <ParticleBurst card={card} />}
                            <div className={`w-full h-full ${isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"} flex items-center justify-center`}>
                                {renderVisual()}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center px-2">
                            <span className="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">{card.name}</span>
                            <div className="pointer-events-none scale-90"><MathEquation equation={card.baseTex} size="text-2xl" /></div>
                        </div>

                        <div className="h-[65px] w-full bg-black/60 border-t border-white/5 rounded-b-2xl p-2 flex items-center justify-center relative">
                            <p className="text-[10px] text-gray-400 text-center leading-tight italic px-1">"{card.ability}"</p>
                            
                            {(card.isBleeding || isSacrificeTarget) && (
                                <>
                                    <div className="blood-drop drop-1"></div>
                                    <div className="blood-drop drop-2"></div>
                                    <div className="blood-drop drop-3"></div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const IntegraliaGame = () => {
            const [mana, setMana] = useState(0);
            const [gamePhase, setGamePhase] = useState('setup');
            const [integrationStep, setIntegrationStep] = useState(0);
            const [integrationPath, setIntegrationPath] = useState(null); 

            const [bossCards, setBossCards] = useState([]);
            
            // Random Spell Generator
            const generateSpell = () => {
                const spellType = Math.floor(Math.random() * 3); // 0: Sin/Cos, 1: Sec/Tan, 2: IBP/Tabular
                const newCards = [];
                let logMsg = "";

                if (spellType === 0) {
                    const sinPower = Math.floor(Math.random() * 3) + 1; 
                    const cosPower = Math.floor(Math.random() * 3) + 1; 
                    if (sinPower > 0) newCards.push({ id: `sina-${Date.now()}`, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: sinPower, canCycle: (sinPower % 2 === 0), ability: "Primal Spirit.", isBleeding: false });
                    if (cosPower > 0) newCards.push({ id: `cosa-${Date.now()}`, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: cosPower, canCycle: (cosPower % 2 === 0), ability: "Armored Core.", isBleeding: false });
                    logMsg = `A wild spell appears! Refine sin^${sinPower}(x) cos^${cosPower}(x) to extract its mana.`;
                } else if (spellType === 1) {
                    const secPower = Math.floor(Math.random() * 3) + 1; 
                    const tanPower = Math.floor(Math.random() * 3) + 1; 
                    if (secPower > 0) newCards.push({ id: `seca-${Date.now()}`, name: 'Seca', type: 'Core', baseTex: '\\sec(x)', baseMath: 'sec(x)', power: secPower, canCycle: (secPower % 2 === 0), ability: "Piercing Spirit.", isBleeding: false });
                    if (tanPower > 0) newCards.push({ id: `tana-${Date.now()}`, name: 'Tana', type: 'Core', baseTex: '\\tan(x)', baseMath: 'tan(x)', power: tanPower, canCycle: (tanPower % 2 === 0), ability: "Shifting Core.", isBleeding: false });
                    logMsg = `A wild spell appears! Refine sec^${secPower}(x) tan^${tanPower}(x) to extract its mana.`;
                } else {
                    const xPower = Math.floor(Math.random() * 3) + 1; 
                    newCards.push({ id: `algebraica-${Date.now()}`, name: 'Algebraica', type: 'Core', baseTex: xPower === 1 ? 'x' : `x^${xPower}`, baseMath: xPower === 1 ? 'x' : `x^${xPower}`, power: xPower, canCycle: false, ability: "Algebraic Thread.", isBleeding: false });

                    const ibpType = Math.floor(Math.random() * 3);
                    if (ibpType === 0) {
                        newCards.push({ id: `expona-${Date.now()}`, name: 'Expona', type: 'Core', baseTex: 'e^x', baseMath: 'exp(x)', power: 1, canCycle: false, ability: "Exponential Spirit.", isBleeding: false });
                        logMsg = `A wild spell appears! Refine x${xPower > 1 ? '^'+xPower : ''} e^x using Dual-Weave or Tabular Method.`;
                    } else if (ibpType === 1) {
                        newCards.push({ id: `cosa-${Date.now()}`, name: 'Cosa', type: 'Core', baseTex: '\\cos(x)', baseMath: 'cos(x)', power: 1, canCycle: false, ability: "Armored Core.", isBleeding: false });
                        logMsg = `A wild spell appears! Refine x${xPower > 1 ? '^'+xPower : ''} cos(x) using Dual-Weave or Tabular Method.`;
                    } else {
                        newCards.push({ id: `sina-${Date.now()}`, name: 'Sina', type: 'Core', baseTex: '\\sin(x)', baseMath: 'sin(x)', power: 1, canCycle: false, ability: "Primal Spirit.", isBleeding: false });
                        logMsg = `A wild spell appears! Refine x${xPower > 1 ? '^'+xPower : ''} sin(x) using Dual-Weave or Tabular Method.`;
                    }
                }
                
                setBossCards(newCards);
                setGamePhase('setup');
                setIntegrationStep(0);
                setIntegrationPath(null);
                setActiveMode(null);
                setActiveMat(null);
                setAltarCore(null);
                setAltarSacrifice(null);
                setAltarExpanded([]);
                setIbpU(null);
                setIbpDv(null);
                setIbpDerived(null);
                setTrigSubCard(null);
                setTabularU([]);
                setTabularDv([]);
                setTabularComplete(false);
                
                addLog(logMsg);
            };

            useEffect(() => {
                generateSpell();
            }, []);

            // Mat States
            const [altarCore, setAltarCore] = useState(null);
            const [altarSacrifice, setAltarSacrifice] = useState(null);
            const [altarExpanded, setAltarExpanded] = useState([]);
            
            const [ibpU, setIbpU] = useState(null);
            const [ibpDv, setIbpDv] = useState(null);
            const [ibpDerived, setIbpDerived] = useState(null);

            const [trigSubCard, setTrigSubCard] = useState(null);

            const [tabularU, setTabularU] = useState([]); 
            const [tabularDv, setTabularDv] = useState([]); 
            const [tabularComplete, setTabularComplete] = useState(false);

            const [activeMode, setActiveMode] = useState(null);

                } else if (trigSubCard.name === 'Tana') {
                    xTex = '\\tan(\\theta)'; xMath = 'tan(x)';
                    dxTex = '\\sec^2(\\theta) \\, d\\theta'; dxMath = 'sec(x)^2';
                    radTex = '\\sqrt{x^2+1} = \\sec(\\theta)'; radMath = 'sec(x)';
                } else if (trigSubCard.name === 'Seca') {
                    xTex = '\\sec(\\theta)'; xMath = 'sec(x)';
                    dxTex = '\\sec(\\theta)\\tan(\\theta) \\, d\\theta'; dxMath = 'sec(x)*tan(x)';
                    radTex = '\\sqrt{x^2-1} = \\tan(\\theta)'; radMath = 'tan(x)';
                } else {
                    // Fallback for Cosine (rarely used as a primary sub, but good to have)
                    xTex = '\\cos(\\theta)'; xMath = 'cos(x)';
                    dxTex = '-\\sin(\\theta) \\, d\\theta'; dxMath = '-sin(x)';
                    radTex = '\\sqrt{1-x^2} = \\sin(\\theta)'; radMath = 'sin(x)';
                }

                const newCards = [
                    { id: `geo-x-${Date.now()}`, name: 'Geometric (x)', type: 'Fragment', baseTex: xTex, baseMath: xMath, power: 1, canCycle: false, ability: "Extracted x-substitution.", isBleeding: false },
                    { id: `geo-dx-${Date.now()}`, name: 'Geometric (dx)', type: 'Fragment', baseTex: dxTex, baseMath: dxMath, power: 1, canCycle: false, ability: "Extracted differential.", isBleeding: true },
                    { id: `geo-rad-${Date.now()}`, name: 'Geometric (Rad)', type: 'Fragment', baseTex: radTex, baseMath: radMath, power: 1, canCycle: false, ability: "Extracted radical identity.", isBleeding: false }
                ];

                setBossCards(prev => [...prev, ...newCards]);
                setTrigSubCard(null);
                setActiveMat(null);
                addLog("Sacred Geometry Extracted! Three new fragments materialize.");
            };

            const collapseWeave = () => {
                let expectedExpandedName = '';
                let expectedResidueTex = '';
                if (altarCore.family === 'sin') { expectedExpandedName = 'Sina'; expectedResidueTex = '(1-\\sin^2(x))'; }
                if (altarCore.family === 'cos') { expectedExpandedName = 'Cosa'; expectedResidueTex = '(1-\\cos^2(x))'; }
                if (altarCore.family === 'tan') { expectedExpandedName = 'Tana'; expectedResidueTex = '(\\sec^2(x)-1)'; }
                if (altarCore.family === 'sec') { expectedExpandedName = 'Seca'; expectedResidueTex = '(1+\\tan^2(x))'; }

                const isInvalid = altarExpanded.some(c => {
                    if (c.name === expectedExpandedName) return false;
                    if (c.name === 'Residue' && c.baseTex === expectedResidueTex) return false;
                    return true; 
                });

                if (isInvalid) { addLog("The Weave is unstable! You left unconverted opposite spirits in the Expanded Weave. Cycle them into Residue first."); return; }

                let uPower = altarCore.power;
                let residueCount = 0;
                altarExpanded.forEach(c => {
                    if (c.name === expectedExpandedName) uPower += c.power;
                    if (c.name === 'Residue') residueCount++;
                });

                if (residueCount > 1) { addLog("The Altar can only process one Residue at a time right now. The spell is too complex!"); return; }

                addLog("Altar rituals complete! The Weave collapses into a U-State.");
                setConsumeAll(true); setMana(m => m + 50);

                setTimeout(() => {
                    let sign = (altarCore.family === 'cos') ? -1 : 1; 
                    
                    let terms = [];
                    if (residueCount === 0) { terms.push({ c: sign, p: uPower }); } 
                    else {
                        if (altarCore.family === 'tan') {
                            terms.push({ c: sign, p: uPower + 2 }); terms.push({ c: -sign, p: uPower });
                        } else if (altarCore.family === 'sec') {
                            terms.push({ c: sign, p: uPower }); terms.push({ c: sign, p: uPower + 2 });
                        } else {
                            terms.push({ c: sign, p: uPower }); terms.push({ c: -sign, p: uPower + 2 }); 
                        }
                    }
                    terms.sort((a,b) => a.p - b.p);

                    let initialEq = '';
                    if (residueCount === 1) { 
                        let rText = '(1-u^2)';
                        if (altarCore.family === 'tan') rText = '(u^2-1)';
                        if (altarCore.family === 'sec') rText = '(1+u^2)';
                        initialEq = `${sign === -1 ? '-' : ''}\\int ${uPower===1 ? 'u' : `u^${uPower}`}${rText} \\, du`; 
                    } 
                    else { initialEq = `${sign === -1 ? '-' : ''}\\int ${uPower===1 ? 'u' : `u^${uPower}`} \\, du`; }

                    setBossCards([{ id: 'u-state', name: 'U-State', type: 'Unresolved', baseTex: initialEq, power: 1, canCycle: false, ability: residueCount === 1 ? "Needs Distribution." : "Needs Power Rule.", isBleeding: false, meta: { terms, hasResidue: residueCount === 1 } }]);
                    
                    setConsumeAll(false); setActiveMat(null); setAltarCore(null); setAltarSacrifice(null); setAltarExpanded([]);
                    setIntegrationPath('altar'); setIntegrationStep(residueCount === 1 ? 0 : 2); setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a U-State. Use Rule Tokens to refine it.");
                }, 1000);
            };

            const confirmIbpWeave = () => {
                addLog("Dual-Weave executed! The equation collapses into the Final Form.");
                setConsumeAll(true); setMana(m => m + 50);
                setTimeout(() => {
                    const uTex = ibpU.baseTex; 
                    let vTex = ibpDerived.vTex; 
                    const duTex = ibpDerived.duTex;
                    let uvTex = `${uTex}${vTex}`;
                    if (vTex === '-\\cos(x)') uvTex = `-${uTex}\\cos(x)`;
                    
                    setBossCards([{ id: 'ibp-state', name: 'IBP-State', type: 'Unresolved', baseTex: `${uvTex} - \\int ${vTex} \\cdot ${duTex} \\, dx`, power: 1, canCycle: false, ability: "Needs Inner Integral Simplification.", isBleeding: false, meta: { uTex, vTex, duTex, uvTex } }]);
                    
                    setConsumeAll(false); setActiveMat(null); setIbpU(null); setIbpDv(null); setIbpDerived(null);
                    setIntegrationPath('ibp'); setIntegrationStep(0); setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a Dual-Weave State. Refine the remaining integral.");
                }, 1000);
            };

            const stepIntoAbyss = () => {
                const lastU = tabularU[tabularU.length - 1];
                const lastDv = tabularDv[tabularDv.length - 1];

                let newUBaseMath = '';
                let newUTex = '';
                let isZero = false;

                try {
                    const derivedNode = math.derivative(lastU.baseMath, 'x');
                    newUBaseMath = derivedNode.toString();
                    newUTex = derivedNode.toTex().replace(/~/g, '');
                    if (newUBaseMath === '0') { isZero = true; newUTex = '0'; }
                } catch(e) { console.error(e); }

                const newUCard = { id: `u-${Date.now()}`, name: isZero ? 'Dust' : 'Bleeding Coil', type: isZero ? 'Void' : 'Derived', baseTex: newUTex, baseMath: newUBaseMath, power: 1, ability: isZero ? "Reduced to nothing." : "Stripped of power.", isBleeding: !isZero };

                let newDvTex = '';
                let newDvMath = '';
                if (lastDv.baseMath.includes('exp(x)') || lastDv.baseMath.includes('e^x')) { newDvTex = 'e^x'; newDvMath = 'exp(x)'; } 
                else if (lastDv.baseMath === 'sin(x)') { newDvTex = '-\\cos(x)'; newDvMath = '-cos(x)'; }
                else if (lastDv.baseMath === '-cos(x)' || lastDv.baseTex === '-\\cos(x)') { newDvTex = '-\\sin(x)'; newDvMath = '-sin(x)'; }
                else if (lastDv.baseMath === '-sin(x)' || lastDv.baseTex === '-\\sin(x)') { newDvTex = '\\cos(x)'; newDvMath = 'cos(x)'; }
                else if (lastDv.baseMath === 'cos(x)') { newDvTex = '\\sin(x)'; newDvMath = 'sin(x)'; }

                const newDvCard = { id: `dv-${Date.now()}`, name: 'Echo', type: 'Resonant', baseTex: newDvTex, baseMath: newDvMath, power: 1, ability: "Endlessly looping.", isBleeding: false };

                setTabularU([...tabularU, newUCard]);
                setTabularDv([...tabularDv, newDvCard]);

                if (isZero) {
                    setTabularComplete(true);
                    addLog("The Mortal Coil is reduced to dust. You may reap the echoes.");
                } else { addLog("You step deeper. The coil bleeds; the echo loops."); }
            };

            const reapEchoes = () => {
                let finalTex = '';
                for (let i = 0; i < tabularU.length - 1; i++) {
                    const sign = i % 2 === 0 ? '+' : '-';
                    let uTerm = tabularU[i].baseTex;
                    let dvTerm = tabularDv[i+1].baseTex;
                    
                    if (uTerm === '1') uTerm = '';
                    let termTex = '';
                    if (dvTerm === '-\\cos(x)' || dvTerm === '-\\sin(x)') {
                        dvTerm = dvTerm.replace('-', '');
                        const newSign = sign === '+' ? '-' : '+';
                        termTex = ` ${newSign} ${uTerm}${dvTerm}`;
                    } else {
                        termTex = ` ${sign} ${uTerm}${dvTerm}`;
                    }
                    if (i === 0 && termTex.trim().startsWith('+')) finalTex += termTex.replace('+', '').trim();
                    else finalTex += termTex;
                }

                setMana(m => m + 100); 
                addLog("The echoes are harvested! The abyss collapses.");
                setConsumeAll(true);
                
                setTimeout(() => {
                    setBossCards([{ id: 'tabular-state', name: 'Tabular-State', type: 'Unresolved', baseTex: finalTex, power: 1, canCycle: false, ability: "Needs Constant of Integration.", isBleeding: false }]);
                    setConsumeAll(false); setActiveMat(null); setTabularU([]); setTabularDv([]); setTabularComplete(false);
                    setIntegrationPath('tabular'); setIntegrationStep(3); 
                    setGamePhase('integration');
                    addLog("PHASE 2: The spell is now a Tabular State. Finalize the refinement.");
                }, 1000);
            };

            const applyIntegrationRule = (actionType) => {
                if (mana < 10) { addLog("Not enough Mana! You need 10 Mana to cast a Rule Token."); return; }

                if (integrationPath === 'altar') {
                    const meta = bossCards[0].meta;
                    if (actionType === 'action1' && integrationStep === 0) {
                        let distEq = '';
                        meta.terms.forEach((t, i) => { if (t.c < 0) distEq += i === 0 ? '-' : ' - '; else if (i > 0) distEq += ' + '; distEq += t.p === 1 ? 'u' : `u^${t.p}`; });
                        setMana(m => m - 10); setIntegrationStep(1); setBossCards([{ ...bossCards[0], baseTex: `\\int (${distEq}) \\, du`, ability: "Needs Linearity Split." }]); addLog("Token Applied: Distributed the powers.");
                    } else if (actionType === 'action2' && integrationStep === 1) {
                        let linEq = '';
                        meta.terms.forEach((t, i) => { if (t.c < 0) linEq += i === 0 ? '-\\int ' : ' - \\int '; else linEq += i === 0 ? '\\int ' : ' + \\int '; linEq += `${t.p === 1 ? 'u' : `u^${t.p}`} \\, du`; });
                        setMana(m => m - 10); setIntegrationStep(2); setBossCards([{ ...bossCards[0], baseTex: linEq, ability: "Needs Power Rule." }]); addLog("Token Applied: Split the integral using Linearity.");
                    } else if (actionType === 'action3' && integrationStep === 2) {
                        let powEq = '';
                        meta.terms.forEach((t, i) => { let newP = t.p + 1; if (t.c < 0) powEq += i === 0 ? '-' : ' - '; else if (i > 0) powEq += ' + '; powEq += `\\frac{u^{${newP}}}{${newP}}`; });
                        setMana(m => m - 10); setIntegrationStep(3); setBossCards([{ ...bossCards[0], baseTex: powEq, ability: "Needs Constant of Integration." }]); addLog("Token Applied: Executed the Power Rule.");
                    } else if (actionType === 'plus_c' && integrationStep === 3) {
                        setMana(m => m - 10 + 200); setIntegrationStep(4); setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C', ability: "Mana Refined. Spell completely dissolved." }]); addLog("Token Applied: Added +C. REFINEMENT COMPLETE! Massive Mana Payout!");
                    } else { addLog("You cannot apply that rule right now."); }
                } 
                else if (integrationPath === 'ibp') {
                    const meta = bossCards[0].meta;
                    if (actionType === 'action1' && integrationStep === 0) {
                         setMana(m => m - 10); setIntegrationStep(1);
                         let inner = meta.vTex === '-\\cos(x)' ? '-\\cos(x)' : meta.vTex;
                         setBossCards([{ ...bossCards[0], baseTex: `${meta.uvTex} - \\int ${inner} \\, dx`, ability: "Needs Inner Integration." }]); addLog("Token Applied: Simplified the inner integral.");
                    } else if (actionType === 'action2' && integrationStep === 1) {
                         setMana(m => m - 10); setIntegrationStep(2);
                         let resolvedInner = meta.vTex;
                         if (meta.vTex === '\\sin(x)') resolvedInner = '-\\cos(x)'; else if (meta.vTex === '-\\cos(x)') resolvedInner = '-\\sin(x)'; else if (meta.vTex === '\\tan(x)') resolvedInner = '\\ln|\\sec(x)|';
                         setBossCards([{ ...bossCards[0], baseTex: `${meta.uvTex} - (${resolvedInner})`, ability: "Needs Sign Formatting." }]); addLog("Token Applied: Evaluated the remaining integral.");
                    } else if (actionType === 'action3' && integrationStep === 2) {
                         setMana(m => m - 10); setIntegrationStep(3);
                         let finalTex = `${meta.uvTex} - ${meta.vTex}`; 
                         if (meta.vTex === '\\sin(x)') finalTex = `${meta.uvTex} + \\cos(x)`; else if (meta.vTex === '-\\cos(x)') finalTex = `${meta.uvTex} + \\sin(x)`; else if (meta.vTex === '\\tan(x)') finalTex = `${meta.uvTex} - \\ln|\\sec(x)|`;
                         setBossCards([{ ...bossCards[0], baseTex: finalTex, ability: "Needs Constant of Integration." }]); addLog("Token Applied: Formatted signs and structure.");
                    } else if (actionType === 'plus_c' && integrationStep === 3) {
                         setMana(m => m - 10 + 200); setIntegrationStep(4); setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C', ability: "Mana Refined. Spell completely dissolved." }]); addLog("Token Applied: Added +C. REFINEMENT COMPLETE! Massive Mana Payout!");
                    } else { addLog("You cannot apply that rule right now."); }
                }
                else if (integrationPath === 'tabular') {
                    if (actionType === 'plus_c' && integrationStep === 3) {
                         setMana(m => m - 10 + 300); setIntegrationStep(4); setBossCards([{ ...bossCards[0], name: 'Refined Solution', type: 'Refined', baseTex: bossCards[0].baseTex + ' + C', ability: "Mana Refined. Spell completely dissolved." }]); addLog("Token Applied: Added +C. REFINEMENT COMPLETE! MASSIVE MANA PAYOUT!");
                    } else { addLog("You cannot apply that rule right now."); }
                }
            };

            let boardBorder = "border-white/5";
            if (activeMat === 'altar') { boardBorder = "border-red-900/50 shadow-[0_0_30px_rgba(220,38,38,0.15)]"; }
            else if (activeMat === 'ibp') { boardBorder = "border-fuchsia-900/50 shadow-[0_0_30px_rgba(217,70,239,0.15)]"; }
            else if (activeMat === 'trigsub') { boardBorder = "border-amber-900/50 shadow-[0_0_30px_rgba(245,158,11,0.15)]"; }
            else if (activeMat === 'tabular') { boardBorder = "border-teal-900/50 shadow-[0_0_30px_rgba(20,184,166,0.15)]"; }

            const btnLabels = { altar: ['Distribute', 'Linearity', 'Power Rule'], ibp: ['Simplify', 'Evaluate', 'Format'], tabular: ['-', '-', 'Format'] };
            const currentLabels = btnLabels[integrationPath] || btnLabels.altar;

            return (
                <div className="min-h-screen p-8 flex flex-col items-center max-w-7xl mx-auto">
                    
                    <header className="mb-6 w-full flex justify-between items-end border-b border-white/10 pb-4">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter text-white">INTEGRALIA</h1>
                            <p className="text-xs text-blue-500 uppercase font-bold tracking-[0.3em]">The Art of Mana Refinement</p>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Mana Recovered</span>
                            <div className="flex items-center gap-3">
                                <div className="w-48 h-3 bg-gray-900 rounded-full border border-white/5 overflow-hidden mana-bar-glow">
                                    <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${Math.min(mana / 500 * 100, 100)}%` }}></div>
                                </div>
                                <span className="text-3xl font-mono text-blue-400 font-bold">{mana}</span>
                            </div>
                        </div>
                    </header>

                    {/* DYNAMIC TOP SECTION: Board + Optional Mats */}
                    <div className="w-full flex gap-6 mb-6 min-h-[450px] transition-all duration-500">
                        
                        {/* MAIN BOARD */}
                        <div className={`bg-gray-950 border rounded-[2rem] pt-10 pb-8 px-6 flex flex-col items-center relative overflow-hidden transition-all duration-500 ${activeMat ? 'w-4/12' : 'w-full'} ${boardBorder}`}>
                            <h2 className="absolute top-4 text-white/20 text-xs font-black tracking-[0.5em] uppercase text-center w-full">Used Spell Container</h2>
                            <div className={`absolute inset-0 bg-blue-950/10 z-10 transition-opacity duration-1000 ${consumeAll ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}></div>
                            <div className="flex flex-row items-center justify-center gap-4 flex-wrap z-20 w-full h-full mt-4">
                                {bossCards.length > 0 && <div className={`text-6xl text-white/10 font-serif select-none ${consumeAll ? 'animate-consume' : ''}`}>∫</div>}
                                {bossCards.length === 0 && !consumeAll && <div className="text-gray-600 font-bold tracking-widest uppercase opacity-50 text-sm text-center">Board Empty</div>}
                                {bossCards.map((card) => (
                                    <BattleCard key={card.id} card={card} scale={activeMat ? 'scale-75' : 'scale-95'}
                                        isActive={activeMode === 'slice' || activeMode === 'stitch_1' || (activeMat === 'altar' && !altarCore) || (activeMat === 'ibp' && (!ibpU || !ibpDv)) || (activeMat === 'trigsub' && !trigSubCard) || (activeMat === 'tabular' && (!tabularU.length || !tabularDv.length))}
                                        isStitchTarget={stitchTargetId === card.id || activeMode === 'stitch_2'}
                                        onClick={() => handleBossCardClick(card)} onCycle={handleCycle} isSlashing={slashingId === card.id} isShattering={shatteringId === card.id} isConsumed={consumeAll}
                                    />
                                ))}
                                {bossCards.length > 0 && <div className={`text-3xl text-white/20 font-serif italic ${consumeAll ? 'animate-consume' : ''}`}>dx</div>}
                            </div>
                        </div>

                        {/* SACRIFICIAL ALTAR MAT */}
                        {activeMat === 'altar' && (
                            <div className="w-8/12 bg-red-950/10 border-2 border-red-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(220,38,38,0.05)] animate-slide-left overflow-hidden">
                                <h2 className="text-red-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-4">Sacrificial Altar Mat</h2>
                                <div className="w-full flex justify-center gap-6 relative z-20">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-red-500/20 text-4xl font-black mt-2">×</div>
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">1. Core (u)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {altarCore ? <BattleCard card={altarCore} scale="scale-75 hover:scale-95" onClick={() => handleAltarClick('core', null)} /> : <span className="text-red-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Board Core<br/>to Assign</span>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">2. Sacrifice (du)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-red-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {altarSacrifice ? <BattleCard card={altarSacrifice} scale="scale-75 hover:scale-95" onClick={() => handleAltarClick('sacrifice', null)} /> : <span className="text-red-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Valid Tribute<br/>to Assign</span>}
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full border-t border-red-900/30 pt-4 mt-4 flex flex-col items-center flex-1 z-20">
                                    <span className="text-red-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Weave</span>
                                    <div className="w-full flex-1 flex flex-wrap justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-red-900/20 relative min-h-[120px]">
                                        {altarExpanded.length === 0 && <span className="text-red-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Move all remaining cards here</span>}
                                        {altarExpanded.map((card) => ( <div key={card.id} className="w-[120px] h-[160px] flex items-center justify-center"><BattleCard card={card} scale="scale-[0.55] hover:scale-75" onClick={() => handleAltarClick('expanded', card.id)} /></div> ))}
                                    </div>
                                </div>
                                {bossCards.length === 0 && altarCore && altarSacrifice && (
                                    <div className="absolute inset-0 bg-red-950/80 backdrop-blur-sm z-50 flex items-center justify-center"><button onClick={collapseWeave} className="px-10 py-4 bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(220,38,38,0.6)] hover:shadow-[0_0_50px_rgba(220,38,38,0.8)] transition-all transform hover:scale-105">Collapse Weave</button></div>
                                )}
                            </div>
                        )}

                        {/* DUAL-WEAVE (IBP) MAT */}
                        {activeMat === 'ibp' && (
                            <div className="w-8/12 bg-fuchsia-950/10 border-2 border-fuchsia-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(217,70,239,0.05)] animate-slide-left overflow-hidden">
                                <h2 className="text-fuchsia-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-4">Dual-Weave Mat (IBP)</h2>
                                <div className="w-full flex justify-center gap-6 relative z-20">
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">1. Bind (u)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {ibpU ? <BattleCard card={ibpU} scale="scale-75 hover:scale-95" onClick={() => handleIbpClick('u')} /> : <span className="text-fuchsia-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Card<br/>to Bind</span>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-center w-[160px]">
                                        <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center">2. Poison (dv)</span>
                                        <div className="w-full h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center bg-black/40 relative">
                                            {ibpDv ? <BattleCard card={ibpDv} scale="scale-75 hover:scale-95" onClick={() => handleIbpClick('dv')} /> : <span className="text-fuchsia-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Click Card<br/>to Poison</span>}
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full border-t border-fuchsia-900/30 pt-4 mt-4 flex flex-col items-center flex-1 z-20">
                                    <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Form [ u v - ∫ v du ]</span>
                                    <div className="w-full flex-1 flex flex-nowrap justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-fuchsia-900/20 relative min-h-[140px] overflow-hidden">
                                        {!ibpU || !ibpDv || !ibpDerived ? ( <span className="text-fuchsia-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Bind u and dv to expand the sequence</span> ) : (
                                            <div className="flex items-center justify-center gap-1 w-full h-full">
                                                <div className="w-[85px]"><BattleCard card={ibpU} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500 font-bold text-2xl mx-1">-</div><div className="text-fuchsia-500/50 font-serif text-4xl mr-1">∫</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived du', type:'Derived', baseTex: ibpDerived.duTex, power: 1}} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold ml-1">dx</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {ibpU && ibpDv && ibpDerived && (
                                    <div className="absolute inset-0 bg-fuchsia-950/80 backdrop-blur-sm z-50 flex items-center justify-center"><button onClick={confirmIbpWeave} className="px-10 py-4 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(217,70,239,0.6)] hover:shadow-[0_0_50px_rgba(217,70,239,0.8)] transition-all transform hover:scale-105">Confirm Weave</button></div>
                                )}
                            </div>
                        )}

                        {/* RUNE CIRCLE (TRIG SUB) MAT */}
                        {activeMat === 'trigsub' && (
                            <div className="w-8/12 bg-amber-950/10 border-2 border-amber-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(245,158,11,0.05)] animate-slide-left overflow-hidden items-center">
                                <h2 className="text-amber-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-8">Rune Circle (Sacred Geometry)</h2>
                                <div className="flex-1 w-full flex justify-center items-center gap-12 relative z-20">
                                    <div className="flex flex-col items-center">
                                        <span className="text-amber-400 font-bold uppercase tracking-widest text-[9px] mb-4 text-center">Trig Spirit</span>
                                        <div className="w-[220px] h-[220px] rounded-full border-4 border-dashed border-amber-900/60 flex items-center justify-center bg-black/40 relative shadow-[0_0_40px_rgba(245,158,11,0.1)] transition-all cursor-pointer">
                                            {trigSubCard ? ( <BattleCard card={trigSubCard} scale="scale-75 hover:scale-95" onClick={handleTrigSubClick} /> ) : ( <span className="text-amber-900/70 font-bold text-[10px] uppercase tracking-widest text-center px-4">Slot Any Trig Card<br/>To Reveal Geometry</span> )}
                                        </div>
                                    </div>
                                    
                                    {/* The Sacred Triangle! */}
                                    <div className="w-[220px] h-[220px] relative flex items-center justify-center">
                                        {trigSubCard ? (
                                            <div className="w-full h-full relative animate-slide-left flex flex-col items-center justify-center">
                                                <div className="w-full h-full relative cursor-pointer group" onClick={extractGeometry}>
                                                    <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(245,158,11,0.5)] group-hover:drop-shadow-[0_0_30px_rgba(245,158,11,0.8)] transition-all group-hover:scale-105">
                                                        <polygon points="10,90 90,90 90,10" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" strokeWidth="3" strokeLinejoin="round" />
                                                        <rect x="80" y="80" width="10" height="10" fill="none" stroke="#f59e0b" strokeWidth="2" />
                                                        <path d="M 25 90 A 15 15 0 0 0 22 80" fill="none" stroke="#f59e0b" strokeWidth="2" />
                                                        <text x="25" y="86" fontSize="10" fill="#fcd34d" fontStyle="italic">θ</text>
                                                    </svg>
                                                    
                                                    <div className="absolute top-1/2 right-[-20px] -translate-y-1/2 text-amber-200 font-serif text-xl pointer-events-none">
                                                        <MathEquation equation={trigSubCard.name === 'Sina' ? 'x' : (trigSubCard.name === 'Tana' ? 'x' : (trigSubCard.name === 'Seca' ? '\\sqrt{x^2-1}' : '\\sqrt{1-x^2}'))} size="text-xl" />
                                                    </div>
                                                    <div className="absolute bottom-[-20px] left-1/2 -translate-x-1/2 text-amber-200 font-serif text-xl pointer-events-none">
                                                        <MathEquation equation={trigSubCard.name === 'Sina' ? '\\sqrt{1-x^2}' : (trigSubCard.name === 'Tana' ? '1' : (trigSubCard.name === 'Seca' ? '1' : 'x'))} size="text-xl" />
                                                    </div>
                                                    <div className="absolute top-[40%] left-[30%] -translate-x-1/2 -translate-y-1/2 text-amber-200 font-serif text-xl rotate-[-45deg] pointer-events-none">
                                                        <MathEquation equation={trigSubCard.name === 'Sina' ? '1' : (trigSubCard.name === 'Tana' ? '\\sqrt{x^2+1}' : (trigSubCard.name === 'Seca' ? 'x' : '1'))} size="text-xl" />
                                                    </div>
                                                </div>
                                                <button onClick={extractGeometry} className="absolute -bottom-8 px-6 py-2 bg-amber-600/80 hover:bg-amber-500 text-white font-black text-[10px] uppercase tracking-[0.2em] rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-all">
                                                    Extract Geometry
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="w-full h-full border-2 border-amber-900/30 rounded-xl flex items-center justify-center bg-black/20">
                                                <span className="text-amber-900/50 font-bold text-[10px] uppercase tracking-widest text-center px-4">Geometry Obscured</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* We only transmute if they slotted an even sine/cosine previously, but let's keep the logic running! */}
                                {trigSubCard && (trigSubCard.name === 'Sina' || trigSubCard.name === 'Cosa') && trigSubCard.power % 2 === 0 && (
                                    <div className="absolute inset-0 bg-amber-950/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-4">
                                        <p className="text-amber-400 text-xs font-bold tracking-widest uppercase">Half-Angle Resonance Detected</p>
                                        <button onClick={transmuteRune} className="px-10 py-4 bg-amber-600 hover:bg-amber-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(245,158,11,0.6)] hover:shadow-[0_0_50px_rgba(245,158,11,0.8)] transition-all transform hover:scale-105">Transmute Runes</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ABYSSAL STAIR (TABULAR) MAT */}
                        {activeMat === 'tabular' && (
                            <div className="w-8/12 bg-teal-950/10 border-2 border-teal-900/40 rounded-[2rem] p-6 flex flex-col relative shadow-[inset_0_0_50px_rgba(20,184,166,0.05)] animate-slide-left overflow-hidden">
                                <h2 className="text-teal-500/50 text-xs font-black tracking-[0.5em] uppercase text-center w-full mb-4 z-20">The Abyssal Stair (Tabular)</h2>
                                <div className="flex-1 w-full overflow-y-auto log-scroll flex flex-col items-center pt-4 relative">
                                    {tabularU.length === 0 && (
                                        <div className="text-teal-900/50 font-bold text-xs uppercase tracking-widest text-center absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0">
                                            The Abyss awaits a Mortal Coil<br/>and an Eternal Echo.
                                        </div>
                                    )}
                                    
                                    {tabularU.map((uCard, index) => {
                                        const dvCard = tabularDv[index];
                                        const signStr = index % 2 === 0 ? '+' : '-';
                                        const signColor = index % 2 === 0 ? 'text-amber-400 border-amber-500/50' : 'text-red-500 border-red-500/50';

                                        return (
                                            <div key={index} className="flex w-full items-center justify-center gap-8 mb-4 relative z-20">
                                                <div className="w-[160px]">
                                                    {index === 0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block">Mortal Coil (u)</span>}
                                                    <BattleCard card={uCard} scale="scale-75" />
                                                </div>

                                                <div className="w-[100px] flex flex-col items-center justify-center relative h-[200px]">
                                                    {index < tabularDv.length - 1 && (
                                                        <div className="absolute top-[60%] left-1/2 w-full h-full border-l-4 border-b-4 border-dashed border-teal-500/30 rounded-bl-3xl -translate-x-1/2 pointer-events-none">
                                                            <div className={`absolute bottom-[-15px] left-1/2 -translate-x-1/2 text-2xl pb-1 font-black ${signColor} bg-gray-950 rounded-full w-8 h-8 flex items-center justify-center border-2 shadow-[0_0_10px_currentColor]`}>
                                                                {signStr}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="w-[160px]">
                                                    {index === 0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block">Eternal Echo (dv)</span>}
                                                    {dvCard ? <BattleCard card={dvCard} scale="scale-75" /> : <div className="w-[190px] h-[270px] scale-75 border-2 border-dashed border-teal-900/50 rounded-2xl flex items-center justify-center bg-black/40"><span className="text-teal-800 text-[10px] uppercase font-bold text-center">Waiting for<br/>Echo</span></div>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                {tabularU.length > 0 && tabularDv.length > 0 && (
                                    <div className="w-full pt-4 mt-2 border-t border-teal-900/30 flex justify-center z-50">
                                        {!tabularComplete ? (
                                            <button onClick={stepIntoAbyss} className="px-8 py-3 bg-gray-900 border-2 border-teal-600 hover:bg-teal-900 text-teal-400 font-black uppercase tracking-widest rounded-full shadow-[0_0_15px_rgba(20,184,166,0.3)] transition-all transform hover:scale-105">
                                                Step into the Abyss
                                            </button>
                                        ) : (
                                            <button onClick={reapEchoes} className="px-10 py-4 bg-teal-600 hover:bg-teal-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(20,184,166,0.6)] transition-all transform hover:scale-105 animate-pulse">
                                                Reap the Echoes
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="w-full flex flex-col gap-6 mb-8">
                        <div className="w-full h-40 bg-gray-950 border border-white/5 rounded-2xl p-6 relative overflow-hidden flex flex-col">
                            <h3 className="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3 border-b border-white/5 pb-2">Refinement Log</h3>
                            <div className="overflow-y-auto flex-1 log-scroll pr-4">
                                <ul className="space-y-2">
                                    {logs.map((log, idx) => ( <li key={idx} className={`text-sm leading-relaxed ${idx === logs.length - 1 ? 'text-blue-400 font-bold' : 'text-gray-400'}`}><span className="opacity-30 mr-2">></span>{log}</li> ))}
                                    <div ref={logEndRef} />
                                </ul>
                            </div>
                        </div>

                        {gamePhase === 'setup' && (
                            <>
                                <div>
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Tools (Overrides Mat)</h3>
                                    <div className="w-full grid grid-cols-3 gap-6">
                                        <button onClick={() => { setActiveMode('slice'); setActiveMat(null); addLog("Slice Primed: Target an Exponent."); }} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'slice' ? 'border-blue-400 bg-blue-950/40 shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'border-blue-900 bg-gray-950 hover:border-blue-500 hover:bg-blue-950/20'}`}><span className="text-blue-500 text-[10px] font-black uppercase mb-1">Machine</span><span className="text-white font-bold text-lg group-hover:text-blue-400">Slice</span><p className="text-xs text-gray-500 mt-2 leading-tight">Cleave exponents to fragment components.</p></button>
                                        <button onClick={() => { setActiveMode('stitch_1'); setStitchTargetId(null); setActiveMat(null); addLog("Weaver's Needle equipped. Select the first component to stitch."); }} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMode === 'stitch_1' || activeMode === 'stitch_2' ? 'border-emerald-400 bg-emerald-950/40 shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'border-emerald-900 bg-gray-950 hover:border-emerald-500 hover:bg-emerald-950/20'}`}><span className="text-emerald-500 text-[10px] font-black uppercase mb-1">Artifact</span><span className="text-white font-bold text-lg group-hover:text-emerald-400">Weaver's Needle</span><p className="text-xs text-gray-500 mt-2 leading-tight">Stitches identical spirits, or bonds sec/tan (-10 Mana).</p></button>
                                        {activeMode && ( <button onClick={() => { setActiveMode(null); setStitchTargetId(null); addLog("Tool unequipped."); }} className="p-4 rounded-2xl border-2 border-gray-800 bg-gray-900 hover:bg-gray-800 transition-all flex items-center justify-center"><span className="text-gray-400 font-bold uppercase tracking-widest text-xs">Cancel Tool</span></button> )}
                                    </div>
                                </div>

                                <div className="mt-2">
                                    <h3 className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 px-2">Hand: Integration Mats (Play Field)</h3>
                                    <div className="w-full grid grid-cols-4 gap-6">
                                        <button onClick={() => activeMat === 'altar' ? selectMat(null) : selectMat('altar')} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'altar' ? 'border-red-400 bg-red-950/40 shadow-[0_0_20px_rgba(220,38,38,0.3)]' : 'border-red-900 bg-gray-950 hover:border-red-500 hover:bg-red-950/20'}`}><span className="text-red-500 text-[10px] font-black uppercase mb-1">Mat</span><span className="text-white font-bold text-lg group-hover:text-red-400">Sacrificial Altar</span><p className="text-[10px] text-gray-500 mt-2 leading-tight">U-Substitution. Requires blood sacrifice.</p></button>
                                        <button onClick={() => activeMat === 'ibp' ? selectMat(null) : selectMat('ibp')} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'ibp' ? 'border-fuchsia-400 bg-fuchsia-950/40 shadow-[0_0_20px_rgba(217,70,239,0.3)]' : 'border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 hover:bg-fuchsia-950/20'}`}><span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Mat</span><span className="text-white font-bold text-lg group-hover:text-fuchsia-400">Dual-Weave</span><p className="text-[10px] text-gray-500 mt-2 leading-tight">Integration By Parts (uv - ∫vdu).</p></button>
                                        <button onClick={() => activeMat === 'tabular' ? selectMat(null) : selectMat('tabular')} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'tabular' ? 'border-teal-400 bg-teal-950/40 shadow-[0_0_20px_rgba(20,184,166,0.3)]' : 'border-teal-900 bg-gray-950 hover:border-teal-500 hover:bg-teal-950/20'}`}><span className="text-teal-500 text-[10px] font-black uppercase mb-1">Mat</span><span className="text-white font-bold text-lg group-hover:text-teal-400">Abyssal Stair</span><p className="text-[10px] text-gray-500 mt-2 leading-tight">Tabular Method. Grind mortals to dust.</p></button>
                                        <button onClick={() => selectMat('trigsub')} className={`p-4 rounded-2xl border-2 transition-all text-left flex flex-col group ${activeMat === 'trigsub' ? 'border-amber-400 bg-amber-950/40 shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'border-amber-900 bg-gray-950 hover:border-amber-500 hover:bg-amber-950/20'}`}><span className="text-amber-500 text-[10px] font-black uppercase mb-1">Mat</span><span className="text-white font-bold text-lg group-hover:text-amber-400">Rune Circle</span><p className="text-[10px] text-gray-500 mt-2 leading-tight">Trigonometric Substitution / Geometry.</p></button>
                                    </div>
                                </div>
                            </>
                        )}

                        {gamePhase === 'integration' && (
                            <div className="w-full flex flex-col items-center">
                                <div className="w-full grid grid-cols-4 gap-4">
                                    <button onClick={() => applyIntegrationRule('action1')} disabled={integrationStep !== 0 || integrationPath === 'tabular'} className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20"><span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span><span className="text-white font-bold text-lg">{currentLabels[0]}</span></button>
                                    <button onClick={() => applyIntegrationRule('action2')} disabled={integrationStep !== 1 || integrationPath === 'tabular'} className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20"><span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span><span className="text-white font-bold text-lg">{currentLabels[1]}</span></button>
                                    <button onClick={() => applyIntegrationRule('action3')} disabled={integrationStep !== 2 && integrationPath !== 'tabular'} className="p-4 rounded-xl border-2 border-fuchsia-900 bg-gray-950 hover:border-fuchsia-500 transition-all text-center flex flex-col disabled:opacity-20"><span className="text-fuchsia-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span><span className="text-white font-bold text-lg">{currentLabels[2]}</span></button>
                                    <button onClick={() => applyIntegrationRule('plus_c')} disabled={integrationStep !== 3 && (integrationPath === 'tabular' && integrationStep !== 4)} className="p-4 rounded-xl border-2 border-amber-500 bg-gray-950 hover:border-amber-300 transition-all text-center flex flex-col disabled:opacity-20 shadow-[0_0_15px_rgba(245,158,11,0.2)]"><span className="text-amber-500 text-[10px] font-black uppercase mb-1">Token (-10 Mana)</span><span className="text-white font-bold text-lg">Constant (+C)</span></button>
                                </div>
                                {integrationStep === 4 && ( <button onClick={generateSpell} className="mt-8 px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.3em] rounded-full shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:shadow-[0_0_50px_rgba(59,130,246,0.8)] transition-all transform hover:scale-105 animate-pulse">Summon Next Spell</button> )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
