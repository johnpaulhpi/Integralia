<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integralia: The Shattered Weave - Phase 23 (Refactored)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: transform 0.2s ease-in-out; }
        .log-scroll::-webkit-scrollbar { width: 8px; }
        .log-scroll::-webkit-scrollbar-track { background: #111827; border-radius: 4px; }
        .log-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .svg-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        @keyframes particle-explode { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(180deg); opacity: 0; } }
        .particle { position: absolute; top: 50%; left: 50%; animation: particle-explode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; pointer-events: none; z-index: 50; }
        @keyframes consume { 0% { transform: scale(1); filter: blur(0); } 100% { transform: scale(0) rotate(180deg); filter: blur(20px); opacity: 0; } }
        .animate-consume { animation: consume 1s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; pointer-events: none; }
        @keyframes slash { 0% { clip-path: inset(0 100% 0 0); opacity: 1; } 50% { clip-path: inset(0 0 0 0); opacity: 1; } 100% { clip-path: inset(0 0 0 100%); opacity: 0; } }
        .animate-slash { position: absolute; top: 45%; left: -20%; right: -20%; height: 8px; background: white; box-shadow: 0 0 20px 8px rgba(255,255,255,0.9); transform: rotate(-25deg); animation: slash 0.4s ease-out forwards; z-index: 60; pointer-events: none; }
        @keyframes bleed { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(60px) scale(0.3); opacity: 0; } }
        .blood-drop { position: absolute; bottom: 0; width: 6px; height: 12px; border-radius: 50%; background-color: #dc2626; box-shadow: 0 0 8px #dc2626; animation: bleed 1.2s infinite ease-in; z-index: 45; pointer-events: none; }
        .drop-1 { left: 20%; animation-delay: 0.1s; } .drop-2 { left: 50%; animation-delay: 0.5s; width: 8px; height: 14px; } .drop-3 { left: 80%; animation-delay: 0.3s; }
        @keyframes twitch { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(2px) rotate(5deg); } 50% { transform: translateY(-1px) rotate(-5deg); } 75% { transform: translateY(3px) rotate(2deg); } }
        .fang { animation: twitch 0.3s infinite; transform-origin: top center; }
        @keyframes bubbleUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateY(-40px) scale(1.5); opacity: 0; } }
        .pit-bubble { position: absolute; background: #4b5563; border-radius: 50%; animation: bubbleUp 2s infinite ease-in; pointer-events: none; }
        .mana-bar-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .mat-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-left { animation: slideLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fragile-tremble {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            50% { transform: translate(1px, -1px) rotate(0.5deg); }
            75% { transform: translate(-1px, -1px) rotate(0deg); }
        }
        .fragile-tremble { animation: fragile-tremble 0.15s infinite alternate; }

        
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // SYSTEM REGISTRIES (Data Dictionaries)
        // ==========================================

        const THEMES = {
            blue: { bg: 'bg-blue-950/40', border: 'border-blue-900 hover:border-blue-600', particle: 'bg-blue-500', svg: { main: '#1e3a8a', stroke: '#3b82f6', inner: '#60a5fa' } },
            yellow: { bg: 'bg-yellow-950/40', border: 'border-yellow-900 hover:border-yellow-600', particle: 'bg-yellow-500', svg: { main: '#713f12', stroke: '#eab308', inner: '#facc15' } },
            orange: { bg: 'bg-orange-950/40', border: 'border-orange-900 hover:border-orange-600', particle: 'bg-orange-500', svg: { main: '#7c2d12', stroke: '#ea580c', inner: '#fb923c' } },
            green: { bg: 'bg-green-950/40', border: 'border-green-800 hover:border-green-500', particle: 'bg-green-500', svg: { main: '#134e4a', stroke: '#14b8a6', inner: '#5eead4' } },
            emerald: { bg: 'bg-emerald-950/40', border: 'border-emerald-900 hover:border-emerald-600', particle: 'bg-emerald-500', svg: { main: '#064e3b', stroke: '#10b981', inner: '#34d399' } },
            red: { bg: 'bg-red-950/40', border: 'border-red-900 hover:border-red-600', particle: 'bg-red-500', svg: { main: '#7f1d1d', stroke: '#ef4444', inner: '#f87171' } },
            fuchsia: { bg: 'bg-fuchsia-950/40', border: 'border-fuchsia-800 hover:border-fuchsia-500', particle: 'bg-fuchsia-500', svg: { main: '#701a75', stroke: '#d946ef', inner: '#f0abfc' } },
            black: { bg: 'bg-black/95', border: 'border-gray-700 hover:border-gray-500', particle: 'bg-gray-500', svg: { main: '#111827', stroke: '#9ca3af', inner: '#4b5563' } },
            gray: { bg: 'bg-gray-950/80', border: 'border-gray-800 border-dashed hover:border-gray-600', particle: 'bg-gray-500', svg: { main: '#374151', stroke: '#9ca3af', inner: '#6b7280' } }
        };

        const CATALYSTS = [
            { id: 'prism', name: 'Chop Into Managable Pieces', lore: 'Linearity & Distribute', icon: '🔪', color: 'text-cyan-400', border: 'border-cyan-500/50', bg: 'bg-cyan-950/30' },
            { id: 'sieve', name: 'Separate Spirits from Bones', lore: 'Extract Constants', icon: '👻', color: 'text-yellow-500', border: 'border-yellow-500/50', bg: 'bg-yellow-950/30' },
            { id: 'wheel', name: 'Stabilize Spirits', lore: 'Direct Trig Eval', icon: '⛓️', color: 'text-indigo-400', border: 'border-indigo-500/50', bg: 'bg-indigo-950/30' },
            { id: 'flame', name: 'Increase Sigil Power', lore: 'The Power Rule', icon: '🔥', color: 'text-orange-500', border: 'border-orange-500/50', bg: 'bg-orange-950/30' },
            { id: 'anchor', name: 'Attach Mana Extractor Needle', lore: 'Finalize (+C)', icon: '💉', color: 'text-gray-300', border: 'border-gray-500/50', bg: 'bg-gray-900/50' }
        ];

        const CARD_REGISTRY = {
            'Fragment of Clor': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] svg-pulse">
                    <circle cx="50" cy="50" r="45" fill="#1e3a8a" stroke="#3b82f6" strokeWidth="2" opacity="0.9" />
                    <circle cx="50" cy="50" r="32" fill="#3b82f6" opacity="0.5" />
                    <polygon points="50,25 70,60 30,60" fill="#eab308" />
                </svg>
            ),
            'Fragment of Orxe': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                    <polygon points="50,15 85,50 50,85 15,50" fill="#eab308" stroke="#ca8a04" strokeWidth="3" />
                    <polyline points="50,15 46,35 55,55 48,70 50,85" fill="none" stroke="#422006" strokeWidth="2" opacity="0.7" />
                    <circle cx="50" cy="50" r="2.5" fill="#3b82f6" />
                </svg>
            ),
            'Unstable Fragment of Clorexro': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(249,115,22,0.6)] svg-pulse">
                    <circle cx="50" cy="50" r="35" fill="none" stroke="#ea580c" strokeWidth="4" />
                    <line x1="10" y1="85" x2="90" y2="15" stroke="#fdba74" strokeWidth="4" strokeLinecap="round" />
                </svg>
            ),
            'Fragment of Exro': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(34,197,94,0.6)]">
                    <path d="M 20 80 Q 50 10 80 80" fill="none" stroke="#22c55e" strokeWidth="4" strokeLinecap="round" />
                    <line x1="10" y1="50" x2="90" y2="50" stroke="#86efac" strokeWidth="2" strokeDasharray="4 4" />
                </svg>
            ),
            'Old Bones': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                    <path d="M 20 50 L 35 50 L 45 80 L 80 20" fill="none" stroke="#10b981" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            ),
            'Expona': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(239,68,68,0.5)] svg-pulse">
                    <path d="M 20 80 Q 60 80, 80 20" fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                </svg>
            ),
            'Leech': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_10px_rgba(156,163,175,0.5)]">
                    <circle cx="50" cy="50" r="25" fill="#111827" stroke="#4b5563" strokeWidth="4" strokeDasharray="4 4" />
                    <path d="M 40 40 Q 50 20 60 40 T 40 40" fill="none" stroke="#9ca3af" strokeWidth="3" />
                </svg>
            ),
            'Residue': (colors) => (
                <svg viewBox="0 0 100 100" className="w-full h-full">
                    <polygon points="50,5 95,50 50,95 5,50" fill={colors.main} stroke={colors.stroke} strokeWidth="2" />
                    <circle cx="50" cy="50" r="10" fill={colors.stroke} opacity="0.5" />
                </svg>
            ),
            'Derived': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(217,70,239,0.6)] svg-pulse">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#d946ef" strokeWidth="2" strokeDasharray="8 4" />
                    <circle cx="50" cy="50" r="10" fill="#f0abfc" />
                </svg>
            ),
            'State': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_20px_rgba(168,85,247,0.8)] svg-pulse">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#a855f7" strokeWidth="3" strokeDasharray="5 5" />
                    <text x="50" y="65" fontSize="40" fill="#d8b4fe" textAnchor="middle" fontFamily="serif" fontStyle="italic">u</text>
                </svg>
            ),
            'Dust': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_10px_rgba(156,163,175,0.3)]">
                    <circle cx="50" cy="50" r="2" fill="#9ca3af" />
                    <circle cx="40" cy="40" r="1" fill="#6b7280" />
                    <circle cx="60" cy="60" r="1.5" fill="#4b5563" />
                    <circle cx="30" cy="60" r="1" fill="#9ca3af" />
                    <circle cx="70" cy="30" r="2" fill="#4b5563" />
                </svg>
            ),
            'Cave Root': () => (
                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(168,85,247,0.6)]">
                    <path d="M 50 15 Q 35 40 45 60 T 25 90 M 50 15 Q 65 30 55 60 T 80 85 M 42 45 Q 20 50 15 70 M 55 45 Q 80 50 85 65" fill="none" stroke="#a855f7" strokeWidth="4" strokeLinecap="round" />
                    <circle cx="50" cy="15" r="5" fill="#d8b4fe" />
                    <circle cx="45" cy="60" r="2" fill="#a855f7" />
                    <circle cx="55" cy="60" r="2.5" fill="#a855f7" />
                </svg>
            )
        };

        // ==========================================
        // GAME COMPONENTS
        // ==========================================

        const MathEquation = ({ equation, size = "text-3xl", inline = false, color = "text-yellow-400" }) => {
            // Generate the KaTeX HTML string during the render cycle, heavily memoized for performance
            const htmlContent = React.useMemo(() => {
                if (!equation) return { __html: '' };
                try {
                    return { __html: katex.renderToString(equation, { displayMode: !inline, throwOnError: false }) };
                } catch (e) {
                    console.error("KaTeX error:", e);
                    return { __html: '<span>Error</span>' };
                }
            }, [equation, inline]);

            // Hand the HTML directly to React so it never gets wiped during a state update
            return <div dangerouslySetInnerHTML={htmlContent} className={`${size} ${color} drop-shadow-md pointer-events-none`}></div>;
        };

        const ParticleBurst = ({ theme }) => {
            const particles = Array.from({ length: 15 }).map((_, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const size = 4 + Math.random() * 6;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                return (
                    <div key={i} className={`particle ${theme.particle} shadow-[0_0_10px_currentColor]`}
                        style={{ width: size, height: size, '--tx': tx, '--ty': ty, clipPath: 'circle(50%)' }} />
                );
            });
            return <div className="absolute inset-0 overflow-visible pointer-events-none z-50">{particles}</div>;
        };

        const BattleCard = ({ card, isActive, isSacrificeTarget, isStitchTarget, onClick, onCycle, isSlashing, isShattering, isConsumed, scale = "scale-100" }) => {
            const tex = card.baseTex || '';
            const name = card.name || '';
            
            // 1. Identify Logic & Theme
            let isLeech = card.isLeech || name === 'dx' || name === 'dθ';
            let isYellow = tex.includes('cos') || name === 'Fragment of Orxe';
            let isBlue = tex.includes('sin') || name === 'Fragment of Clor';
            let isGreen = tex.includes('sec') || name === 'Fragment of Exro';
            let isOrange = tex.includes('tan') || name === 'Unstable Fragment of Clorexro';
            let isEmerald = tex.includes('x') && (card.type === 'Algebraic' || name === 'Old Bones') && !isYellow && !isBlue && !isGreen && !isOrange;

            // Define Fragility Constraints
            const isFragile = (name === 'Unstable Fragment of Clorexro' && card.power === 1) || (card.type === 'Algebraic' && card.baseTex === '1');

            let themeName = 'gray';
            if (isLeech) themeName = 'black';
            else if (isYellow) themeName = 'yellow';
            else if (isBlue) themeName = 'blue';
            else if (isGreen) themeName = 'green';
            else if (isOrange) themeName = 'orange';
            else if (isEmerald) themeName = 'emerald';
            else if (name === 'Expona') themeName = 'red';
            else if (name === 'Cave Root' || card.type === 'Derived' || card.type === 'Resonant' || name === 'Bleeding Coil' || name.includes('State') || name === 'Refined Solution') themeName = 'fuchsia';

            const theme = THEMES[themeName] || THEMES.gray;

            // 2. Fetch Rendering Function from Registry
            const renderVisual = () => {
                if (isLeech) return CARD_REGISTRY['Leech']();
                if (name === 'Fragment of Clor' || (isBlue && card.type !== 'Derived' && !name.includes('State') && name !== 'Residue' && name !== 'Compound')) return CARD_REGISTRY['Fragment of Clor']();
                if (name === 'Fragment of Orxe' || (isYellow && card.type !== 'Derived' && !name.includes('State') && name !== 'Residue' && name !== 'Compound')) return CARD_REGISTRY['Fragment of Orxe']();
                if (name === 'Unstable Fragment of Clorexro' || (isOrange && card.type !== 'Derived' && !name.includes('State') && name !== 'Residue' && name !== 'Compound')) return CARD_REGISTRY['Unstable Fragment of Clorexro']();
                if (name === 'Fragment of Exro' || (isGreen && card.type !== 'Derived' && !name.includes('State') && name !== 'Residue' && name !== 'Compound')) return CARD_REGISTRY['Fragment of Exro']();
                if (isEmerald && name !== 'Residue' && name !== 'Compound') return CARD_REGISTRY['Old Bones']();
                if (name === 'Residue' || name === 'Compound') return CARD_REGISTRY['Residue'](theme.svg);
                if (name === 'Expona') return CARD_REGISTRY['Expona']();
                if (name === 'Dust') return CARD_REGISTRY['Dust']();
                if (name === 'Cave Root' || card.baseTex?.includes('\\ln')) return CARD_REGISTRY['Cave Root']();
                if (name.includes('State') || name === 'Refined Solution') return CARD_REGISTRY['State']();
                if (card.type === 'Derived' || card.type === 'Resonant' || card.type === 'Void') return CARD_REGISTRY['Derived']();
                return <svg viewBox="0 0 100 100" className="w-full h-full"><circle cx="50" cy="50" r="20" fill="none" stroke="gray" strokeWidth="2" /></svg>;
            };

            // 3. Dynamic Border Classes & Flavor Text Override
            let borderClass = theme.border;
            if (isActive) borderClass = 'border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.5)] scale-105';
            if (isStitchTarget) borderClass = 'border-emerald-400 shadow-[0_0_25px_rgba(16,185,129,0.5)] scale-105';
            if (isSacrificeTarget) borderClass = 'border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.7)] animate-pulse scale-105';

            let displayAbility = card.ability;
            if (isFragile) displayAbility = "Fragile, and ready to shatter.";
            if (card.isBleeding && !isLeech && card.name !== 'Compound') displayAbility = "Pierced and Bleeding.";

            return (
                <div className={`relative flex flex-col items-center ${isConsumed ? 'animate-consume' : ''} ${scale} origin-center transition-all duration-300 hover:-translate-y-2`}>
                    <div onClick={onClick} className={`relative flex flex-col w-[190px] h-[270px] rounded-2xl border-2 transition-all overflow-visible cursor-pointer z-40 ${theme.bg} ${borderClass} ${isFragile ? 'fragile-tremble' : ''}`}>
                        
                        {/* Shattered Glass Overlay */}
                        {isFragile && (
                            <div className="absolute inset-0 pointer-events-none z-10 overflow-hidden rounded-2xl opacity-70 mix-blend-overlay">
                                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full drop-shadow-md">
                                    <path d="M 40 -5 L 50 20 L 45 45 L 60 70 L 50 105" fill="none" stroke="#ffffff" strokeWidth="1" opacity="0.8" />
                                    <path d="M 40 -5 L 50 20 L 45 45 L 60 70 L 50 105" fill="none" stroke="#000000" strokeWidth="2" opacity="0.4" />
                                    <path d="M 50 20 L 80 10 M 50 20 L 15 30 M 45 45 L 90 50 M 45 45 L 5 60 M 60 70 L 95 90 M 60 70 L 20 85" fill="none" stroke="#ffffff" strokeWidth="0.5" opacity="0.6" />
                                    <path d="M 50 20 L 80 10 M 50 20 L 15 30 M 45 45 L 90 50 M 45 45 L 5 60 M 60 70 L 95 90 M 60 70 L 20 85" fill="none" stroke="#000000" strokeWidth="1" opacity="0.3" />
                                </svg>
                            </div>
                        )}

                        {isSlashing && <div className="animate-slash z-50"></div>}
                        <div className="absolute -top-3 left-4 px-2 py-0.5 bg-gray-900 border border-gray-700 rounded text-[9px] font-black tracking-tighter text-gray-400 uppercase z-50 drop-shadow-md">{card.type}</div>

                        {/* NEW: The Negative Sigil (Upper Middle) */}
                        {card.isNegative && (
                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-gray-950 border-[3px] border-white flex items-center justify-center text-white text-3xl font-black shadow-[0_0_15px_rgba(255,255,255,0.9)] z-50 animate-pulse">
                                <span className="mb-1 drop-shadow-[0_0_8px_rgba(255,255,255,1)]">-</span>
                            </div>
                        )}

                        {(card.canCycle || (card.type === 'Algebraic' && !card.baseTex?.includes('\\sqrt'))) && onCycle && (
                            <div onClick={(e) => { e.stopPropagation(); onCycle(card.id); }}
                                className="absolute -top-4 -left-4 w-10 h-10 rounded-full bg-emerald-900 border-2 border-emerald-400 flex items-center justify-center text-emerald-200 text-xl font-bold shadow-lg z-50 hover:bg-emerald-700 hover:scale-110 transition-transform">⟳</div>
                        )}

                        {card.isBleeding && !isLeech && (
                            <div className="absolute -bottom-4 -left-4 w-10 h-10 rounded-full bg-red-950 border-2 border-red-500 flex items-center justify-center text-red-400 text-xl shadow-[0_0_15px_rgba(220,38,38,0.5)] z-50">🩸</div>
                        )}

                        {isLeech && (
                            <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 flex justify-center gap-2 z-50 pointer-events-none">
                                <svg viewBox="0 0 20 40" className="w-3 h-5 fang fill-gray-200 drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]"><path d="M0,0 L10,40 L20,0 Z"/></svg>
                                <svg viewBox="0 0 20 40" className="w-3 h-5 fang fill-gray-200 drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]" style={{animationDelay: '0.15s'}}><path d="M0,0 L10,40 L20,0 Z"/></svg>
                            </div>
                        )}

                        {card.power > 1 && (
                            <div className="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-red-600 border-2 border-gray-900 flex items-center justify-center text-white font-bold text-xl shadow-lg z-50">{card.power}</div>
                        )}

                        <div className="h-[90px] w-full border-b border-white/5 flex items-center justify-center relative bg-gradient-to-b from-white/5 to-transparent rounded-t-2xl overflow-visible p-3 z-20">
                            {isShattering && <ParticleBurst theme={theme} />}
                            <div className={`w-full h-full scale-50 ${isShattering ? "opacity-0" : "opacity-100 transition-opacity duration-300"} flex items-center justify-center`}>{renderVisual()}</div>
                        </div>

                        {/* FIXED: Z-Index explicitly set to 50 to render text over the backgrounds */}
                        <div className="flex-1 flex flex-col items-center justify-center px-2 relative z-50 w-full">
                            <span className="text-gray-300 text-[10px] font-bold uppercase tracking-widest mb-1 drop-shadow-md">{isLeech ? 'Strange Leech' : card.name}</span>
                            <div className="pointer-events-none scale-90 text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]"><MathEquation equation={card.baseTex} size="text-2xl" color="text-white" /></div>
                        </div>

                        <div className="h-[65px] w-full bg-black/60 border-t border-white/5 rounded-b-2xl p-2 flex items-center justify-center relative z-20">
                            <p className="text-[10px] text-gray-300 text-center leading-tight italic px-1 z-10 drop-shadow-md">"{displayAbility}"</p>
                            {(card.isBleeding && !isLeech) && (
                                <>
                                    <div className="blood-drop drop-1"></div><div className="blood-drop drop-2"></div><div className="blood-drop drop-3"></div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const IntegraliaGame = () => {
            const [mana, setMana] = useState(0);
            const [gamePhase, setGamePhase] = useState('setup');
            const [integrationStep, setIntegrationStep] = useState(0);
            const [integrationPath, setIntegrationPath] = useState(null); 

            const [bossCards, setBossCards] = useState([]);
            const [initialCards, setInitialCards] = useState([]); // NEW: Stores the snapshot!
            
            const [altarCore, setAltarCore] = useState(null);
            const [altarSacrifice, setAltarSacrifice] = useState(null);
            const [altarExpanded, setAltarExpanded] = useState([]);
            
            const [ibpU, setIbpU] = useState(null);
            const [ibpDv, setIbpDv] = useState(null);
            const [ibpDerived, setIbpDerived] = useState(null);

            const [trigSubCard, setTrigSubCard] = useState(null);

            const [tabularU, setTabularU] = useState([]); 
            const [tabularDv, setTabularDv] = useState([]); 
            const [tabularComplete, setTabularComplete] = useState(false);

            const [leechMatTarget, setLeechMatTarget] = useState(null);
            const [leechMatBlood, setLeechMatBlood] = useState(null);

            const [shrineCard, setShrineCard] = useState(null); 
            // --- NEW: FOIL MAT STATES ---
            const [foilLeft, setFoilLeft] = useState(null);
            const [foilRight, setFoilRight] = useState(null);
            const [activeCatalyst, setActiveCatalyst] = useState(null);

            // --- NEW: RATIONAL EXPRESSION MAT STATES ---
            const [fractionNum, setFractionNum] = useState([]);
            const [fractionDen, setFractionDen] = useState([]);
            const [fractionDecomp, setFractionDecomp] = useState([]);
            const [skeletonQuotient, setSkeletonQuotient] = useState(null);
            const [skeletonEssence, setSkeletonEssence] = useState(null);
            const [skeletonLeech, setSkeletonLeech] = useState(null);
            // --- NEW: BONE CARVING MINIGAME STATES ---
            const [isCarving, setIsCarving] = useState(false);
            const [carvingStep, setCarvingStep] = useState(0); 
            const [activeRemainder, setActiveRemainder] = useState('');
            const [activeQuotient, setActiveQuotient] = useState('');
            const [isDecomposing, setIsDecomposing] = useState(false);
            const [decompStep, setDecompStep] = useState(0);
            
            const [activeMode, setActiveMode] = useState(null); 
            const [activeMat, setActiveMat] = useState(null); 
            
            const [slashingId, setSlashingId] = useState(null);
            const [shatteringId, setShatteringId] = useState(null);
            const [stitchTargetId, setStitchTargetId] = useState(null);
            const [consumeAll, setConsumeAll] = useState(false);
            
            const [logs, setLogs] = useState([]);
            const logEndRef = useRef(null);
            const addLog = (msg) => setLogs(prev => [...prev, msg]);
            
            // Existing log scroll effect
            useEffect(() => { if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);

            // ==========================================
            // NEW: Deal the starting hand on initial load!
            // ==========================================
            useEffect(() => {
                generateSpell();
            }, []); 
            // ==========================================

            // Utility to build a card quickly
            const buildCard = (name, baseTex, baseMath, power, type = 'Core', canCycle = false, ability = '', isBleeding = false, isLeech = false) => {
                return { id: `${name.toLowerCase()}-${Date.now()}-${Math.floor(Math.random()*1000)}`, name, type, baseTex, baseMath, power, canCycle, ability, isBleeding, isLeech };
            };
//=======================
//GENERATE SPELL
//=======================
            const generateSpell = () => {
                const spellType = Math.floor(Math.random() * 5); 
                const newCards = [];
                let logMsg = "";

                if (spellType === 0) {
                    let sinPower = Math.floor(Math.random() * 3) + 1; 
                    let cosPower = Math.floor(Math.random() * 3) + 1; 

                    if (sinPower > 0) newCards.push(buildCard('Fragment of Clor', '\\sin(x)', 'sin(x)', sinPower, 'Core', (sinPower % 2 === 0), "Immortal spirit apparently associated with sunlight. Depicted in old stone-age carvings."));
                    if (cosPower > 0) newCards.push(buildCard('Fragment of Orxe', '\\cos(x)', 'cos(x)', cosPower, 'Core', (cosPower % 2 === 0), "Immortal spirit associated with moonlight.  Depicted in ochre paintings on old bones."));
                    logMsg = `A wild spell appears! Refine sin^${sinPower}(x) cos^${cosPower}(x).`;
                } else if (spellType === 1) {
                    let secPower = Math.floor(Math.random() * 3) + 1; 
                    let tanPower = Math.floor(Math.random() * 3) + 1; 


                    if (secPower > 0) newCards.push(buildCard('Fragment of Exro', '\\sec(x)', 'sec(x)', secPower, 'Core', (secPower % 2 === 0), "The mortal enemy of the moonlight spirit. Constantly hunting his own shadow.  It's said that if they ever touched, they would reduce each other to bones."));
                    if (tanPower > 0) newCards.push(buildCard('Unstable Fragment of Clorexro', '\\tan(x)', 'tan(x)', tanPower, 'Core', true, "Multiple voices echo in the mind of the twin spirit. Some say it was driven to madness long ago.")); 
                    logMsg = `A wild spell appears! Refine sec^${secPower}(x) tan^${tanPower}(x).`;
                } else if (spellType === 2) {
                    const xPower = Math.floor(Math.random() * 3) + 1; 
                    newCards.push(buildCard('Old Bones', xPower === 1 ? 'x' : `x^${xPower}`, xPower === 1 ? 'x' : `x^${xPower}`, xPower, 'Core', false, "Rumored to be the remains of a demigod, now they're just dusty, and brittle.", false));

                    const ibpType = Math.floor(Math.random() * 4);
                    const trig = ibpType === 0 ? {n:'Expona', t:'e^x', m:'exp(x)'} : 
                                 (ibpType === 1 ? {n:'Fragment of Orxe', t:'\\cos(x)', m:'cos(x)'} : 
                                 (ibpType === 2 ? {n:'Fragment of Clor', t:'\\sin(x)', m:'sin(x)'} : 
                                 {n:'Cave Root', t:'\\ln(x)', m:'log(x)'}));
                    newCards.push(buildCard(trig.n, trig.t, trig.m, 1, 'Core', false, trig.n === 'Cave Root' ? "A tangled, subterranean mathematical structure." : "Undying Spirit.", false));
                    logMsg = `A wild spell appears! Descent or Dual-Weave required.`;

                } else if (spellType === 3) {
                    const radType = Math.floor(Math.random() * 3); 
                    
                    if (radType === 0) {
                        newCards.push(buildCard('Old Bones', '\\sqrt{1-x^2}', 'sqrt(1-x^2)', 1, 'Algebraic', true, "Grows warm under moonlight.", false));
                    } else if (radType === 1) {
                        newCards.push(buildCard('Old Bones', '\\sqrt{x^2+1}', 'sqrt(x^2+1)', 1, 'Algebraic', false, "Marrow shows signs of internal strain, as though the bones were resisting some internal force.", false));
                    } else {
                        newCards.push(buildCard('Old Bones', '\\sqrt{x^2-1}', 'sqrt(x^2-1)', 1, 'Algebraic', false, "Grows ice cold under moonlight.", false));
                    }
                    
                    logMsg = `A wild spell appears! A Radical calls out for the Rune Circle.`;

                    } else if (spellType === 4) {
                    newCards.push(buildCard('Old Bones', 'x^3+2x^2+x', 'x^3+2x^2+x', 1, 'Algebraic', false, "A heavy, complex skull. (Numerator)", false));
                    newCards.push(buildCard('Old Bones', 'x^2-1', 'x^2-1', 1, 'Algebraic', false, "A fractured pelvis. (Denominator)", false));
                    logMsg = `A wild spell appears! The bones are stacked. Time for Polynomial Division or Partial Fractions.`;
                }

                // Exactly ONE Leech!
                newCards.push(buildCard('dx', 'dx', 'dx', 1, 'Fragment', true, "A jet-black leech. It writhes around hungrily.", false, true));
                
                setBossCards(newCards);
                setInitialCards([...newCards]); // Take the snapshot!
                
                // Clear all states cleanly
                setGamePhase('setup'); setIntegrationStep(0); setIntegrationPath(null); setActiveMode(null); setActiveMat(null);
                setAltarCore(null); setAltarSacrifice(null); setAltarExpanded([]);
                setIbpU(null); setIbpDv(null); setIbpDerived(null);
                setTrigSubCard(null); setTabularU([]); setTabularDv([]); setTabularComplete(false);
                setLeechMatTarget(null); setLeechMatBlood(null);
                
                addLog(logMsg);
            };
//==========================================
//END GENERATE SPELL
//==========================================
//==========================================
// HANDLE CYCLE
//==========================================
            const handleCycle = (cardId) => {
                let isTrigSubMat = false;
                let card = bossCards.find(c => c.id === cardId);
                
                // If it's not on the main board, check the Rune Circle!
                if (!card && trigSubCard && trigSubCard.id === cardId) {
                    card = trigSubCard;
                    isTrigSubMat = true;
                }
                
                if (!card) return;

                // NEW: Leech Variable Shifting
                if (card.isLeech) {
                    const nextVar = card.baseTex === 'dx' ? 'd\\theta' : (card.baseTex === 'd\\theta' ? 'du' : 'dx');
                    setBossCards(prev => prev.map(c => c.id === cardId ? { ...c, name: nextVar, baseTex: nextVar, baseMath: nextVar } : c));
                    addLog(`The Leech shifts its form. It now thirsts for ${nextVar}.`);
                    return;
                }

                // NEW: Radical Resonance Shifting
                if (card.baseTex?.includes('\\sqrt')) {
                    if (card.baseTex.includes('1-x^2')) {
                        const isCos = card.ability.includes('Cosine');
                        const newAbility = isCos ? "These old bones repair their cracks when exposed to sunlight." : "These old bones grow warm when exposed to moonlight.";
                        
                        // Update the card wherever it currently lives
                        if (isTrigSubMat) {
                            setTrigSubCard({ ...card, ability: newAbility });
                        } else {
                            setBossCards(prev => prev.map(c => c.id === cardId ? { ...c, ability: newAbility } : c));
                        }
                        
                        addLog(`You tune the bones. The resonance shifts to ${isCos ? 'Sine' : 'Cosine'}.`);
                    } else {
                        addLog("These bones are stable. We can't change their form.");
                    }
                    return;
                }

                // 1. Tana Shatter Logic (The one physical break in the game!)
                if (card.name === 'Unstable Fragment of Clorexro' && card.power === 1) {
                    if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana!"); return; }
                    setMana(m => m - 10);
                    const newCards = bossCards.filter(c => c.id !== cardId);
                    newCards.push(
                        buildCard('Fragment of Clor', '\\sin(x)', 'sin(x)', 1, 'Core', false, "Shattered Numerator.", card.isBleeding),
                        buildCard('Fragment of Exro', '\\sec(x)', 'sec(x)', 1, 'Core', false, "Shattered Denominator.", card.isBleeding)
                    );
                    setBossCards(newCards);
                    addLog(`Identity Cycled: Shattered Tangent into Clor and Exro!`);
                    return;
                }

                // 2. Algebraic '1' Shatter Logic (Pythagorean)
                if (card.type === 'Algebraic' && card.baseTex === '1') {
                    if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana!"); return; }
                    setMana(m => m - 10);
                    const newCards = bossCards.filter(c => c.id !== cardId);
                    newCards.push(
                        buildCard('Fragment of Clor', '\\sin(x)', 'sin(x)', 2, 'Core', true, "Shattered Pythagorean.", card.isBleeding),
                        buildCard('Fragment of Orxe', '\\cos(x)', 'cos(x)', 2, 'Core', true, "Shattered Pythagorean.", card.isBleeding)
                    );
                    setBossCards(newCards);
                    addLog(`Identity Cycled: Shattered The Monad into Sine squared and Cosine squared!`);
                    return;
                }

                // 3. Expona Rolodex (e^{2x} <-> (e^x)^2)
                if (card.name === 'Expona') {
                    if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana!"); return; }
                    setMana(m => m - 10);
                    const newCards = bossCards.filter(c => c.id !== cardId);
                    
                    if (card.baseTex === 'e^{2x}') {
                        newCards.push(buildCard('Expona', 'e^x', 'exp(x)', 2, 'Core', true, "Morphed Exponential.", card.isBleeding));
                        addLog(`Identity Cycled: Morphed Exponential base!`);
                    } else {
                        newCards.push(buildCard('Expona', 'e^{2x}', 'exp(2*x)', 1, 'Core', true, "Restored Exponential base.", card.isBleeding));
                        addLog(`Identity Cycled: Restored Exponential base!`);
                    }
                    setBossCards(newCards);
                    return;
                }

                // 4. Mana Accounting for standard cycles
                if (card.name === 'Fragment of Clor' || card.name === 'Fragment of Orxe' || card.name === 'Unstable Fragment of Clorexro' || card.name === 'Fragment of Exro' || card.type === 'Algebraic') {
                    setMana(m => m + 10); addLog(`Identity Cycled: Extracting mana from the shell.`);
                } else if (card.name === 'Residue') {
                    if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana! Hardening a Residue costs 10 Mana."); return; }
                    setMana(m => m - 10); addLog(`Identity Cycled: Hardening Residue back into a Core.`);
                }

                // 5. The Core / Residue / Algebraic Rolodex
                setBossCards(prev => prev.map(c => {
                    if (c.id === cardId) {
                        
                        // Core -> Residue (Mathematically Strict!)
                        if (['Fragment of Clor', 'Fragment of Orxe', 'Unstable Fragment of Clorexro', 'Fragment of Exro'].includes(c.name)) {
                            // The Gatekeeper: You cannot transmute an odd power!
                            if (c.power % 2 !== 0) {
                                addLog("Requires an even power to transmute into a Residue!");
                                return c;
                            }
                            
                            const newPower = c.power / 2; // e.g. sin^4(x) becomes (1-cos^2(x))^2
                            
                            if (c.name === 'Fragment of Clor') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\cos^2(x))', baseMath: '(1-cos(x)^2)', power: newPower, canCycle: true, ability: "Transmuted into the spirit of moonlight." };
                            else if (c.name === 'Fragment of Orxe') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1-\\sin^2(x))', baseMath: '(1-sin(x)^2)', power: newPower, canCycle: true, ability: "Transmuted into the spirit of sunlight." };
                            else if (c.name === 'Unstable Fragment of Clorexro') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(\\sec^2(x)-1)', baseMath: '(sec(x)^2-1)', power: newPower, canCycle: true, ability: "Transmuted into the hunter of the moonlight spirit." };
                            else if (c.name === 'Fragment of Exro') return { ...c, name: 'Residue', type: 'Converted Core', baseTex: '(1+\\tan^2(x))', baseMath: '(1+tan(x)^2)', power: newPower, canCycle: true, ability: "Transmuted into the mad spirit amalgamate Clorexro." };
                        }
                        
                        // Algebraic Rolodex
                        else if (c.type === 'Algebraic') {
                            if (c.baseTex === '\\sin^2(x)+\\cos^2(x)') {
                                return buildCard('Old Bones', '1', '1', 1, 'Algebraic', true, "The Monad.");
                            }
                        } 
                        
                        // Residue -> Core (Mathematically Strict!)
                        else if (c.name === 'Residue') {
                            const restoredPower = c.power * 2; // e.g. (1-cos^2(x))^2 becomes sin^4(x)
                            
                            if (c.baseTex && c.baseTex.includes('cos')) return buildCard('Fragment of Clor', '\\sin(x)', 'sin(x)', restoredPower, 'Core', true, "Restored to the spirit of sunlight.", c.isBleeding);
                            else if (c.baseTex && c.baseTex.includes('sin')) return buildCard('Fragment of Orxe', '\\cos(x)', 'cos(x)', restoredPower, 'Core', true, "Restored to the spirit of moonlight.", c.isBleeding);
                            else if (c.baseTex && c.baseTex.includes('sec')) return buildCard('Unstable Fragment of Clorexro', '\\tan(x)', 'tan(x)', restoredPower, 'Core', true, "Restored to its natural level of madness.", c.isBleeding);
                            else if (c.baseTex && c.baseTex.includes('tan')) return buildCard('Fragment of Exro', '\\sec(x)', 'sec(x)', restoredPower, 'Core', true, "Restored to prepare for the hunt...", c.isBleeding);
                        }
                    }
                    return c; 
                }));
            };
//==========================================
// END OF HANDLE CYCLE
//==========================================
//==========================================
// BOSSCARDS
//==========================================
            const handleBossCardClick = (card) => {
                // ==========================================
                // PHASE 2: CRUCIBLE COMBAT LOGIC
                // ==========================================
                if (gamePhase === 'integration') {
                    if (!activeCatalyst) { addLog("Equip a Catalyst from the Forge below first."); return; }
                    
                    let action = null;
                    const catId = activeCatalyst;
                    
                    // The Altar (U-Substitution) Path
                    if (integrationPath === 'altar') {
                        if (integrationStep === 0 && catId === 'prism') action = 'action1'; // Prism distributes
                        else if (integrationStep === 1 && catId === 'prism') action = 'action2'; // Prism splits integral
                        else if (integrationStep === 2 && catId === 'flame') action = 'action3'; // Flame does power rule
                        else if (integrationStep === 3 && catId === 'anchor') action = 'plus_c'; // Anchor adds +C
                    } 
                    // The Shrine (Direct Eval) Path
                    else if (integrationPath === 'direct') {
                        if (integrationStep === 2 && catId === 'wheel') action = 'action3'; 
                        else if (integrationStep === 3 && catId === 'anchor') action = 'plus_c';
                    }
                    // The Dual-Weave (IBP) Path
                    else if (integrationPath === 'ibp') {
                        if (integrationStep === 0 && catId === 'sieve') action = 'action1'; // Sieve simplifies
                        // NEW: Opened up Step 1 to accept the Flame (Power Rule) for Algebraic integrals!
                        else if (integrationStep === 1 && (catId === 'wheel' || catId === 'flame')) action = 'action2'; 
                        else if (integrationStep === 2 && (catId === 'wheel' || catId === 'flame' || catId === 'sieve')) action = 'action3';
                        else if (integrationStep === 3 && catId === 'anchor') action = 'plus_c';
                    }
                    // The Tabular Path
                    else if (integrationPath === 'tabular') {
                        if (integrationStep === 3 && catId === 'anchor') action = 'plus_c';
                    }

                    if (action) {
                        applyIntegrationRule(action);
                        addLog(`The ${CATALYSTS.find(c=>c.id===catId).name} reacts violently with the integral!`);
                    } else {
                        addLog(`The Catalyst rejects this spirit. Use a different elemental tool.`);
                    }
                    setActiveCatalyst(null);
                    return;
                }
                // ==========================================

                // If not in setup phase, ignore standard clicks
                if (gamePhase !== 'setup') return;

                if (activeMode === 'slice') {
                    if (card.power > 1) {
                        setSlashingId(card.id); setMana(m => m + 10);
                        setTimeout(() => {
                            setSlashingId(null); setShatteringId(card.id);
                            setTimeout(() => {
                                const newCards = [...bossCards];
                                const idx = newCards.findIndex(c => c.id === card.id);
                                newCards[idx] = { ...card, power: card.power - 1, canCycle: (['Fragment of Clor','Fragment of Orxe','Unstable Fragment of Clorexro','Fragment of Exro'].includes(card.name) && (card.power-1)%2===0) || (card.name === 'Unstable Fragment of Clorexro' && (card.power-1) === 1) };
                                newCards.splice(idx+1, 0, buildCard(card.name, card.baseTex, card.baseMath, 1, 'Fragment', card.name === 'Unstable Fragment of Clorexro', "Cleaved Fragment.", true));
                                setBossCards(newCards); setShatteringId(null); setActiveMode(null);
                            }, 500);
                        }, 300);
                    } else { addLog("Cannot slice a power 1 spirit."); }
                    return;
                }

                if (activeMode === 'bleed') {
                    if (card.isBleeding) { addLog("That spirit is already bleeding."); return; }
                    setBossCards(prev => prev.map(c => c.id === card.id ? { ...c, isBleeding: true, ability: "Pierced and Bleeding." } : c));
                    setActiveMode(null); addLog(`Pierced the ${card.name}. It is now bleeding!`);
                    return;
                }

                if (activeMode === 'stitch_1') {
                    setStitchTargetId(card.id); setActiveMode('stitch_2');
                    addLog(`Selected ${card.name} as the first thread. Select a matching card to stitch.`);
                    return;
                } else if (activeMode === 'stitch_2') {
                    if (card.id === stitchTargetId) { addLog("Cannot stitch a card to itself."); return; }
                    const target1 = bossCards.find(c => c.id === stitchTargetId);
                    const target2 = card;

                    const isLeech1 = target1.isLeech || target1.name === 'dx' || target1.name === 'dθ';
                    const isLeech2 = target2.isLeech || target2.name === 'dx' || target2.name === 'dθ';

                    // 1. Stitching to a Leech
                    if ((isLeech1 && target2.isBleeding) || (isLeech2 && target1.isBleeding)) {
                        if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana! Stitching to a Leech costs 10 Mana."); setActiveMode(null); setStitchTargetId(null); return; }
                        const leech = isLeech1 ? target1 : target2;
                        const ghost = isLeech1 ? target2 : target1;
                        
                        let ghostTex = ghost.baseTex;
                        if (ghost.power > 1) {
                            if (ghost.name === 'Fragment of Exro') ghostTex = `\\sec^${ghost.power}(x)`;
                            else if (ghost.name === 'Unstable Fragment of Clorexro') ghostTex = `\\tan^${ghost.power}(x)`;
                            else if (ghost.name === 'Fragment of Clor') ghostTex = `\\sin^${ghost.power}(x)`;
                            else if (ghost.name === 'Fragment of Orxe') ghostTex = `\\cos^${ghost.power}(x)`;
                            else ghostTex = `${ghost.baseTex}^${ghost.power}`;
                        }

                        setMana(m => m - 10);
                        const newCards = bossCards.filter(c => c.id !== target1.id && c.id !== target2.id);
                        newCards.push(buildCard('Compound', `${ghostTex} \\, ${leech.baseTex}`, `${ghost.baseMath}*${leech.baseMath}`, 1, 'Sacrifice', false, "The leech wriggles happily as it drinks the blood of the undying spirit.", true));
                        setBossCards(newCards); setStitchTargetId(null); setActiveMode(null);
                        addLog(`Stitched the Differential! The Leech is full.`);
                        return;
                    }

                    // 2. Special Logic for Sec(x)Tan(x) fusion
                    if ((target1.baseTex?.includes('sec') && target2.baseTex?.includes('tan')) || (target1.baseTex?.includes('tan') && target2.baseTex?.includes('sec'))) {
                        if (target1.power === 1 && target2.power === 1) {
                            if (typeof ENABLE_MANA !== 'undefined' && ENABLE_MANA && mana < 10) { addLog("Not enough Mana!"); setActiveMode(null); setStitchTargetId(null); return; }

                                        {decompStep < 2 && (
                                            <div className="flex flex-col items-center">
                                                <span className="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-4">Select the Heaviside Root (x = ?):</span>
                                                <div className="flex gap-4">
                                                    {['1', '-1', '0', '2'].map(val => (
                                                        <button 
                                                            key={val} onClick={() => handleDecompStrike(val)}
                                                            className="w-16 h-16 rounded-lg border-2 border-gray-700 bg-gray-900 hover:border-emerald-500 hover:bg-gray-800 flex items-center justify-center transition-all shadow-md hover:-translate-y-1 font-mono text-2xl text-gray-300"
                                                        >
                                                            {val}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                        {activeMat === 'tabular' && (
                            <div className="w-8/12 bg-teal-950/10 border-2 border-teal-900/40 rounded-[2rem] p-6 flex flex-col animate-slide-left overflow-y-auto log-scroll">
                                <h2 className="text-teal-500/50 text-xs font-black uppercase text-center mb-4">Bone Grinder</h2>
                                {tabularU.length === 0 && <div className="text-teal-900/50 font-bold text-xs uppercase tracking-widest text-center m-auto">There is a slot for old bones, and a strange metal assembly acting as a focus for an eternal spirit...<br/> The spirit swirls hungrily around the bones. Feeding them might work out in your favor.</div>}
                                {tabularU.map((u, i) => (
                                    <div key={i} className="flex justify-center gap-12 mb-4 items-center">
                                        <div className="w-[140px]">{i===0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block">Bone Slot (u)</span>}<BattleCard card={u} scale="scale-75" /></div>
                                        <div className="w-[80px] flex flex-col items-center justify-center relative h-[200px]">
                                            {i < tabularDv.length - 1 && (
                                                <div className="absolute top-[60%] left-1/2 w-full h-full border-l-4 border-b-4 border-dashed border-teal-500/30 rounded-bl-3xl -translate-x-1/2 pointer-events-none">
                                                    <div className={`absolute bottom-[-15px] left-1/2 -translate-x-1/2 text-xl pb-1 font-black ${i%2===0 ? 'text-amber-400 border-amber-500/50' : 'text-red-500 border-red-500/50'} bg-gray-950 rounded-full w-8 h-8 flex items-center justify-center border-2 shadow-[0_0_10px_currentColor]`}>{i%2===0?'+':'-'}</div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="w-[140px]">
                                            {i===0 && <span className="text-teal-400 font-bold uppercase tracking-widest text-[9px] mb-2 text-center block"> Starving Spirit (dv)</span>}
                                            {tabularDv[i] ? <BattleCard card={tabularDv[i]} scale="scale-75" /> : <div className="w-[190px] h-[270px] scale-75 border-2 border-dashed border-teal-900/50 rounded-2xl flex items-center justify-center bg-black/40"><span className="text-teal-800 text-[10px] uppercase font-bold text-center">Waiting for<br/>Echo</span></div>}
                                        </div>
                                    </div>
                                ))}
                                <div className="flex justify-center gap-4 mt-4">
                                    {tabularU.length > 0 && tabularDv.length > 0 && (!tabularComplete ? <button onClick={stepIntoAbyss} className="bg-teal-900/50 border border-teal-500 hover:bg-teal-800 text-teal-300 px-6 py-2 rounded-full text-[10px] font-bold uppercase">Crank the bone grinder</button> : <button onClick={reapEchoes} className="bg-teal-600 px-8 py-3 rounded-full font-black uppercase text-xs hover:bg-teal-500 shadow-[0_0_20px_rgba(20,184,166,0.5)]">Free the fed spirit</button>)}
                                </div>
                            </div>
                        )}
                        
                        {activeMat === 'ibp' && (
                            <div className="w-8/12 bg-fuchsia-950/10 border-2 border-fuchsia-900/40 rounded-[2rem] p-6 flex flex-col items-center animate-slide-left">
                                <h2 className="text-fuchsia-500/50 text-xs font-black uppercase mb-4">The Boiling Pot</h2>
                                <div className="flex justify-center gap-6 w-full">
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center text-center">{ibpU ? <BattleCard card={ibpU} scale="scale-75" onClick={() => handleIbpClick('u')} /> : <span className="text-fuchsia-900/40 text-[10px] uppercase font-bold px-2"> Deep Cave Root (u)</span>}</div>
                                    <div className="w-[160px] h-[220px] border-2 border-dashed border-fuchsia-900/50 rounded-2xl flex items-center justify-center text-center">{ibpDv ? <BattleCard card={ibpDv} scale="scale-75" onClick={() => handleIbpClick('dv')} /> : <span className="text-fuchsia-900/40 text-[10px] uppercase font-bold px-2"> Other potion ingredients (dv)</span>}</div>
                                </div>
                                <div className="w-full border-t border-fuchsia-900/30 pt-4 mt-4 flex flex-col items-center flex-1">
                                    <span className="text-fuchsia-400 font-bold uppercase tracking-widest text-[9px] mb-2">3. Expanded Form [ u v - ∫ v du ]</span>
                                    <div className="w-full flex-1 flex justify-center items-center gap-2 bg-black/30 rounded-2xl p-2 border border-fuchsia-900/20">
                                        {!ibpU || !ibpDv || !ibpDerived ? <span className="text-fuchsia-900/50 font-bold text-[10px] uppercase tracking-widest text-center">Bind u and dv to expand the sequence</span> : (
                                            <div className="flex items-center justify-center gap-1 w-full h-full">
                                                <div className="w-[85px]"><BattleCard card={ibpU} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500 font-bold text-2xl mx-1">-</div><div className="text-fuchsia-500/50 font-serif text-4xl mr-1">∫</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived v', type:'Derived', baseTex: ibpDerived.vTex, power: 1}} scale="scale-[0.45]" /></div>
                                                <div className="text-fuchsia-500/50 font-bold">·</div>
                                                <div className="w-[85px]"><BattleCard card={{name: 'Derived du', type:'Derived', baseTex: ibpDerived.duTex, power: 1}} scale="scale-[0.45]" /></div><div className="text-fuchsia-500/50 font-bold ml-1">dx</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                {ibpU && ibpDv && <button onClick={confirmIbpWeave} className="mt-4 bg-fuchsia-600 px-10 py-3 rounded-full font-black uppercase text-xs shadow-[0_0_20px_rgba(217,70,239,0.5)] hover:bg-fuchsia-500 hover:scale-105 transition-all">Confirm Weave</button>}
                            </div>
                        )}
                    </div>

                    {/* --- BOTTOM HALF: LOGS & MENUS --- */}
                    <div className="w-full flex flex-col gap-6">
                        
                        <div className="w-full h-32 bg-gray-950 border border-white/5 rounded-2xl p-4 log-scroll overflow-y-auto relative">
                            {logs.map((l, i) => <p key={i} className="text-xs text-gray-500 mb-1 font-mono">> {l}</p>)}
                            <div ref={logEndRef} />
                            <button onClick={resetSpell} className="absolute top-4 right-4 px-3 py-1 bg-red-950/30 border border-red-900/50 text-red-500 hover:bg-red-900/80 hover:text-red-300 text-[9px] font-black uppercase tracking-widest rounded transition-all z-10">⟲ Reset Spell</button>
                        </div>

                        {gamePhase === 'setup' && !activeMat && (
                            <div className="grid grid-cols-4 gap-4 w-full">
                                <button onClick={() => setActiveMode('slice')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='slice'?'border-blue-400 bg-blue-900/30':'border-blue-900 bg-gray-900 hover:border-blue-500 hover:bg-gray-800'}`}><span className="text-blue-500 text-[10px] font-black uppercase">Machine</span><br/><span className="font-bold">Slice</span></button>
                                <button onClick={() => { setActiveMode('bleed'); setActiveMat(null); addLog("Blood Needle equipped. Select a spirit to pierce."); }} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='bleed'?'border-red-400 bg-red-900/30':'border-red-900 bg-gray-900 hover:border-red-500 hover:bg-gray-800'}`}><span className="text-red-500 text-[10px] font-black uppercase">Artifact</span><br/><span className="font-bold">Blood Needle</span></button>
                                <button onClick={() => setActiveMode('stitch_1')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMode==='stitch_1'||activeMode==='stitch_2'?'border-emerald-400 bg-emerald-900/30':'border-emerald-900 bg-gray-900 hover:border-emerald-500 hover:bg-gray-800'}`}><span className="text-emerald-500 text-[10px] font-black uppercase">Artifact</span><br/><span className="font-bold">Weaver's Needle</span></button>
                                {activeMode ? (
                                    <button onClick={() => { setActiveMode(null); setStitchTargetId(null); addLog("Tool unequipped."); }} className="p-4 rounded-xl border-2 border-gray-700 bg-gray-800 text-center font-bold text-gray-400 uppercase text-xs hover:bg-gray-700 hover:text-white transition-all">Cancel Tool</button>
                                ) : (
                                    <button onClick={() => selectMat('leech')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='leech'?'border-gray-500 bg-gray-800/80':'border-gray-800 bg-black hover:border-gray-600 hover:bg-gray-900'}`}><span className="text-gray-400 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold text-gray-300">Leech Pit</span></button>
                                )}

                                <button onClick={() => selectMat('altar')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='altar'?'border-red-400 bg-red-900/30':'border-red-900 bg-gray-900 hover:border-red-500 hover:bg-gray-800'}`}><span className="text-red-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Jalena's Leech Altar</span></button>
                                <button onClick={() => selectMat('tabular')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='tabular'?'border-teal-400 bg-teal-900/30':'border-teal-900 bg-gray-900 hover:border-teal-500 hover:bg-gray-800'}`}><span className="text-teal-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Bone Grinder</span></button>
                                <button onClick={() => selectMat('trigsub')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='trigsub'?'border-amber-400 bg-amber-900/30':'border-amber-900 bg-gray-900 hover:border-amber-500 hover:bg-gray-800'}`}><span className="text-amber-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Rune Circle</span></button>
                                <button onClick={() => selectMat('shrine')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='shrine'?'border-indigo-400 bg-indigo-900/30':'border-indigo-900 bg-gray-900 hover:border-indigo-500 hover:bg-gray-800'}`}><span className="text-indigo-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Mana Extractor 9000</span></button>
                                <button onClick={() => selectMat('ibp')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='ibp'?'border-fuchsia-400 bg-fuchsia-900/30':'border-fuchsia-900 bg-gray-900 hover:border-fuchsia-500 hover:bg-gray-800'}`}><span className="text-fuchsia-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">Boiling Pot</span></button>
                                <button onClick={() => selectMat('foil')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='foil'?'border-pink-400 bg-pink-900/30':'border-pink-900 bg-gray-900 hover:border-pink-500 hover:bg-gray-800'}`}><span className="text-pink-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">The Loom (FOIL)</span></button>
                                <button onClick={() => selectMat('rational')} className={`p-4 rounded-xl border-2 text-left transition-all ${activeMat==='rational'?'border-emerald-400 bg-emerald-900/30':'border-emerald-900 bg-gray-900 hover:border-emerald-500 hover:bg-gray-800'}`}><span className="text-emerald-500 text-[10px] font-black uppercase">Mat</span><br/><span className="font-bold">The Guillotine</span></button>
                            </div>
                        )}

                        {gamePhase === 'setup' && activeMat && (
                            <div className="w-full">
                                <button onClick={cancelMat} className="w-full p-4 rounded-xl border-2 border-gray-700 bg-gray-900 text-gray-400 hover:text-white font-black uppercase tracking-[0.2em] hover:bg-gray-800 hover:border-gray-500 transition-all shadow-lg flex items-center justify-center gap-3">
                                    <span className="text-xl">⟵</span> Step Away from Mat (Refund Cards)
                                </button>
                            </div>
                        )}
                        
                        {gamePhase === 'integration' && (
                            <div className="w-full flex flex-col items-center animate-slide-up mt-8">
                                <div className="w-full border-t-2 border-red-900/30 pt-8 pb-4">
                                    <h3 className="text-center text-red-500/60 font-black uppercase text-[10px] tracking-[0.4em] mb-6 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]">
                                        The Eldritch Forge
                                    </h3>
                                    
                                    <div className="flex justify-center gap-4">
                                        {CATALYSTS.map(cat => (
                                            <button 
                                                key={cat.id} 
                                                onClick={() => { setActiveCatalyst(cat.id); addLog(`${cat.name} equipped. Strike the Unresolved Integral.`); }}
                                                disabled={integrationStep === 4}
                                                className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all w-36 h-32 disabled:opacity-20 disabled:pointer-events-none 
                                                    ${activeCatalyst === cat.id ? `scale-110 shadow-[0_0_25px_currentColor] z-50 ${cat.color} ${cat.border} ${cat.bg}` : `border-gray-800 bg-gray-950 hover:bg-gray-900 hover:scale-105 ${cat.color}`}`}
                                            >
                                                <span className="text-4xl mb-3 drop-shadow-lg">{cat.icon}</span>
                                                <span className="text-[10px] font-black uppercase text-center leading-tight tracking-widest">{cat.name}</span>
                                                <span className="text-[8px] text-gray-500 uppercase mt-2 border-t border-white/10 pt-1 w-full text-center">{cat.lore}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {integrationStep === 4 && <button onClick={generateSpell} className="bg-blue-600 px-12 py-4 rounded-full font-black uppercase tracking-widest animate-pulse mt-4 shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:bg-blue-500 hover:scale-105 transition-all">Summon Next Spell</button>}
                             </div>
                         )}
                     </div>
                 </div>
             );
         };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntegraliaGame />);
    </script>
</body>
</html>
